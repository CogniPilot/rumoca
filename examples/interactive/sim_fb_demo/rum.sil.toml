[rumoca]
version = "1"
task = "simulate"

[model]
file = "QuadrotorSIL.mo"
name = "QuadrotorSIL"

[sim]
dt = 0.00125
mode = "lockstep"
solver = "rk-like"

[external_interface]
# Build Cerebri/native_sim, then update this path if your build tree differs.
command = "/home/prady/purdue/research/cognipilot/ws/cerebri/build-native_sim/zephyr/zephyr.exe"

[transport.udp]
listen = "0.0.0.0:4244"
send = "127.0.0.1:4242"

[transport.websocket]
port = 8081

[transport.http]
port = 8080
scene = "quadrotor_scene.js"

[schema]
bfbs = [
    "/home/prady/purdue/research/cognipilot/ws/cerebri/build-native_sim/generated/flatbuffers/cerebri2_topics.bfbs",
    "/home/prady/purdue/research/cognipilot/ws/cerebri/build-native_sim/generated/flatbuffers/cerebri2_sil.bfbs",
]

[receive]
root_type = "cerebri2.topic.MotorOutput"

[receive.route]
"motors.m0" = { to = "stepper:omega_m1", scale = 1100.0 }
"motors.m1" = { to = "stepper:omega_m2", scale = 1100.0 }
"motors.m2" = { to = "stepper:omega_m3", scale = 1100.0 }
"motors.m3" = { to = "stepper:omega_m4", scale = 1100.0 }
"armed"     = { to = "local:armed" }
"test_mode" = { to = "local:test_mode" }

[send]
root_type = "cerebri2.sil.SimInput"

[send.route]
"gyro.x"  = { key = "gyro_x" }
"gyro.y"  = { key = "gyro_y" }
"gyro.z"  = { key = "gyro_z" }
"accel.x" = { key = "accel_x" }
"accel.y" = { key = "accel_y" }
"accel.z" = { key = "accel_z" }

"rc.ch0"  = { key = "rc_0" }
"rc.ch1"  = { key = "rc_1" }
"rc.ch2"  = { key = "rc_2" }
"rc.ch3"  = { key = "rc_3" }
"rc.ch4"  = { key = "rc_4" }
"rc.ch5"  = { key = "rc_5" }
"rc.ch6"  = { key = "rc_6" }
"rc.ch7"  = { key = "rc_7" }
"rc.ch8"  = { key = "rc_8" }
"rc.ch9"  = { key = "rc_9" }
"rc.ch10" = { key = "rc_10" }
"rc.ch11" = { key = "rc_11" }
"rc.ch12" = { key = "rc_12" }
"rc.ch13" = { key = "rc_13" }
"rc.ch14" = { key = "rc_14" }
"rc.ch15" = { key = "rc_15" }

"rc_link_quality" = { key = "rc_link_quality" }
"rc_valid"        = { key = "rc_valid" }
"imu_valid"       = { key = "imu_valid" }

[input]
mode = "auto"

[input.gamepad.axes.pitch]
source = "RightStickY"
write = "pitch_cmd"

[input.gamepad.axes.roll]
source = "RightStickX"
write = "roll_cmd"

[input.gamepad.axes.yaw]
source = "LeftStickX"
write = "yaw_cmd"

[input.gamepad.buttons.arm]
action = "toggle"
debounce_ms = 500
precondition = "rc.2 <= 1050"
source = "Start"
state = "armed"

[input.gamepad.buttons.log]
action = "signal"
signal = "log"
source = "North"

[input.gamepad.buttons.reset]
action = "signal"
signal = "reset"
source = "South"

[input.gamepad.integrators.throttle]
clamp = [0.0, 1.0]
deadband = 0.1
rate = 0.7
source = "LeftStickY"
write = "throttle"

[input.keyboard.decay]
factor = 0.85
ref_dt = 0.016
targets = [
    "roll_cmd",
    "pitch_cmd",
    "yaw_cmd",
    "throttle_input",
]

[input.keyboard.integrators.throttle]
clamp = [0.0, 1.0]
rate = 0.7
source = "local:throttle_input"
write = "throttle"

[input.keyboard.keys.ArrowDown]
action = "set"
target = "roll_cmd"
value = -0.3

[input.keyboard.keys.ArrowLeft]
action = "set"
target = "pitch_cmd"
value = 0.3

[input.keyboard.keys.ArrowRight]
action = "set"
target = "pitch_cmd"
value = -0.3

[input.keyboard.keys.ArrowUp]
action = "set"
target = "roll_cmd"
value = 0.3

[input.keyboard.keys.Space]
action = "toggle"
debounce_ms = 500
precondition = "rc.2 <= 1050"
state = "armed"

[input.keyboard.keys.a]
action = "set"
target = "yaw_cmd"
value = 0.6

[input.keyboard.keys.d]
action = "set"
target = "yaw_cmd"
value = -0.6

[input.keyboard.keys.l]
action = "signal"
signal = "log"

[input.keyboard.keys.q]
action = "signal"
signal = "quit"

[input.keyboard.keys.r]
action = "signal"
signal = "reset"

[input.keyboard.keys.s]
action = "set"
target = "throttle_input"
value = -1.0

[input.keyboard.keys.w]
action = "set"
target = "throttle_input"
value = 1.0

[locals.armed]
default = false
type = "bool"

[locals.pitch_cmd]
default = 0.0
type = "float"

[locals.rc]
default = 1500
element = "int"
len = 16
type = "array"

[locals.roll_cmd]
default = 0.0
type = "float"

[locals.test_mode]
default = false
type = "bool"

[locals.throttle]
default = 0.0
type = "float"

[locals.throttle_input]
default = 0.0
type = "float"

[locals.yaw_cmd]
default = 0.0
type = "float"

[derive."rc.0"]
clamp = [1000.0, 2000.0]
from = "roll_cmd"
offset = 1500.0
scale = 500.0

[derive."rc.1"]
clamp = [1000.0, 2000.0]
from = "pitch_cmd"
offset = 1500.0
scale = -500.0

[derive."rc.2"]
clamp = [1000.0, 2000.0]
from = "throttle"
offset = 1000.0
scale = 1000.0

[derive."rc.3"]
clamp = [1000.0, 2000.0]
from = "yaw_cmd"
offset = 1500.0
scale = 500.0

[derive."rc.4"]
from = "armed"
when_false = 1000.0
when_true = 2000.0

[signals.send]
gyro_x = "stepper:gyro_x"
gyro_y = "stepper:gyro_y"
gyro_z = "stepper:gyro_z"
accel_x = "stepper:accel_x"
accel_y = "stepper:accel_y"
accel_z = "stepper:accel_z"

rc_0 = "local:rc.0"
rc_1 = "local:rc.1"
rc_2 = "local:rc.2"
rc_3 = "local:rc.3"
rc_4 = "local:rc.4"
rc_5 = "local:rc.5"
rc_6 = "local:rc.6"
rc_7 = "local:rc.7"
rc_8 = "local:rc.8"
rc_9 = "local:rc.9"
rc_10 = "local:rc.10"
rc_11 = "local:rc.11"
rc_12 = "local:rc.12"
rc_13 = "local:rc.13"
rc_14 = "local:rc.14"
rc_15 = "local:rc.15"

rc_link_quality = { const = 255.0 }
rc_valid = { const = 1.0 }
imu_valid = { const = 1.0 }

[signals.viewer]
accel_x = "stepper:accel_x"
accel_y = "stepper:accel_y"
accel_z = "stepper:accel_z"
armed = "local:armed"
frame = "runtime:frame_num"
gyro_x = "stepper:gyro_x"
gyro_y = "stepper:gyro_y"
gyro_z = "stepper:gyro_z"
input_mode = "runtime:input_mode"
omega_m1 = "stepper:omega_m1"
omega_m2 = "stepper:omega_m2"
omega_m3 = "stepper:omega_m3"
omega_m4 = "stepper:omega_m4"
px = "stepper:px"
py = "stepper:py"
pz = "stepper:pz"
q0 = { from = "stepper:q0", default = 1.0 }
q1 = "stepper:q1"
q2 = "stepper:q2"
q3 = "stepper:q3"
rc_0 = "local:rc.0"
rc_1 = "local:rc.1"
rc_2 = "local:rc.2"
rc_3 = "local:rc.3"
rc_4 = "local:rc.4"
stick_pitch = "local:pitch_cmd"
stick_roll = "local:roll_cmd"
stick_throttle = "local:throttle"
stick_yaw = "local:yaw_cmd"
t = "stepper:time"
test_mode = "local:test_mode"
vx = "stepper:vx"
vy = "stepper:vy"
vz = "stepper:vz"
wall_ms = "runtime:wall_ms"

[debug_log]
ring_size = 20000
trigger_signal = "log"
path = "rumoca_sil_trace.csv"
capture = [
    "runtime:frame_num",
    "stepper:time",
    "stepper:px",
    "stepper:py",
    "stepper:pz",
    "stepper:vx",
    "stepper:vy",
    "stepper:vz",
    "stepper:omega_m1",
    "stepper:omega_m2",
    "stepper:omega_m3",
    "stepper:omega_m4",
    "local:rc.0",
    "local:rc.1",
    "local:rc.2",
    "local:rc.3",
    "local:armed",
]

[reset]
on_signal = "reset"
reset_locals = true
rebuild_stepper = true
restart_external_interface = true

[viewer]
mode = "external_web"
show_armed = true
status_title = "SIL Vehicle"

[[viewer.controls.keyboard]]
keys = "W / S"
action = "Throttle"

[[viewer.controls.keyboard]]
keys = "Arrow Up / Down"
action = "Roll"

[[viewer.controls.keyboard]]
keys = "Arrow Left / Right"
action = "Pitch"

[[viewer.controls.keyboard]]
keys = "A / D"
action = "Yaw"

[[viewer.controls.keyboard]]
keys = "Space"
action = "Arm / disarm"

[[viewer.controls.keyboard]]
keys = "R"
action = "Reset sim and binary"

[[viewer.controls.keyboard]]
keys = "Q"
action = "Quit"

[[viewer.controls.gamepad]]
keys = "Left stick"
action = "Throttle / yaw"

[[viewer.controls.gamepad]]
keys = "Right stick"
action = "Roll / pitch"

[[viewer.controls.gamepad]]
keys = "Start"
action = "Arm / disarm"

[[viewer.controls.gamepad]]
keys = "South"
action = "Reset sim and binary"
