# =============================================================================
# quadrotor_acro.toml — quadrotor SIL with an IN-PROCESS Modelica controller.
#
# At load time rumoca synthesizes a wrapper that instantiates the [physics]
# and [controller] models as sub-components and wires them per the
# `actuate` (controller → physics) and `sense` (physics → controller)
# tables below. No external autopilot, no FB, no UDP.
#
# For the Cerebri autopilot variant, see quadrotor_cerebri.toml instead.
#
# Pair with (all in this directory):
#   - QuadrotorSIL.mo    (physics plant)
#   - AcroRatePID.mo     (controller — acro rate PID with X-mix)
#   - quadrotor_scene.js (Three.js scene)
#
# Run: rumoca lockstep run -c examples/quadrotor_sil/quadrotor_acro.toml
# =============================================================================

# ── Physics + controller + sim core ────────────────────────────────────────

source_roots = ["../modelica_libraries"]

[physics]
file = "QuadrotorSIL.mo"
name = "QuadrotorSIL"

# In-process Modelica controller. Rumoca synthesizes a wrapper at load
# time that instantiates physics + controller and wires them per the
# route tables below.
[controller]
file = "AcroRatePID.mo"
name = "AcroRatePID"

# Controller outputs → physics inputs.
[controller.actuate]
motor_cmd_0 = "omega_cmd[1]"
motor_cmd_1 = "omega_cmd[2]"
motor_cmd_2 = "omega_cmd[3]"
motor_cmd_3 = "omega_cmd[4]"

# Physics outputs → controller inputs (feedback).
[controller.sense]
"gyro[1]" = "gyro_x"
"gyro[2]" = "gyro_y"
"gyro[3]" = "gyro_z"

[sim]
dt = 0.005
realtime = true
mode = "free_run"

# ── Transports (HTTP + WebSocket for the browser viewer) ───────────────────

[transport.websocket]
port = 8081

[transport.http]
port  = 8080
scene = "quadrotor_scene.js"

# ── Locals: user state ─────────────────────────────────────────────────────

[locals]
armed          = { type = "bool",  default = false }
throttle       = { type = "float", default = 0.0 }
roll_cmd       = { type = "float", default = 0.0 }
pitch_cmd      = { type = "float", default = 0.0 }
yaw_cmd        = { type = "float", default = 0.0 }
throttle_input = { type = "float", default = 0.0 }

# ── Input engine ───────────────────────────────────────────────────────────

[input]
mode = "auto"

[input.gamepad.axes]
roll  = { source = "RightStickX", write = "roll_cmd" }
pitch = { source = "RightStickY", write = "pitch_cmd" }
yaw   = { source = "LeftStickX",  write = "yaw_cmd" }

[input.gamepad.integrators.throttle]
source   = "LeftStickY"
write    = "throttle"
deadband = 0.1
rate     = 0.7
clamp    = [0.0, 1.0]

[input.gamepad.buttons.arm]
source       = "Start"
action       = "toggle"
state        = "armed"
debounce_ms  = 500
precondition = "throttle <= 0.05"

[input.gamepad.buttons.reset]
source = "South"
action = "signal"
signal = "reset"

[input.gamepad.buttons.log]
source = "North"
action = "signal"
signal = "log"

[input.keyboard.decay]
targets = ["roll_cmd", "pitch_cmd", "yaw_cmd", "throttle_input"]
factor  = 0.85
ref_dt  = 0.016

[input.keyboard.keys]
"ArrowUp"    = { action = "set", target = "throttle_input", value =  1.0 }
"ArrowDown"  = { action = "set", target = "throttle_input", value = -1.0 }
"ArrowLeft"  = { action = "set", target = "yaw_cmd",        value = -0.6 }
"ArrowRight" = { action = "set", target = "yaw_cmd",        value =  0.6 }
"w"          = { action = "set", target = "pitch_cmd",      value = -0.6 }
"s"          = { action = "set", target = "pitch_cmd",      value =  0.6 }
"a"          = { action = "set", target = "roll_cmd",       value = -0.6 }
"d"          = { action = "set", target = "roll_cmd",       value =  0.6 }
"Space"      = { action = "toggle", state = "armed", debounce_ms = 500, precondition = "throttle <= 0.05" }
"r"          = { action = "signal", signal = "reset" }
"l"          = { action = "signal", signal = "log"   }
"q"          = { action = "signal", signal = "quit"  }

[input.keyboard.integrators.throttle]
source = "local:throttle_input"
write  = "throttle"
rate   = 0.7
clamp  = [0.0, 1.0]

# ── Stepper inputs (drive QuadrotorAcro directly from locals) ──────────────
# Bool armed is written as 1.0/0.0 into the Modelica input.

[signals.stepper_inputs]
stick_roll     = "local:roll_cmd"
stick_pitch    = "local:pitch_cmd"
stick_yaw      = "local:yaw_cmd"
stick_throttle = "local:throttle"
armed          = { from = "local:armed", when_true = 1.0, when_false = 0.0 }

# ── Viewer JSON: what the browser receives over WebSocket ──────────────────

[signals.viewer]
t           = "stepper:time"
frame       = "runtime:frame_num"
wall_ms     = "runtime:wall_ms"
px          = "stepper:position[1]"
py          = "stepper:position[2]"
pz          = "stepper:position[3]"
vx          = "stepper:velocity[1]"
vy          = "stepper:velocity[2]"
vz          = "stepper:velocity[3]"
q0          = { from = "stepper:quat[1]", default = 1.0 }
q1          = "stepper:quat[2]"
q2          = "stepper:quat[3]"
q3          = "stepper:quat[4]"
omega_m1    = "stepper:omega_m[1]"
omega_m2    = "stepper:omega_m[2]"
omega_m3    = "stepper:omega_m[3]"
omega_m4    = "stepper:omega_m[4]"
accel_x     = "stepper:accel[1]"
accel_y     = "stepper:accel[2]"
accel_z     = "stepper:accel[3]"
gyro_x      = "stepper:gyro[1]"
gyro_y      = "stepper:gyro[2]"
gyro_z      = "stepper:gyro[3]"
armed       = "local:armed"
input_mode  = "runtime:input_mode"

# ── Debug trace log (RUMOCA_TRACE_LOG=path to override file) ───────────────

[debug_log]
ring_size      = 500
trigger_signal = "log"
capture = [
  "runtime:frame_num", "runtime:wall_ms", "stepper:time",
  "local:armed",
  "local:roll_cmd", "local:pitch_cmd", "local:yaw_cmd", "local:throttle",
  "stepper:omega_m[1]", "stepper:omega_m[2]", "stepper:omega_m[3]", "stepper:omega_m[4]",
  "stepper:position[1]", "stepper:position[2]", "stepper:position[3]",
  "stepper:velocity[1]", "stepper:velocity[2]", "stepper:velocity[3]",
  "stepper:quat[1]", "stepper:quat[2]", "stepper:quat[3]", "stepper:quat[4]",
  "stepper:accel[1]", "stepper:accel[2]", "stepper:accel[3]",
  "stepper:gyro[1]", "stepper:gyro[2]", "stepper:gyro[3]",
]

# ── Reset behavior ─────────────────────────────────────────────────────────

[reset]
on_signal       = "reset"
reset_locals    = true
rebuild_stepper = true
