[book]
title = "Rumoca User Guide"
authors = ["Rumoca Contributors"]
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
git-repository-url = "https://github.com/climamind/rumoca"
edit-url-template = "https://github.com/climamind/rumoca/edit/main/docs/user-guide/{path}"
default-theme = "rust"
preferred-dark-theme = "ayu"
additional-js = ["live/rumoca-live.js"]
additional-css = ["live/rumoca-live.css"]
