[package]
name = "xtask"
description = "Cross-platform developer tooling for rumoca"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "xtask"
path = "src/main.rs"

[[bin]]
name = "rumoca-traversal-policy-check"
path = "src/bin/rumoca-traversal-policy-check.rs"

# xtask carries NO `rumoca-*` workspace dependency: it parses args, moves files,
# and shells out. Heavy, compiler-linked work runs on demand via `cargo run -p
# <crate>` (rumoca-test-msl for MSL tooling, rumoca-tool-docs for the docs cache).
# The CI arch check (ci.yml) enforces this — keep this list free of rumoca-*.
[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
clap_complete = { workspace = true }
mimalloc = { workspace = true }
serde_json = { workspace = true }
serde = { workspace = true }
blake3 = { workspace = true }
sha2 = "0.10"
toml = { workspace = true }
lsp-types = { workspace = true }
tempfile = { workspace = true }
ureq = "2.9"
walkdir = "2.5"
syn = { version = "2.0", features = ["full", "visit"] }
zip = { version = "2.4", default-features = false, features = ["deflate"] }

[lints]
workspace = true
