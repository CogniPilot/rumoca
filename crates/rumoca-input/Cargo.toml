[package]
name = "rumoca-input"
description = "Input engine + signal mapping for Rumoca lockstep simulations"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
rumoca-codec = { workspace = true }

anyhow = { workspace = true }
indexmap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }

# Native-only: device polling. Not yet split into -gamepad / -keyboard
# device crates (that's the next phase); until then, gate at build time
# so wasm consumers get the config types only.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
crossterm = "0.28"
gilrs = "0.11"

[lints]
workspace = true
