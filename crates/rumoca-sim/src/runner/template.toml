[rumoca]
version = "1"

# =============================================================================
# rumoca task file (rum.toml) — starter template
#
# Generated by `rumoca sim init`. Edit to fit your vehicle.
#
# Validate any edits to this file with:  rumoca sim check -c rum.toml
#
# Worked examples (in the rumoca source tree / on GitHub) to cargo-cult from:
#   https://github.com/cognipilot/rumoca/tree/main/examples/interactive
#   examples/interactive/quadrotor/rum.acro.toml     (standalone quadrotor)
#   examples/interactive/rover/rum.toml              (standalone)
# =============================================================================

# Minimal batch/report config:
#
# [model]
# file = "Ball.mo"
# name = "Ball"
#
# [sim]
# t_end = 10.0
# dt = 0.01
# solver = "auto"
# output = "Ball_results.html"
#
# With only [model] and [sim], `rumoca sim -c rum.toml` compiles, simulates,
# and writes an HTML report. Add [input], [signals], [transport], or external
# coupling sections to launch the interactive runner instead.

# ── Model ─────────────────────────────────────────────────────────────────
# Required. Modelica model file (relative to this scenario) + top-level class
# name. Compose controllers and vehicles in Modelica, then point here at the
# composed class.
# Optional package roots, also relative to this scenario.
# source_roots = ["../modelica_libraries"]

[model]
file = "MyClosedLoopVehicle.mo"
name = "MyClosedLoopVehicle"

# ── Simulation ────────────────────────────────────────────────────────────
[sim]
dt = 0.01          # simulation timestep in seconds
t_end = 10.0       # batch/report stop time; interactive runners may ignore this
solver = "auto"    # auto | bdf | rk-like
output = "results.html"
mode = "realtime"  # Optional runner pacing:
                   #   "as_fast_as_possible" — drain available inputs and run without sleeping.
                   #   "realtime"            — zero-order-hold inputs and sleep to wall-clock dt.
                   #   "lockstep"            — wait for each external packet before stepping.
                   # Defaults to "lockstep" with external coupling and "realtime" standalone.

# ── Transports ────────────────────────────────────────────────────────────
# HTTP + WebSocket always needed for the viewer.
[transport.websocket]
port = 8081

[transport.http]
port  = 8080
scene = "my_scene.js"  # relative to this scenario

# UDP only needed if coupling to an external interface.
# Uncomment and pair with [schema]/[receive]/[send] below.
# [transport.udp]
# listen = "0.0.0.0:4244"
# send   = "127.0.0.1:4242"

# [external_interface]
# command = "/path/to/external-process"

# ── External interface coupling (optional, all-or-nothing) ────────────────
# Provide all three — [schema], [receive], [send] — to couple via FlatBuffer
# over UDP. Omit all three for standalone mode (gamepad drives stepper
# directly via [signals.stepper_inputs]).
#
# [schema]
# bfbs = ["/path/to/your_schema.bfbs"]
#
# [receive]
# root_type = "your.namespace.MotorOutput"
#
# [receive.route]
# "motors.m0" = { to = "stepper:omega_m1", scale = 1100.0 }
# "armed"     = { to = "local:armed" }
#
# [send]
# root_type = "your.namespace.SimInput"
#
# [send.route]
# "gyro.x" = { key = "gyro_x" }

# ── Locals: named persistent state ────────────────────────────────────────
# Types: "bool" | "float" | "array" (with element="int"|"float" and len).
# `default` is optional (0, 0.0, or false if omitted).
[locals]
throttle = { type = "float", default = 0.0 }
# my_flag = { type = "bool", default = false }
# rc = { type = "array", element = "int", len = 16, default = 1500 }

# ── Derive: compute one local from another each frame ─────────────────────
# Linear form: `scale * from + offset`, optionally clamped.
# Conditional:  `{ from = "bool_local", when_true = X, when_false = Y }`
# [derive]
# "rc.2" = { from = "throttle", scale = 1000, offset = 1000, clamp = [1000, 2000] }

# ── Input engine ──────────────────────────────────────────────────────────
# mode: "auto" auto-detects gamepad; explicit "gamepad" or "keyboard" forces.
[input]
mode = "auto"

# Gamepad axes — source is one of RightStickX/Y, LeftStickX/Y, LeftZ, RightZ,
# DPadX, DPadY. `write` is the target local.
# [input.gamepad.axes.throttle]
# source = "LeftStickY"
# write  = "throttle"
# scale  = -1.0     # optional (default 1.0); flips so forward = +1

# Integrators: `state += source * rate * dt`, clamped. Deadband zeroes
# `|source| < deadband`. Source can be a gamepad axis OR `local:name`.
# [input.gamepad.integrators.throttle]
# source = "LeftStickY"
# write  = "throttle"
# deadband = 0.1; rate = 0.7; clamp = [0.0, 1.0]

# Gamepad buttons — source is South/East/North/West/Start/Select/
# LeftTrigger/RightTrigger/LeftThumb/RightThumb/DPadUp/DPadDown/
# DPadLeft/DPadRight/Mode.
# action = "toggle" (flips a bool state) or "signal" (emits a one-shot).
# `precondition` is a tiny expression: `path OP value`, where OP is
# <, <=, ==, !=, >=, >.
# [input.gamepad.buttons.arm]
# source = "Start"
# action = "toggle"
# state  = "armed"
# debounce_ms = 500
# precondition = "throttle <= 0.1"

# Keyboard keys: the key name is the identifier (single char, "ArrowUp",
# "Space", "Enter", "Esc", or "Ctrl+c").
# action = "set" (writes value to target), "toggle", or "signal".
# [input.keyboard.keys]
# "ArrowUp"   = { action = "set", target = "throttle_cmd", value =  1.0 }
# "ArrowDown" = { action = "set", target = "throttle_cmd", value = -1.0 }
# "Space"     = { action = "toggle", state = "armed", debounce_ms = 500 }
# "r"         = { action = "signal", signal = "reset" }
# "q"         = { action = "signal", signal = "quit" }

# Decay: each frame multiplies listed targets by `factor^(dt/ref_dt)`.
# Useful when keys set a target that should return to 0 between presses.
# [input.keyboard.decay]
# targets = ["throttle_cmd"]
# factor  = 0.85
# ref_dt  = 0.016

# ── Signals ───────────────────────────────────────────────────────────────
# Sources for signal values:
#   "stepper:name"              — read from the compiled model
#   "stepper:time"              — simulation time
#   "local:name" / "local:rc.2" — engine-managed locals (with array index)
#   "runtime:frame_num"         — integer frame counter
#   "runtime:wall_ms"           — wall-clock ms since epoch
#   "runtime:input_connected"   — bool, true if an input device is live
#   "runtime:input_mode"        — "gamepad" | "keyboard"
#
# Value forms:
#   "stepper:foo"                                    — plain ref
#   { from = "stepper:foo", default = 1.0 }          — fallback if missing
#   { from = "bool_local", when_true = X, when_false = Y }  — branch
#   { const = 1.0 }                                  — constant
[signals]

# [signals.stepper_inputs]
# Standalone mode uses this to drive model inputs directly from locals
# (no external-interface round trip). Keys are stepper input names.
# [signals.stepper_inputs]
# throttle = "local:throttle"

# [signals.send]
# Required only if [schema]/[receive]/[send] are configured. Each key
# populates a named slot in the outgoing SignalFrame.
# [signals.send]
# gyro_x = "stepper:gyro_x"
# imu_valid = { const = 1.0 }

# [signals.viewer]
# What the browser viewer receives as JSON each frame.
[signals.viewer]
t     = "stepper:time"
frame = "runtime:frame_num"
# px = "stepper:px"
# py = "stepper:py"
# pz = "stepper:pz"

# ── Reset behavior ────────────────────────────────────────────────────────
# Fires when the named signal is emitted (e.g. from the "reset" keybinding).
[reset]
on_signal         = "reset"
reset_locals      = true
rebuild_stepper   = true
restart_external_interface = false

# ── Viewer presentation ───────────────────────────────────────────────────
# Optional onboard camera configuration for the C key. Referenced signal names
# must be present in [signals.viewer].
# [viewer.onboard_camera]
# mode = "planar_xy_heading"
# x = "x"
# y = "y"
# heading = "theta"
# mount = [0.95, 0.18, 0.0]
