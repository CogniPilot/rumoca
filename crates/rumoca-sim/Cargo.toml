[package]
name = "rumoca-sim"
description = "High-level simulation facade for Rumoca (sim-core + solvers + I/O runner)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["native-solvers"]
native-solvers = ["solver-diffsol", "solver-rk45"]
strict-ir-validation = [
    "rumoca-phase-dae/strict-ir-validation",
    "rumoca-phase-solve/strict-ir-validation",
]
wasm-solvers = ["solver-diffsol", "solver-rk45"]
solver-diffsol = ["dep:rumoca-solver-diffsol"]
solver-rk45 = ["dep:rumoca-solver-rk45"]
viz = ["dep:rumoca-viz-web"]
# HTML simulation report renderer. Pure-Rust deps (viz-web + compile);
# cross-compiles cleanly. Independent of `runner` so non-lockstep
# CLIs can still emit HTML reports from `simulate`.
report = ["viz", "dep:rumoca-compile"]
runner = [
    "native-solvers",
    "viz",
    "report",
    "dep:rumoca-codec",
    "dep:rumoca-input",
    "dep:rumoca-input-gamepad",
    "dep:rumoca-input-keyboard",
    "dep:rumoca-transport-udp",
    "dep:rumoca-transport-websocket",
    "dep:rumoca-compile",
    "dep:signal-hook",
    "dep:anyhow",
    "dep:toml",
]

[dependencies]
rumoca-core = { workspace = true }
indexmap = { workspace = true }
rumoca-ir-dae = { workspace = true }
rumoca-phase-dae = { workspace = true }
rumoca-phase-structural = { workspace = true }
rumoca-ir-solve = { workspace = true }
rumoca-phase-solve = { workspace = true }
rumoca-eval-solve = { workspace = true }
rumoca-solver = { workspace = true }
rumoca-solver-diffsol = { workspace = true, optional = true }
rumoca-solver-rk45 = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true, features = ["unbounded_depth"] }
thiserror = { workspace = true }
tracing = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rumoca-codec = { workspace = true, optional = true }
rumoca-input = { workspace = true, optional = true }
rumoca-input-keyboard = { workspace = true, optional = true }
rumoca-transport-udp = { workspace = true, optional = true }
rumoca-transport-websocket = { workspace = true, optional = true }
rumoca-viz-web = { workspace = true, optional = true }
rumoca-compile = { workspace = true, optional = true }
signal-hook = { version = "0.3", optional = true }
anyhow = { workspace = true, optional = true }
toml = { workspace = true, optional = true }

[target.'cfg(all(target_os = "linux", not(target_arch = "wasm32")))'.dependencies]
libc = "0.2"

[target.'cfg(all(not(target_arch = "wasm32"), not(target_env = "musl")))'.dependencies]
rumoca-input-gamepad = { workspace = true, optional = true }

[lints]
workspace = true
