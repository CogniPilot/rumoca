[package]
name = "rumoca-sim-diffsol"
description = "DAE simulation using diffsol for the Rumoca compiler"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
rumoca-core = { workspace = true }
rumoca-eval-flat = { workspace = true }
rumoca-ir-dae = { workspace = true }
rumoca-phase-structural = { workspace = true }
rumoca-sim-core = { workspace = true }
diffsol = "0.10"
nalgebra = "0.34"
indexmap = { workspace = true }
thiserror = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }
rumoca-eval-dae = { workspace = true, features = ["wasm"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rumoca-eval-dae = { workspace = true, features = ["cranelift"] }

[dev-dependencies]
rumoca-session = { workspace = true }

[lints]
workspace = true
