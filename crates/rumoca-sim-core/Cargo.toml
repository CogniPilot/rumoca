[package]
name = "rumoca-sim-core"
description = "Shared IC solving infrastructure for Rumoca simulator backends"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
rumoca-core = { workspace = true }
rumoca-eval-runtime = { workspace = true }
rumoca-ir-dae = { workspace = true }
rumoca-ir-flat = { workspace = true }
rumoca-phase-structural = { workspace = true }
indexmap = { workspace = true }
levenberg-marquardt = "0.15"
nalgebra = "0.34"
thiserror = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
rumoca-eval-compiled = { workspace = true, features = ["wasm"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rumoca-eval-compiled = { workspace = true, features = ["cranelift"] }

[lints]
workspace = true
