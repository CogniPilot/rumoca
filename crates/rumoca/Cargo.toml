[package]
name = "rumoca"
description = "Modelica compiler written in Rust"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
keywords = ["modelica", "compiler", "dae", "simulation"]
categories = ["compilers", "science", "simulation"]
default-run = "rumoca"

[[bin]]
name = "rumoca"
path = "src/main.rs"
required-features = [
    "scheduled-sim",
    "scenario-config",
    "input-keyboard",
    "transport-udp",
    "transport-zenoh",
    "viewer-web",
    "process-control",
]

[features]
default = [
    "scheduled-sim",
    "scenario-config",
    "input-keyboard",
    "input-gamepad",
    "transport-udp",
    "transport-zenoh",
    "viewer-web",
    "process-control",
    "native-allocator",
    "fmu-packaging",
]
scheduled-sim = ["rumoca-sim/scheduled-sim"]
scenario-config = ["rumoca-sim/scenario-config"]
input-keyboard = ["rumoca-sim/input-keyboard"]
input-gamepad = ["rumoca-sim/input-gamepad"]
transport-udp = ["rumoca-sim/transport-udp"]
transport-zenoh = ["rumoca-sim/transport-zenoh"]
viewer-web = ["rumoca-sim/viewer-web"]
process-control = ["rumoca-sim/process-control"]
native-allocator = ["dep:mimalloc"]
fmu-packaging = ["dep:zip"]
examples-smoke-tests = []
msl-sim-tests = []
template-runtime-tests = []
tracing = ["dep:tracing", "dep:tracing-subscriber", "rumoca-compile/tracing"]

[dependencies]
# Internal crates: CLI consumes the high-level facades only.
# rumoca-compile wraps all compilation phases.
# rumoca-sim wraps simulation primitives, solvers, and opt-in axes for scenario
# config, scheduling, transports, input devices, viewer web UI, and reports.
# Library consumers select only the axes they need.
rumoca-compile = { workspace = true }
rumoca-core = { workspace = true }
rumoca-ir-solve = { workspace = true }
rumoca-sim = { workspace = true, default-features = false, features = ["native-solvers"] }
rumoca-tool-fmt = { workspace = true }
rumoca-tool-lint = { workspace = true }

# External dependencies
anyhow = { workspace = true }
# Binary-only global allocator; gated behind `native-allocator` (see [features]).
mimalloc = { workspace = true, optional = true }
clap = { workspace = true }
clap_complete = { workspace = true }
miette = { workspace = true }
minijinja = { workspace = true }
rayon = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true, features = ["unbounded_depth"] }
tempfile = { workspace = true }
toml = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true }
walkdir = { workspace = true }
# Used only by FMU packaging (FMU export = zip archive); pulls C compression
# backends (bzip2/lzma/zstd), so gate behind `fmu-packaging`.
zip = { workspace = true, optional = true }
# Reset SIGPIPE to its default disposition so piping into `head` exits cleanly
# instead of panicking on a broken-pipe write. Encapsulates the one unsafe libc
# call so this crate keeps `unsafe_code = "deny"`.
sigpipe = { workspace = true }

[[example]]
name = "simulation_session_demo"
path = "examples/simulation_session_demo.rs"

[[example]]
name = "quadrotor_sil"
path = "examples/quadrotor_sil.rs"

[[test]]
name = "examples_smoke"
path = "tests/examples_smoke.rs"
required-features = ["examples-smoke-tests"]

[[test]]
name = "template_target_ci"
path = "tests/template_target_ci.rs"
required-features = ["template-runtime-tests"]

[[test]]
name = "standalone_template_regression"
path = "tests/standalone_template_regression.rs"
required-features = ["template-runtime-tests"]

[[test]]
name = "sympy_template_regression"
path = "tests/sympy_template_regression.rs"
required-features = ["template-runtime-tests"]

[[test]]
name = "backend_template_runtime_regression"
path = "tests/backend_template_runtime_regression.rs"
required-features = ["template-runtime-tests"]

[[test]]
name = "symforce_template_regression"
path = "tests/symforce_template_regression.rs"
required-features = ["template-runtime-tests"]

[[test]]
name = "msl_sim_regression"
path = "tests/msl_sim_regression.rs"
required-features = ["msl-sim-tests"]

# Exercises the FMU packaging module end-to-end and unzips the produced `.efmu`
# via the optional `zip` dependency, so it
# must not compile under --no-default-features.
[[test]]
name = "cli_target_galec"
path = "tests/cli_target_galec.rs"
required-features = ["fmu-packaging"]

# Same FMU packaging surface as cli_target_galec, for the
# two-representation (AlgorithmCode + ProductionCode) container.
[[test]]
name = "cli_target_efmi"
path = "tests/cli_target_efmi.rs"
required-features = ["fmu-packaging"]

[dev-dependencies]
crossterm = "0.28"
indexmap = { workspace = true }
tungstenite = "0.26"
mimalloc = { workspace = true }
# MSL test dependencies
flate2 = "1.0"
tar = "0.4"
walkdir = "2.5"
ureq = "2.9"
dirs = "5.0"
serde = { version = "1.0", features = ["derive"] }
ntest = "0.9"  # Test timeouts
# Direct phase access for debugging/analysis tests
rumoca-ir-ast = { workspace = true }
# GALEC target CI (tests only): the eFMI id/checksum primitives
# (`Sha1Hex`/`ManifestId`/`UtcTimestamp`) for recomputing the SHA-1 web and
# checking id/timestamp discipline over the exact on-disk container bytes.
rumoca-galec-codegen = { workspace = true }
rumoca-ir-flat = { workspace = true }
rumoca-ir-dae = { workspace = true }
rumoca-phase-flatten = { workspace = true }
rumoca-phase-instantiate = { workspace = true }
rumoca-phase-parse = { workspace = true }
rumoca-phase-resolve = { workspace = true }
rumoca-phase-codegen = { workspace = true }
rumoca-phase-dae = { workspace = true }
rumoca-eval-solve = { workspace = true }
rumoca-phase-solve = { workspace = true }
rumoca-phase-typecheck = { workspace = true }
# GALEC target CI (tests only): recompute the SHA-1 checksum web and check
# manifest.xml well-formedness / attribute order over the exact on-disk bytes.
# xmllint XSD validation runs the external `xmllint`; the SHA-1 primitive comes
# through the `rumoca-compile` facade (rumoca-galec-codegen).
quick-xml = { workspace = true }

[lints]
workspace = true
