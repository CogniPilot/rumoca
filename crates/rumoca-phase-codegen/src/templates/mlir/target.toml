version = 1
ir = "solve"
name = "mlir"
description = "MLIR textual solve-IR residual export with scalar tensor fallback"
execution_mode = "compiled"
deployment_class = "cpu"
readiness_level = 1

[capabilities]
scalar_fallback = true
events = false
runtime_events = false
forward_ad = true
reverse_ad = false
dynamic_control_flow = false
host_callbacks = false

[capabilities.tensor]
matmul = "scalar"
linsolve = "scalar"
layout = "row-major"
supports_dynamic_shapes = false
sparse = false
dtypes = ["f64"]

[[files]]
path = "{{ model_name }}.mlir"
template = "mlir.mlir.jinja"
