version = 1
ir = "dae"
name = "galec-production"
# Conformance ladder (SPEC_0034 GAL-021/GAL-024): this target earns the
# "eFMI Production Code export" rung — one schema-valid eFMU container
# holding BOTH an Algorithm Code representation (AlgorithmCode/: Model.alg
# + manifest.xml, exactly what `galec` emits) and a Production Code
# representation (ProductionCode/: generated C99 + a manifest whose
# LogicalData maps every block variable and all three BlockMethods to the C
# entities). Co-emission of the Algorithm Code representation is mandatory
# per eFMI ch. 2.2 — a PC-only container is non-conformant. Every SHA-1 in
# the checksum web (__content.xml <-> both manifests <-> code files <-> PC
# ManifestReference <-> AC manifest bytes) is computed from the exact
# written bytes. "GALEC language conformance" (round-trip parse) remains
# unclaimed.
description = "eFMI Production Code export: eFMU container with generated C99 + LogicalData mapping manifest (ProductionCode/) and co-emitted Algorithm Code representation (AlgorithmCode/), directory and .efmu zip forms"
execution_mode = "packaged"
# deployment_class is the deployment FAMILY axis of `rumoca targets` (like
# "gpu" spanning cuda-c readiness levels), not a conformance claim; the
# honest rung claim lives in description/completion_message per GAL-021.
deployment_class = "efmi"
readiness_level = 2
# `build = "efmu"` packages this invocation's rendered files into the two
# eFMU package forms (directory + .efmu zip) — the build-kind pattern is the
# packaging mechanism, exactly like fmi3's `build = "fmu"`; no CLI flag.
# The AlgorithmCode/ and ProductionCode/ path prefixes below are the
# grouping contract with the efmu build step: one model representation per
# container directory, each rooted at its own manifest.xml.
build = "efmu"
completion_message = """eFMI Production Code eFMU written to: {{ out_dir }}
  {{ model_name }}/       eFMU container, directory form (__content.xml + schemas/ + AlgorithmCode/ + ProductionCode/)
  {{ model_name }}.efmu   eFMU container, zip form (same content, __content.xml at zip root)
Conformance: "eFMI Production Code export" (SPEC_0034 GAL-021/GAL-024) — schema-valid
eFMU with Algorithm Code + Production Code representations, all SHA-1 checksums
computed from the written bytes, LogicalData mapping every block variable and
method. Not yet claimed: GALEC language conformance (round-trip parse)."""

# Generic DAE capability gates (SPEC_0034 GAL-006), copied verbatim from
# the galec target: both consume the same DAE → GALEC projection, so
# admissibility is identical. The gates run before any rendering; the
# projection re-checks admissibility on the untouched DAE afterwards
# (GAL-004, additive) and owns the projection-scope wording (GAL-025).
[capabilities]
continuous_states = false
residual_equations = false
external_functions = false
external_tables = false
random = false
initialization = false
events = true
runtime_events = false
clocks = true
dynamic_ranges = false
dynamic_derivative_subscripts = false
forward_ad = false
reverse_ad = false
dynamic_control_flow = false
host_callbacks = false

# All five files are passthrough templates: the text is produced by the
# typed GALEC printer / eFMI XML serializers / typed C printer via the
# rumoca-compile galec-production facade (GAL-009 / D3); templates never
# author .alg, manifest, or C content. One facade call per invocation
# renders all five texts — the Production Code manifest checksums the exact
# Algorithm Code manifest and C file bytes of that same call, and the
# `build = "efmu"` container writer cross-checks each manifest's File
# checksums against the bytes rendered here (GAL-021: no placeholder
# checksums, ever).
[[files]]
path = "AlgorithmCode/{{ model_name }}.alg"
template = "model.alg.jinja"

[[files]]
path = "AlgorithmCode/manifest.xml"
template = "ac_manifest.xml.jinja"

[[files]]
path = "ProductionCode/{{ model_name }}.h"
template = "model.h.jinja"

[[files]]
path = "ProductionCode/{{ model_name }}.c"
template = "model.c.jinja"

[[files]]
path = "ProductionCode/manifest.xml"
template = "pc_manifest.xml.jinja"
