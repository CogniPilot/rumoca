version = 1
ir = "solve"
name = "cranelift-solve-jit"
description = "Manifest-only Cranelift Solve JIT target for future low-latency CPU execution"
execution_mode = "jit"
deployment_class = "cpu"
readiness_level = 0

[capabilities]
scalar_fallback = true
events = false
runtime_events = false
forward_ad = false
reverse_ad = false
dynamic_control_flow = false
host_callbacks = false

[capabilities.tensor]
matmul = "scalar"
linsolve = "scalar"
elementwise = "scalar"
reductions = "scalar"
layout = "row-major"
supports_dynamic_shapes = false
sparse = false
dtypes = ["f64"]
