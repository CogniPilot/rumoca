version = 1
ir = "solve"
name = "embedded-c"
description = "Embedded C header and implementation over Solve IR"
execution_mode = "compiled"
deployment_class = "cpu"
completion_message = """Embedded C sources compiled to: {{ out_dir }}
Compile: cc -O2 -Wall -c {{ out_dir }}/{{ model_name }}.c"""

[capabilities]
scalar_fallback = true
events = false
runtime_events = false
forward_ad = false
reverse_ad = false
dynamic_control_flow = false
host_callbacks = false

[capabilities.tensor]
matmul = "scalar"
linsolve = "scalar"
layout = "row-major"
supports_dynamic_shapes = false
sparse = false
dtypes = ["f64"]

[[files]]
path = "{{ model_name }}.h"
template = "model.h.jinja"

[[files]]
path = "{{ model_name }}.c"
template = "model.c.jinja"
