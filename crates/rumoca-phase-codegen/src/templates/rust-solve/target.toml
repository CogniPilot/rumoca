version = 1
ir = "solve"
name = "rust-solve"
description = "Rust Solve-IR derivative kernel using scalar fallback"
execution_mode = "compiled"
deployment_class = "cpu"
readiness_level = 2
completion_message = """Rust Solve kernel source compiled to: {{ out_dir }}
Compile: rustc --crate-type lib {{ out_dir }}/{{ model_name }}_solve.rs"""

[capabilities]
scalar_fallback = true
events = false
runtime_events = false
forward_ad = false
reverse_ad = false
dynamic_control_flow = false
host_callbacks = false

[capabilities.tensor]
matmul = "scalar"
linsolve = "scalar"
layout = "row-major"
supports_dynamic_shapes = false
sparse = false
dtypes = ["f64"]

[[files]]
path = "{{ model_name }}_solve.rs"
template = "model_solve.rs.jinja"
