version = 1
ir = "solve"
name = "fmi3"
description = "FMI 3.0 Model Exchange and Co-Simulation source tree"
execution_mode = "packaged"
deployment_class = "fmu"
build = "fmu"
completion_message = """FMU sources compiled to: {{ out_dir }}
Run ./build.sh to compile and package the .fmu"""

[[files]]
path = "modelDescription.xml"
template = "modelDescription.xml.jinja"
render_context = "fmi-model-description"

[[files]]
path = "sources/{{ model_name }}.c"
template = "model.c.jinja"

[[files]]
path = "sources/fmi3PlatformTypes.h"
template = "fmi3PlatformTypes.h.jinja"

[[files]]
path = "sources/fmi3FunctionTypes.h"
template = "fmi3FunctionTypes.h.jinja"

[[files]]
path = "sources/fmi3Functions.h"
template = "fmi3Functions.h.jinja"

[[files]]
path = "sources/buildDescription.xml"
template = "buildDescription.xml.jinja"

[[files]]
path = "sources/CMakeLists.txt"
template = "CMakeLists.txt.jinja"

[[files]]
path = "build.sh"
template = "build.sh.jinja"
mode = "0755"
