[package]
name = "rumoca-tool-lsp"
description = "Language Server Protocol implementation for Modelica"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "rumoca-lsp"
path = "src/main.rs"
required-features = ["server"]

[dependencies]
rumoca-compile = { workspace = true }
rumoca-phase-dae = { workspace = true }
# `rumoca-sim` is optional behind the `simulation` feature. The bare LSP
# (completions, hover, diagnostics) does not need solver backends, and
# WASM/light builds turn this off to keep simulation deps out of the graph.
rumoca-sim = { workspace = true, default-features = false, features = ["native-solvers"], optional = true }
rumoca-tool-fmt = { workspace = true }
tracing = { workspace = true }
rumoca-tool-lint = { workspace = true }
rumoca-lsp-position = { workspace = true }
lsp-types = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
clap = { workspace = true }
blake3 = { workspace = true }
toml = { workspace = true }

# Server-only dependencies (not needed for WASM)
tower-lsp = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }

[features]
default = ["server"]
# The server (tower-lsp + tokio) requires simulation support because the LSP
# server handler exposes the simulate_dae request. Light/WASM consumers
# that only need completions/hover/diagnostics use `default-features = false`
# to drop both server and simulation, keeping concrete solver backends
# (e.g. diffsol) out of the transitive graph.
server = ["dep:tower-lsp", "dep:tokio", "simulation"]
# Enables the simulate_dae entry points and pulls in rumoca-sim.
simulation = ["dep:rumoca-sim"]

[dev-dependencies]
futures-util = { workspace = true }

[lints]
workspace = true
