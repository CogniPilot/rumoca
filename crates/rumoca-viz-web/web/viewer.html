<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Rumoca SIL Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #eee; font-family: monospace; overflow: hidden; }
  #container { width: 100vw; height: 100vh; }
  #hud {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    background: rgba(30,20,10,0.75); padding: 10px 14px; border-radius: 6px;
    font-size: 13px; line-height: 1.6; backdrop-filter: blur(4px);
    border: 1px solid rgba(200,160,80,0.2);
    min-width: 175px;
  }
  #hud .label { color: #a89070; }
  #hud .val { color: #e8c840; font-weight: bold; }
  #status {
    position: fixed; top: 10px; right: 10px; z-index: 10;
    background: rgba(30,20,10,0.85); padding: 6px 12px; border-radius: 6px;
    font-size: 12px; line-height: 1.6; backdrop-filter: blur(4px);
    border: 1px solid rgba(200,160,80,0.2);
    font-family: monospace;
    min-width: 210px;
  }
  .panel-title {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; color: #eee; font-weight: bold;
  }
  .panel-toggle {
    background: transparent; border: 0; color: #e8c840; cursor: pointer;
    font-family: monospace; font-size: 13px; padding: 0 2px;
  }
  .collapsed .panel-body { display: none; }
  .panel-title button::after { content: "−"; }
  .collapsed .panel-title button::after { content: "+"; }
  #controls {
    position: fixed; bottom: 10px; right: 10px; z-index: 10;
    background: rgba(30,20,10,0.75); padding: 8px 14px; border-radius: 6px;
    font-size: 11px; line-height: 1.6; backdrop-filter: blur(4px);
    border: 1px solid rgba(200,160,80,0.2); max-width: 260px;
  }
  .connected { color: #4c4; }
  .disconnected { color: #c44; }
  #debug {
    position: fixed; bottom: 10px; left: 10px; z-index: 10;
    background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 6px;
    font-size: 10px; line-height: 1.4; backdrop-filter: blur(4px);
    border: 1px solid rgba(100,100,100,0.3); max-width: 500px;
    max-height: 200px; overflow-y: auto; color: #8f8;
    font-family: monospace; white-space: pre;
  }
  #flight-hud {
    position: fixed; inset: 0; z-index: 6; pointer-events: none;
    width: 100vw; height: 100vh;
  }
</style>
</head>
<body>
<div id="container"></div>
<canvas id="flight-hud"></canvas>
<div id="hud">
  <div class="panel-title">Rumoca SIL <button class="panel-toggle" data-collapse="hud" title="Collapse SIL status"></button></div>
  <div class="panel-body">
    <span class="label">t:</span> <span class="val" id="v-t">0.00</span>s<br>
    <span class="label">rate:</span> <span class="val" id="v-simrate">—</span>x<br>
    <span class="label">realtime:</span> <span class="val" id="v-realtime">ON</span><br>
    <span class="label">cam:</span> <span class="val" id="v-camera-mode">CHASE</span><br>
    <span class="label">hud:</span> <span class="val" id="v-hud-visible">ON</span><br>
    <span class="label">ws:</span> <span class="val" id="v-ws-state">pending</span>
    <span class="label">hz:</span> <span class="val" id="v-wsHz">—</span><br>
    <span class="label">msgs:</span> <span class="val" id="v-msgs">0</span>
    <span class="label">frames:</span> <span class="val" id="v-frames">0</span>
    <span id="debug-hud"><br><span class="label">render:</span> <span class="val" id="v-fps">—</span> fps</span>
  </div>
</div>
<div id="controls">
  <div class="panel-title"><span style="color:#e8c840">Controls</span> <button class="panel-toggle" data-collapse="controls" title="Collapse controls"></button></div>
  <div class="panel-body" id="ctrl-keyboard"></div>
  <div class="panel-body" id="ctrl-gamepad" style="display:none"></div>
</div>
<div id="status">
  <div class="panel-title"><span id="status-title">Vehicle</span> <button class="panel-toggle" data-collapse="status" title="Collapse vehicle status"></button></div>
  <div class="panel-body">
    <span id="armed-row"><span class="label">armed:</span> <span class="val" id="v-armed">no</span><br></span>
    <span class="label">input:</span> <span class="val" id="v-input">—</span><br>
    <span class="label">msg:</span> <span class="val" id="v-key">browser keys active</span>
  </div>
</div>
<div id="debug"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/loaders/GLTFLoader.js";

const WS_PORT = __WS_PORT__;
const DEBUG = __DEBUG__;
const VIEWER_CONFIG = __VIEWER_CONFIG__;

const DEFAULT_KEYBOARD_CONTROLS = [
  { keys: "Up / Down", action: "Roll" },
  { keys: "Left / Right", action: "Pitch" },
  { keys: "W / S", action: "Throttle" },
  { keys: "A / D", action: "Yaw" },
  { keys: "Space", action: "Arm / Disarm" },
  { keys: "R", action: "Reset" },
  { keys: "T", action: "Realtime" },
  { keys: "C", action: "Camera" },
  { keys: "H", action: "HUD" },
  { keys: "L", action: "Save debug log" },
  { keys: "Q", action: "Quit" },
];

const DEFAULT_GAMEPAD_CONTROLS = [
  { keys: "Left stick Y", action: "Throttle" },
  { keys: "Left stick X", action: "Yaw" },
  { keys: "Right stick Y", action: "Pitch" },
  { keys: "Right stick X", action: "Roll" },
  { keys: "Start", action: "Arm / Disarm" },
  { keys: "A / South", action: "Reset" },
  { keys: "T", action: "Realtime" },
  { keys: "C", action: "Camera" },
  { keys: "H", action: "HUD" },
  { keys: "Y / North", action: "Save debug log" },
];

function configuredControlItems(kind, defaults) {
  const items = VIEWER_CONFIG?.controls?.[kind];
  if (!Array.isArray(items) || items.length === 0) return defaults;
  return items
    .map((item) => ({
      keys: String(item?.keys ?? "").trim(),
      action: String(item?.action ?? "").trim(),
    }))
    .filter((item) => item.keys.length > 0 && item.action.length > 0);
}

function renderControlHelp(target, items) {
  const el = document.getElementById(target);
  if (!el) return;
  el.replaceChildren();
  for (const item of items) {
    const key = document.createElement("span");
    key.style.color = "#70b8e0";
    key.style.display = "inline-block";
    key.style.minWidth = "80px";
    key.textContent = item.keys;
    const action = document.createElement("span");
    action.style.color = "#a89070";
    action.textContent = item.action;
    el.appendChild(key);
    el.appendChild(document.createTextNode(" "));
    el.appendChild(action);
    el.appendChild(document.createElement("br"));
  }
}

function initializeViewerPresentation() {
  const title = String(VIEWER_CONFIG?.status_title ?? "Vehicle").trim() || "Vehicle";
  document.getElementById("status-title").textContent = title;
  renderControlHelp("ctrl-keyboard", configuredControlItems("keyboard", DEFAULT_KEYBOARD_CONTROLS));
  renderControlHelp("ctrl-gamepad", configuredControlItems("gamepad", DEFAULT_GAMEPAD_CONTROLS));
  if (VIEWER_CONFIG?.show_armed === false) {
    document.getElementById("armed-row").style.display = "none";
  }
}
initializeViewerPresentation();

function controlSignalOn(value) {
  if (value === true || value === 1) return true;
  if (typeof value === "string") {
    const normalized = value.trim().toLowerCase();
    return normalized === "1" || normalized === "true" || normalized === "yes" || normalized === "on";
  }
  return false;
}

// ── Debug log ─────────────────────────────────────────────────────
// The bottom-left panel is only shown in --debug mode; but dbg() events
// always go to the browser console so a user diagnosing a black screen
// can tell which pipeline stage stopped without re-running with --debug.
const debugEl = document.getElementById("debug");
if (!DEBUG) {
  debugEl.style.display = "none";
  document.getElementById("debug-hud").style.display = "none";
}
for (const button of document.querySelectorAll(".panel-toggle")) {
  button.addEventListener("click", () => {
    const panel = document.getElementById(button.dataset.collapse);
    if (panel) panel.classList.toggle("collapsed");
  });
}
const debugLines = [];
function dbg(msg) {
  const ts = (performance.now() / 1000).toFixed(1);
  console.log(`[viewer ${ts}s] ${msg}`);
  if (!DEBUG) return;
  debugLines.push(`[${ts}s] ${msg}`);
  if (debugLines.length > 30) debugLines.shift();
  debugEl.textContent = debugLines.join("\n");
  debugEl.scrollTop = debugEl.scrollHeight;
}

const pipeline = { three: false, scene: false, ws: "pending", msgs: 0, frames: 0 };
function renderPipeline() {
  const wsState = document.getElementById("v-ws-state");
  wsState.textContent = pipeline.ws;
  wsState.className = pipeline.ws === "open" ? "val connected" : "val disconnected";
  document.getElementById("v-msgs").textContent = String(pipeline.msgs);
  document.getElementById("v-frames").textContent = String(pipeline.frames);
}
pipeline.three = true;  // if we got here, Three.js imported successfully
renderPipeline();
dbg("Three.js imported");

// ── Three.js renderer ────────────────────────────────────────────
const container = document.getElementById("container");
container.tabIndex = 0;
const scene = new THREE.Scene();
scene.background = null;
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
camera.position.set(2, 3, 5);
camera.lookAt(0, 0, 0);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
container.appendChild(renderer.domElement);
container.focus({ preventScroll: true });
const flightHud = document.getElementById("flight-hud");
const flightHudCtx = flightHud.getContext("2d");

function resizeFlightHud() {
  const dpr = Math.min(devicePixelRatio || 1, 2);
  flightHud.width = Math.floor(innerWidth * dpr);
  flightHud.height = Math.floor(innerHeight * dpr);
  flightHud.style.width = `${innerWidth}px`;
  flightHud.style.height = `${innerHeight}px`;
  flightHudCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeFlightHud();

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  resizeFlightHud();
});

// Camera orbit state (mutable — scene script and mouse events update these)
const cam = { angle: -Math.PI / 2, elev: 0.35, dist: 4, target: new THREE.Vector3(0, 1, 0) };
let cameraMode = "chase";
let flightHudVisible = true;
const MIN_CAMERA_ELEV = 0.08;
const MAX_CAMERA_ELEV = 1.5;
container.addEventListener("wheel", (e) => {
  cam.dist = Math.max(1, Math.min(20, cam.dist + e.deltaY * 0.005));
});
let dragging = false, lastMX = 0, lastMY = 0;
container.addEventListener("pointerdown", () => container.focus({ preventScroll: true }));
container.addEventListener("mousedown", (e) => { dragging = true; lastMX = e.clientX; lastMY = e.clientY; });
container.addEventListener("mouseup", () => { dragging = false; });
container.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  cam.angle -= (e.clientX - lastMX) * 0.005;
  cam.elev = Math.max(MIN_CAMERA_ELEV, Math.min(MAX_CAMERA_ELEV, cam.elev + (e.clientY - lastMY) * 0.005));
  lastMX = e.clientX; lastMY = e.clientY;
});

// ── Load scene script ─────────────────────────────────────────────
const sceneState = {};
let sceneOnFrame = null;

try {
  const scriptText = await fetch("/scene.js").then(r => r.text());
  const ctx = {};
  new Function("ctx", scriptText)(ctx);
  if (ctx.onInit) {
    await ctx.onInit({ THREE, GLTFLoader, scene, renderer, state: sceneState, camera, cam });
  }
  sceneOnFrame = ctx.onFrame || null;
  pipeline.scene = true;
  renderPipeline();
  dbg("Scene loaded");
} catch (e) {
  dbg(`Scene error: ${e}`);
  console.error("Scene script error:", e);
  pipeline.scene = false;
  renderPipeline();
}

// ── Authoritative state from server ───────────────────────────────
let latestState = {};
let stateReceivedAt = 0; // performance.now() when last state arrived

// ── WebSocket (receive-only: state JSON from Rust sim) ────────────
let msgCount = 0;
let lastMsgTime = 0;
let wsHz = 0;
let activeWs = null;
let reconnectTimer = null;
let realtimeOn = true;

function toggleRealtime() {
  realtimeOn = !realtimeOn;
  document.getElementById("v-realtime").textContent = realtimeOn ? "ON" : "OFF";
  if (activeWs && activeWs.readyState === WebSocket.OPEN) {
    activeWs.send(JSON.stringify({ realtime: realtimeOn }));
  }
}

const heldControlKeys = new Map();
const repeatingControlKeys = new Set([
  "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "KeyW", "KeyA", "KeyS", "KeyD"
]);

function echoKey(message) {
  const keyEl = document.getElementById("v-key");
  if (keyEl) keyEl.textContent = message;
}

function sendKeyEvent(event, pressed = true) {
  if (!activeWs || activeWs.readyState !== WebSocket.OPEN) {
    echoKey(`${event.code} captured, WS closed`);
    return;
  }
  activeWs.send(JSON.stringify({
    key: {
      code: event.code,
      key: event.key,
      pressed,
      shift: event.shiftKey,
      ctrl: event.ctrlKey,
      alt: event.altKey,
    }
  }));
  echoKey(`${event.code} sent`);
}

function shouldCaptureKey(event) {
  const target = event.target;
  if (target && (
    target.tagName === "INPUT" ||
    target.tagName === "TEXTAREA" ||
    target.tagName === "SELECT" ||
    target.isContentEditable
  )) {
    return false;
  }
  return repeatingControlKeys.has(event.code)
    || event.code === "Space"
    || event.code === "KeyT"
    || event.code === "KeyC"
    || event.code === "KeyH"
    || event.code === "KeyR"
    || event.code === "KeyL"
    || event.code === "KeyQ";
}

document.addEventListener("keydown", (event) => {
  if (!shouldCaptureKey(event)) {
    echoKey(`${event.code} ignored`);
    return;
  }
  event.preventDefault();
  if (event.code === "KeyC") {
    if (!event.repeat) {
      cameraMode = cameraMode === "onboard" ? "chase" : "onboard";
      echoKey(`camera ${cameraMode}`);
    }
    return;
  }
  if (event.code === "KeyT") {
    if (!event.repeat) {
      toggleRealtime();
      echoKey(`realtime ${realtimeOn ? "on" : "off"}`);
    }
    return;
  }
  if (event.code === "KeyH") {
    if (!event.repeat) {
      flightHudVisible = !flightHudVisible;
      flightHud.style.display = flightHudVisible ? "" : "none";
      document.getElementById("v-hud-visible").textContent = flightHudVisible ? "ON" : "OFF";
      echoKey(`hud ${flightHudVisible ? "on" : "off"}`);
    }
    return;
  }
  echoKey(`${event.code} captured`);
  if (!event.repeat) {
    sendKeyEvent(event);
  }
  if (repeatingControlKeys.has(event.code)) {
    heldControlKeys.set(event.code, event);
  }
});

document.addEventListener("keyup", (event) => {
  heldControlKeys.delete(event.code);
  if (shouldCaptureKey(event)) {
    event.preventDefault();
    if (event.code === "KeyT" || event.code === "KeyC" || event.code === "KeyH") {
      return;
    }
    sendKeyEvent(event, false);
    echoKey(`${event.code} released`);
  }
});

window.addEventListener("blur", () => {
  for (const event of heldControlKeys.values()) {
    sendKeyEvent(event, false);
  }
  heldControlKeys.clear();
  echoKey("viewer lost focus");
});

function connectWs() {
  if (activeWs && (
    activeWs.readyState === WebSocket.CONNECTING ||
    activeWs.readyState === WebSocket.OPEN
  )) {
    return;
  }
  if (reconnectTimer) {
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
  }
  const protocol = location.protocol === "https:" ? "wss" : "ws";
  const url = `${protocol}://${location.hostname}:${WS_PORT}`;
  dbg(`WS connecting to ${url}`);
  pipeline.ws = "connecting";
  renderPipeline();
  const ws = new WebSocket(url);
  activeWs = ws;
  ws.onopen = () => {
    dbg("WS connected");
    echoKey("viewer focused: press a control key");
    pipeline.ws = "open";
    renderPipeline();
  };
  let lastFrame = -1;
  let droppedFrames = 0;
  ws.onmessage = (evt) => {
    try {
      latestState = JSON.parse(evt.data);
      stateReceivedAt = performance.now();
      msgCount++;
      pipeline.msgs = msgCount;
      if (msgCount === 1) {
        dbg(`first msg, keys=[${Object.keys(latestState).slice(0, 8).join(",")}...]`);
      }
      if (msgCount % 30 === 0) renderPipeline();
      const now = performance.now();
      if (lastMsgTime > 0) {
        const dt = now - lastMsgTime;
        if (dt > 0) wsHz = wsHz * 0.95 + (1000 / dt) * 0.05;
      }
      lastMsgTime = now;

      // Track dropped frames (gaps in frame numbers)
      const frame = latestState.frame ?? 0;
      if (lastFrame >= 0 && frame > lastFrame + 1) {
        droppedFrames += (frame - lastFrame - 1);
      }
      lastFrame = frame;

      // Measure latency (wall clock difference)
      const latency = Date.now() - (latestState.wall_ms ?? Date.now());

      if (msgCount % 60 === 1) {
        const s = latestState;
        dbg(`ws: ${wsHz.toFixed(0)}Hz latency=${latency}ms dropped=${droppedFrames} t=${s.t?.toFixed(1)} alt=${(s.pz ?? 0).toFixed(2)}`);
      }
    } catch (_) {}
  };
  ws.onclose = () => {
    if (ws !== activeWs) return;
    dbg("WS disconnected, reconnecting in 2s");
    pipeline.ws = "closed";
    renderPipeline();
    activeWs = null;
    reconnectTimer = setTimeout(connectWs, 2000);
  };
  ws.onerror = () => {
    if (ws !== activeWs) return;
    dbg("WS error");
    pipeline.ws = "error";
    renderPipeline();
    ws.close();
  };
}
connectWs();

// Press P in browser to download render position log (debug mode only)
document.addEventListener("keydown", (e) => {
  if (DEBUG && e.code === "KeyP" && window._renderLog) {
    const lines = window._renderLog.map(r =>
      `t=${r.renderTime.toFixed(1)} age=${r.stateAge.toFixed(1)}ms frame=${r.frame} raw_pz=${r.raw_pz?.toFixed(4)} render_pz=${r.render_pz?.toFixed(4)} vz=${r.vz?.toFixed(4)} q0=${r.q0?.toFixed(6)}`
    );
    const blob = new Blob([lines.join("\n")], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `render_log_${Date.now()}.txt`;
    a.click();
    URL.revokeObjectURL(url);
    dbg("Render log downloaded (" + window._renderLog.length + " frames)");
  }
});

// ── Render loop ───────────────────────────────────────────────────
let renderFps = 0;
let lastRenderTime = 0;
let firstStateWallMs = null;
const speedWindowSamples = [];
const SPEED_WINDOW_MS = 5000;

function drawFlightHud(state, roll, pitch, speed) {
  const ctx = flightHudCtx;
  const w = innerWidth;
  const h = innerHeight;
  ctx.clearRect(0, 0, w, h);
  if (!state || (!state.t && state.t !== 0)) return;

  const cx = w / 2;
  const cy = h / 2;
  const hudColor = "rgba(94, 255, 190, 0.92)";
  const hudDim = "rgba(94, 255, 190, 0.42)";
  const textShadow = "rgba(0, 0, 0, 0.75)";
  const pitchPxPerRad = Math.min(w, h) * 0.42;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-roll);
  ctx.translate(0, pitch * pitchPxPerRad);
  ctx.strokeStyle = hudColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-160, 0);
  ctx.lineTo(-35, 0);
  ctx.moveTo(35, 0);
  ctx.lineTo(160, 0);
  ctx.stroke();

  ctx.strokeStyle = hudDim;
  ctx.lineWidth = 1.5;
  ctx.font = "12px monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  for (let deg = -30; deg <= 30; deg += 10) {
    if (deg === 0) continue;
    const y = -deg * Math.PI / 180 * pitchPxPerRad;
    const half = Math.abs(deg) % 20 === 0 ? 72 : 45;
    ctx.beginPath();
    ctx.moveTo(-half, y);
    ctx.lineTo(-16, y);
    ctx.moveTo(16, y);
    ctx.lineTo(half, y);
    ctx.stroke();
    ctx.fillStyle = hudColor;
    ctx.fillText(String(Math.abs(deg)), -half - 18, y);
    ctx.fillText(String(Math.abs(deg)), half + 18, y);
  }
  ctx.restore();

  ctx.save();
  ctx.translate(cx, cy);
  ctx.strokeStyle = hudColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-18, 0);
  ctx.lineTo(-6, 0);
  ctx.lineTo(0, 8);
  ctx.lineTo(6, 0);
  ctx.lineTo(18, 0);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.translate(cx, 76);
  ctx.rotate(-roll);
  ctx.strokeStyle = hudColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, 54, Math.PI * 1.1, Math.PI * 1.9);
  ctx.stroke();
  for (const deg of [-45, -30, -15, 0, 15, 30, 45]) {
    const a = (deg - 90) * Math.PI / 180;
    const r1 = deg === 0 ? 43 : 48;
    const r2 = 56;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r1, Math.sin(a) * r1);
    ctx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
    ctx.stroke();
  }
  ctx.restore();

  function hudText(text, x, y, align = "left") {
    ctx.font = "15px monospace";
    ctx.textAlign = align;
    ctx.textBaseline = "middle";
    ctx.fillStyle = textShadow;
    ctx.fillText(text, x + 1, y + 1);
    ctx.fillStyle = hudColor;
    ctx.fillText(text, x, y);
  }

  const alt = Number(state.pz ?? 0);
  const throttle = Number(state.stick_throttle ?? state.rc_throttle ?? 0);
  const aileron = Number(state.stick_roll ?? 0);
  const elevator = Number(state.stick_pitch ?? 0);
  const rudder = Number(state.stick_yaw ?? 0);
  hudText(`ALT ${alt.toFixed(1)} m`, w - 34, cy - 40, "right");
  hudText(`SPD ${speed.toFixed(1)} m/s`, 34, cy - 40);
  hudText(`ROLL ${(roll * 180 / Math.PI).toFixed(1)}°`, 34, cy + 44);
  hudText(`PITCH ${(pitch * 180 / Math.PI).toFixed(1)}°`, w - 34, cy + 44, "right");
  hudText(
    `AIL ${aileron.toFixed(2)}  ELE ${elevator.toFixed(2)}  RUD ${rudder.toFixed(2)}  THR ${throttle.toFixed(2)}`,
    cx,
    h - 44,
    "center"
  );
}

function vehicleThreeMatrix(state) {
  const px = state.px ?? 0, py = state.py ?? 0, pz = state.pz ?? 0;
  const q0 = state.q0 ?? 1, q1 = state.q1 ?? 0, q2 = state.q2 ?? 0, q3 = state.q3 ?? 0;

  const R11 = 1-2*(q2*q2+q3*q3), R12 = 2*(q1*q2-q0*q3), R13 = 2*(q1*q3+q0*q2);
  const R21 = 2*(q1*q2+q0*q3), R22 = 1-2*(q1*q1+q3*q3), R23 = 2*(q2*q3-q0*q1);
  const R31 = 2*(q1*q3-q0*q2), R32 = 2*(q2*q3+q0*q1), R33 = 1-2*(q1*q1+q2*q2);
  const m = new THREE.Matrix4();
  m.set(
    R22,  -R23, -R21, -py,
   -R32,   R33,  R31,  pz,
   -R12,   R13,  R11,  px,
      0,     0,    0,   1
  );
  return m;
}

function visualAttitudeFromMatrix(m) {
  const forward = new THREE.Vector3(-1, 0, 0).transformDirection(m);
  const right = new THREE.Vector3(0, 0, 1).transformDirection(m);
  const up = new THREE.Vector3(0, 1, 0).transformDirection(m);
  return {
    roll: Math.atan2(right.y, up.y),
    pitch: Math.asin(Math.max(-1, Math.min(1, forward.y))),
  };
}

function applyOnboardCamera(state) {
  const m = vehicleThreeMatrix(state);
  const mount = new THREE.Vector3(0.95, 0.18, 0).applyMatrix4(m);
  const forward = new THREE.Vector3(1, 0, 0).transformDirection(m);
  const up = new THREE.Vector3(0, 1, 0).transformDirection(m);
  camera.position.copy(mount);
  camera.up.copy(up);
  camera.lookAt(mount.clone().add(forward));
}

function rollingRealtimeSpeed(wallMs, simTime) {
  if (!Number.isFinite(wallMs) || !Number.isFinite(simTime)) return NaN;
  const last = speedWindowSamples[speedWindowSamples.length - 1];
  if (last && (wallMs < last.wallMs || simTime < last.simTime)) {
    speedWindowSamples.length = 0;
  }
  speedWindowSamples.push({ wallMs, simTime });
  while (
    speedWindowSamples.length > 1 &&
    wallMs - speedWindowSamples[0].wallMs > SPEED_WINDOW_MS
  ) {
    speedWindowSamples.shift();
  }
  const first = speedWindowSamples[0];
  const wallSeconds = (wallMs - first.wallMs) / 1000;
  return wallSeconds > 0.05 ? (simTime - first.simTime) / wallSeconds : NaN;
}

function animate() {
  requestAnimationFrame(animate);

  // FPS tracking
  const now = performance.now();
  if (lastRenderTime > 0) {
    const dt = now - lastRenderTime;
    if (dt > 0) renderFps = renderFps * 0.95 + (1000 / dt) * 0.05;
  }
  lastRenderTime = now;

  const s = latestState;
  if (!s.t && s.t !== 0) { renderer.render(scene, camera); return; }

  // Render only authoritative simulator state. Extrapolating during lockstep
  // makes the vehicle move without input packets; extrapolating during
  // realtime can overshoot and snap backward when the next state arrives.
  const dtExtrap = (performance.now() - stateReceivedAt) / 1000;
  function getAuthoritative(name) {
    const val = s[name];
    if (val === undefined) return undefined;
    return val;
  }

  // Record render positions for debugging (debug mode only)
  if (DEBUG) {
    if (!window._renderLog) window._renderLog = [];
    const _rpz = getAuthoritative("pz");
    window._renderLog.push({
      renderTime: now,
      stateAge: dtExtrap * 1000,
      frame: s.frame,
      raw_pz: s.pz,
      render_pz: _rpz,
      vz: s.vz,
      q0: s.q0,
    });
    if (window._renderLog.length > 600) window._renderLog.shift();
  }

  // Call scene script with authoritative state
  if (sceneOnFrame) {
    try {
      sceneOnFrame({
        THREE, scene, state: sceneState,
        get: getAuthoritative,
        motors: s,
        camera, cam,
        cameraMode,
      });
    } catch (e) {
      dbg(`Scene error: ${e}`);
      console.error("Scene onFrame error:", e);
      sceneOnFrame = null;
    }
  }

  // HUD
  const pz = s.pz ?? 0;
  const vx = s.vx ?? 0, vy = s.vy ?? 0, vz = s.vz ?? 0;

  document.getElementById("v-t").textContent = (s.t ?? 0).toFixed(2);
  const attitude = visualAttitudeFromMatrix(vehicleThreeMatrix(s));
  const hudRoll = attitude.roll;
  const hudPitch = attitude.pitch;
  document.getElementById("v-armed").textContent = controlSignalOn(s.armed) ? "YES" : "no";
  if (Number.isFinite(s.wall_ms) && Number.isFinite(s.t)) {
    if (firstStateWallMs === null) {
      firstStateWallMs = s.wall_ms;
    }
    const speed = rollingRealtimeSpeed(s.wall_ms, s.t);
    document.getElementById("v-simrate").textContent = Number.isFinite(speed) ? speed.toFixed(2) : "—";
  }
  document.getElementById("v-fps").textContent = renderFps.toFixed(0);
  document.getElementById("v-wsHz").textContent = wsHz.toFixed(0);
  const inputMode = s.input_mode ?? "keyboard";
  document.getElementById("v-input").textContent = inputMode;
  document.getElementById("ctrl-keyboard").style.display = inputMode === "keyboard" ? "" : "none";
  document.getElementById("ctrl-gamepad").style.display = inputMode === "gamepad" ? "" : "none";
  document.getElementById("v-camera-mode").textContent = cameraMode.toUpperCase();
  if (typeof s.input_message === "string" && s.input_message.length > 0) {
    echoKey(s.input_message);
  }

  if (cameraMode === "onboard") {
    applyOnboardCamera(s);
  } else {
    camera.up.set(0, 1, 0);
  }
  if (flightHudVisible) {
    drawFlightHud(s, hudRoll, hudPitch, Math.sqrt(vx*vx + vy*vy + vz*vz));
  }

  renderer.render(scene, camera);
  pipeline.frames++;
  if (pipeline.frames <= 3 || pipeline.frames % 60 === 0) renderPipeline();
}
requestAnimationFrame(animate);
</script>
</body>
</html>
