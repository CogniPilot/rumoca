# Cargo configuration for rumoca
# See: https://doc.rust-lang.org/cargo/reference/config.html

[env]
# Use python3 for pyo3 bindings (some systems don't have /usr/bin/python)
PYO3_PYTHON = "/usr/bin/python3"
# Default MSL cache directory at workspace root for all Cargo invocations.
RUMOCA_MSL_CACHE_DIR = "target/msl"

# Enable getrandom wasm_js backend for WASM builds (required by rand/diffsol)
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
