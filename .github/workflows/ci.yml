name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  detect-release-tag:
    name: Detect release tag on commit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    outputs:
      is_release: ${{ steps.detect.outputs.is_release }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect v* tag for current commit
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tags < <(git tag --points-at "$GITHUB_SHA" 'v*' | sort -V)
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "No v* tag detected on $GITHUB_SHA"
            exit 0
          fi

          tag="${tags[$((${#tags[@]} - 1))]}"
          if [ "${#tags[@]}" -gt 1 ]; then
            echo "::warning::Multiple v* tags point at $GITHUB_SHA: ${tags[*]}. Using $tag."
          fi

          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Detected release tag: $tag"

  # ============================================================================
  # Rust Testing
  # ============================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)" --component rustfmt,clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check Rust file line count (SPEC_0021)
        run: cargo run --quiet --bin rum -- check-rust-file-lines --all-files

      - name: Enforce traversal policy
        run: cargo run --quiet --bin rumoca-traversal-policy-check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache MSL
        uses: actions/cache@v4
        id: msl-cache
        with:
          path: target/msl
          key: msl-v4.1.0-workspace

      - name: Download MSL
        if: steps.msl-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p target/msl
          curl -L -o target/msl/msl-v4.1.0.tar.gz \
            https://github.com/modelica/ModelicaStandardLibrary/archive/refs/tags/v4.1.0.tar.gz
          tar -xzf target/msl/msl-v4.1.0.tar.gz -C target/msl
          rm target/msl/msl-v4.1.0.tar.gz

      - name: Run tests
        run: cargo test --workspace --verbose --exclude rumoca-bind-python --exclude rumoca-bind-wasm

      - name: Build all binaries
        run: cargo build --verbose --bin rumoca --bin rumoca-lsp

  docker-ci-smoke:
    name: Docker CI Image Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build packaged CI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/docker/Dockerfile
          target: ci
          tags: rumoca-ci:test
          load: true
          cache-from: type=gha,scope=rumoca-docker-ci
          cache-to: type=gha,mode=min,scope=rumoca-docker-ci

      - name: Run packaged CI smoke
        shell: bash
        run: |
          RUMOCA_DOCKER_SKIP_BUILD=1 \
          RUMOCA_CI_IMAGE=rumoca-ci:test \
          bash packaging/docker/smoke/ci.sh

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup component add llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate workspace coverage artifacts
        run: |
          cargo run --bin rum -- coverage

      - name: Generate trim candidate inventory
        run: |
          cargo run --bin rum -- coverage-report

      - name: Enforce coverage regression gate
        run: |
          cargo run --bin rum -- coverage-gate --allowed-workspace-line-coverage-drop 6.0

  msl-quality-gate:
    name: MSL Quality Gate
    # Temporary disable: hosted-runner shutdowns are intermittently canceling this
    # long job on main before the harness can complete.
    if: ${{ false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache MSL
        uses: actions/cache@v4
        id: msl-cache
        with:
          path: target/msl
          key: msl-v4.1.0-workspace

      - name: Download MSL
        if: steps.msl-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p target/msl
          curl -L -o target/msl/msl-v4.1.0.tar.gz \
            https://github.com/modelica/ModelicaStandardLibrary/archive/refs/tags/v4.1.0.tar.gz
          tar -xzf target/msl/msl-v4.1.0.tar.gz -C target/msl
          rm target/msl/msl-v4.1.0.tar.gz

      - name: Install OpenModelica
        shell: bash
        run: |
          set -euo pipefail
          if command -v omc >/dev/null 2>&1; then
            echo "OpenModelica already available:"
            omc --version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg
          sudo curl -fsSL http://build.openmodelica.org/apt/openmodelica.asc | \
            sudo gpg --dearmor -o /usr/share/keyrings/openmodelica-keyring.gpg
          codename="$(
            . /etc/os-release
            echo "${UBUNTU_CODENAME:-${VERSION_CODENAME}}"
          )"
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/openmodelica-keyring.gpg] \
            https://build.openmodelica.org/apt ${codename} stable" | \
            sudo tee /etc/apt/sources.list.d/openmodelica.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends omc
          omc --version

      - name: Resolve OMC parity cache metadata
        id: omc-meta
        shell: bash
        run: |
          set -euo pipefail
          omc_version="$(omc --version | head -n1 | tr -d '\r')"
          omc_version_hash="$(printf '%s' "$omc_version" | sha256sum | cut -c1-16)"
          echo "version=$omc_version" >> "$GITHUB_OUTPUT"
          echo "version_hash=$omc_version_hash" >> "$GITHUB_OUTPUT"
          echo "OMC parity cache key metadata: version='$omc_version' hash=$omc_version_hash"

      - name: Restore OMC parity cache
        id: omc-parity-cache
        uses: actions/cache/restore@v4
        with:
          path: target/msl/results/omc_parity_cache
          key: ${{ runner.os }}-omc-parity-v2-${{ steps.omc-meta.outputs.version_hash }}-${{ hashFiles('crates/rumoca-test-msl/tests/msl_tests/msl_simulation_targets_180.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-omc-parity-v2-${{ steps.omc-meta.outputs.version_hash }}-${{ hashFiles('crates/rumoca-test-msl/tests/msl_tests/msl_simulation_targets_180.json') }}-

      - name: Build MSL gate helper binaries
        run: |
          cargo build --release --package rumoca-test-msl --bin rumoca-sim-worker
          cargo build --release --package rumoca-tool-dev --bin rumoca-msl-tools

      - name: Run full MSL quality gate
        run: |
          RUMOCA_SIM_WORKER_EXE=target/release/rumoca-sim-worker \
          RUMOCA_MSL_TOOLS_EXE=target/release/rumoca-msl-tools \
          RUMOCA_MSL_CACHE_DIR=target/msl \
          cargo test --release --package rumoca-test-msl --test msl_tests \
            balance_pipeline::balance_pipeline_core::test_msl_all -- --ignored --nocapture

      - name: Ensure OMC parity cache directory exists
        if: always()
        run: mkdir -p target/msl/results/omc_parity_cache

      - name: Save OMC parity cache
        if: always() && steps.omc-parity-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: target/msl/results/omc_parity_cache
          key: ${{ runner.os }}-omc-parity-v2-${{ steps.omc-meta.outputs.version_hash }}-${{ hashFiles('crates/rumoca-test-msl/tests/msl_tests/msl_simulation_targets_180.json') }}-${{ github.sha }}

  # ============================================================================
  # Documentation
  # ============================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build documentation
        run: cargo doc --workspace --no-deps --exclude rumoca-bind-python --exclude rumoca-bind-wasm
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: target/doc/

  # ============================================================================
  # WebAssembly Build & GitHub Pages
  # ============================================================================
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly with rust-src
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add wasm32-unknown-unknown
          rustup component add rust-src

      - name: Install wasm-bindgen-cli (lockfile-matched)
        shell: bash
        run: |
          set -euo pipefail
          WASM_BINDGEN_VERSION="$(
            python3 -c 'import pathlib, tomllib; lock = tomllib.loads(pathlib.Path("Cargo.lock").read_text()); versions = sorted({pkg["version"] for pkg in lock.get("package", []) if pkg.get("name") == "wasm-bindgen"}); assert versions, "Failed to find wasm-bindgen in Cargo.lock"; print(versions[-1])'
          )"
          echo "Installing wasm-bindgen-cli v${WASM_BINDGEN_VERSION} to match Cargo.lock"
          cargo install wasm-bindgen-cli --version "${WASM_BINDGEN_VERSION}" --locked --force

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Run rumoca-bind-wasm Rust tests
        run: cargo test -p rumoca-bind-wasm --verbose

      - name: Build WASM package
        run: |
          cargo build -p rumoca-bind-wasm --lib --release \
            --target wasm32-unknown-unknown

          mkdir -p pkg
          wasm-bindgen \
            --target web \
            --out-dir pkg \
            --out-name rumoca \
            target/wasm32-unknown-unknown/release/rumoca_bind_wasm.wasm

          cp editors/wasm/rumoca_worker.js pkg/
          ls -lh pkg/

      - name: Run WASM simulation regression test
        run: |
          node editors/wasm/tests/simulate_smoke.mjs

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p gh-pages/pkg

          cp pkg/rumoca.js gh-pages/pkg/
          cp pkg/rumoca_bg.wasm gh-pages/pkg/
          cp pkg/rumoca_worker.js gh-pages/pkg/
          cp pkg/index.js gh-pages/pkg/ 2>/dev/null || true
          cp -r pkg/snippets gh-pages/pkg/ 2>/dev/null || true

          find gh-pages/pkg/snippets -name "workerHelpers.js" -exec \
            sed -i "s|import('../../..')|import('../../../rumoca.js')|g" {} \; 2>/dev/null || true

          cp editors/wasm/rumoca.png gh-pages/
          cp editors/wasm/coi-serviceworker.js gh-pages/
          cp -r editors/wasm/src gh-pages/

          sed 's|\.\./\.\./pkg/|./pkg/|g' \
              editors/wasm/index.html > gh-pages/index.html

          echo "=== GitHub Pages content ==="
          find gh-pages -type f

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-package
          path: pkg/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

  # ============================================================================
  # Cross-platform Rust binary builds
  # ============================================================================
  build-rust-binaries:
    name: Build Rust (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Use musl for Linux x64 release artifacts so the bundled VS Code
          # server does not depend on the remote host glibc version.
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            rumoca_asset: rumoca-linux-x86_64
            lsp_asset: rumoca-lsp-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            rumoca_asset: rumoca-linux-aarch64
            lsp_asset: rumoca-lsp-linux-aarch64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            rumoca_asset: rumoca-macos-x86_64
            lsp_asset: rumoca-lsp-macos-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            rumoca_asset: rumoca-macos-aarch64
            lsp_asset: rumoca-lsp-macos-aarch64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            rumoca_asset: rumoca-windows-x86_64.exe
            lsp_asset: rumoca-lsp-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools (Linux musl)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Configure musl build (Linux musl)
        if: contains(matrix.target, 'musl')
        run: |
          mkdir -p .cargo
          target_env_suffix="$(echo '${{ matrix.target }}' | tr '-' '_')"
          target_env_upper="$(echo '${{ matrix.target }}' | tr '[:lower:]-' '[:upper:]_')"
          cat >> .cargo/config.toml <<'EOF'
          [target.${{ matrix.target }}]
          linker = "musl-gcc"
          rustflags = ["-C", "link-arg=-static"]
          EOF
          echo "CC_${target_env_suffix}=musl-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_${target_env_upper}_LINKER=musl-gcc" >> $GITHUB_ENV

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin rumoca --bin rumoca-lsp

      - name: Strip binaries (Linux native)
        if: runner.os == 'Linux'
        run: |
          strip target/${{ matrix.target }}/release/rumoca
          strip target/${{ matrix.target }}/release/rumoca-lsp

      - name: Verify Linux musl release artifacts
        if: contains(matrix.target, 'musl')
        run: |
          set -euo pipefail

          rumoca_bin="target/${{ matrix.target }}/release/rumoca"
          lsp_bin="target/${{ matrix.target }}/release/rumoca-lsp"

          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              expected_machine="Advanced Micro Devices X86-64"
              ;;
            aarch64-unknown-linux-musl)
              expected_machine="AArch64"
              ;;
            *)
              echo "::error::unexpected musl release target: ${{ matrix.target }}"
              exit 1
              ;;
          esac

          echo "Inspecting $rumoca_bin"
          file "$rumoca_bin"
          readelf -h "$rumoca_bin" | grep -F "$expected_machine"
          if readelf -l "$rumoca_bin" | grep -F "Requesting program interpreter" >/dev/null; then
            echo "::error::$rumoca_bin unexpectedly depends on a dynamic ELF interpreter"
            exit 1
          fi
          ldd "$rumoca_bin" || true
          "$rumoca_bin" --version

          echo "Inspecting $lsp_bin"
          file "$lsp_bin"
          readelf -h "$lsp_bin" | grep -F "$expected_machine"
          if readelf -l "$lsp_bin" | grep -F "Requesting program interpreter" >/dev/null; then
            echo "::error::$lsp_bin unexpectedly depends on a dynamic ELF interpreter"
            exit 1
          fi
          ldd "$lsp_bin" || true
          "$lsp_bin" --version

      - name: Strip binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          strip target/${{ matrix.target }}/release/rumoca
          strip target/${{ matrix.target }}/release/rumoca-lsp

      - name: Upload rumoca binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rumoca_asset }}
          path: ./target/${{ matrix.target }}/release/rumoca${{ startsWith(matrix.target, 'x86_64-pc-windows-') && '.exe' || '' }}

      - name: Upload LSP binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.lsp_asset }}
          path: ./target/${{ matrix.target }}/release/rumoca-lsp${{ startsWith(matrix.target, 'x86_64-pc-windows-') && '.exe' || '' }}

  build-python-wheels:
    name: Build Python (${{ matrix.name }})
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            name: macos-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            name: macos-aarch64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            name: windows-x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Add target
        if: matrix.target != 'x86_64-pc-windows-msvc'
        run: rustup target add ${{ matrix.target }}

      - name: Install maturin
        run: pip install maturin

      - name: Build wheels
        shell: bash
        run: |
          cd crates/rumoca-bind-python
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            maturin build --release --out dist
          else
            maturin build --release --out dist --target ${{ matrix.target }}
          fi

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: crates/rumoca-bind-python/dist

  build-python-sdist:
    name: Build Python sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: |
          cd crates/rumoca-bind-python
          maturin sdist --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: crates/rumoca-bind-python/dist

  # ============================================================================
  # Deployment (only on tags, after verification and build completion)
  # ============================================================================
  deploy:
    name: Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-release-tag.outputs.is_release == 'true'
    needs: [detect-release-tag, lint, test, coverage-gate, docs, build-wasm, build-rust-binaries, build-python-wheels, build-python-sdist]
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          if ! git tag --points-at "${{ github.sha }}" | grep -Fx "${{ needs.detect-release-tag.outputs.tag }}" >/dev/null; then
            echo "::error::Detected release tag '${{ needs.detect-release-tag.outputs.tag }}' is not on commit ${{ github.sha }}"
            exit 1
          fi
          echo "Release tag '${{ needs.detect-release-tag.outputs.tag }}' points to current main commit"

      - name: Get tag name
        id: tag
        run: echo "name=${{ needs.detect-release-tag.outputs.tag }}" >> $GITHUB_OUTPUT

      - name: Distribution policy note
        run: |
          echo "As of v0.8.0, Rust distribution is via GitHub Releases binaries (not crates.io)."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup Node.js for VSIX packaging
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install VS Code extension dependencies
        shell: bash
        run: |
          cd editors/vscode
          npm ci

      - name: Organize artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          echo "=== Downloaded structure ==="
          find artifacts -type f | head -50

          # Move Rust binaries
          for dir in artifacts/rumoca*; do
            if [ -d "$dir" ]; then
              echo "Processing Rust artifact: $dir"
              artifact_name="$(basename "$dir")"
              source_file="$(find "$dir" -maxdepth 1 -type f | head -n 1)"
              if [ -z "$source_file" ]; then
                echo "No binary file found under $dir; skipping"
                continue
              fi
              cp "$source_file" "release-assets/$artifact_name"
            fi
          done

          # Move Python wheels/sdist
          for dir in artifacts/wheels-*; do
            if [ -d "$dir" ]; then
              echo "Processing Python artifact: $dir"
              find "$dir" -maxdepth 1 -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} release-assets/ \;
            fi
          done

          # Package VS Code extensions at deployment time from the released LSP binaries.
          map_target() {
            case "$1" in
              linux-x64)
                printf '%s\n' 'rumoca-lsp-linux-x86_64|rumoca-lsp'
                ;;
              linux-arm64)
                printf '%s\n' 'rumoca-lsp-linux-aarch64|rumoca-lsp'
                ;;
              darwin-x64)
                printf '%s\n' 'rumoca-lsp-macos-x86_64|rumoca-lsp'
                ;;
              darwin-arm64)
                printf '%s\n' 'rumoca-lsp-macos-aarch64|rumoca-lsp'
                ;;
              win32-x64)
                printf '%s\n' 'rumoca-lsp-windows-x86_64.exe|rumoca-lsp.exe'
                ;;
              *)
                return 1
                ;;
            esac
          }

          for vscode_target in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64; do
            IFS='|' read -r artifact_name binary_name <<<"$(map_target "$vscode_target")"
            artifact_dir="artifacts/${artifact_name}"
            if [ ! -d "$artifact_dir" ]; then
              echo "::error::Missing LSP artifact directory for $vscode_target: $artifact_dir"
              exit 1
            fi
            source_file="$(find "$artifact_dir" -maxdepth 1 -type f | head -n 1)"
            if [ -z "$source_file" ]; then
              echo "::error::No LSP binary found under $artifact_dir"
              exit 1
            fi

            echo "Packaging VSIX for $vscode_target from $source_file"
            rm -f editors/vscode/bin/* editors/vscode/*.vsix
            mkdir -p editors/vscode/bin
            cp "$source_file" "editors/vscode/bin/$binary_name"
            chmod +x "editors/vscode/bin/$binary_name" 2>/dev/null || true

            (
              cd editors/vscode
              npx @vscode/vsce package --target "$vscode_target" --no-dependencies --no-yarn
            )

            vsix_file="$(find editors/vscode -maxdepth 1 -type f -name '*.vsix' | head -n 1)"
            if [ -z "$vsix_file" ]; then
              echo "::error::VSIX packaging did not produce an artifact for $vscode_target"
              exit 1
            fi
            cp "$vsix_file" "release-assets/$(basename "$vsix_file")"
          done

          echo "=== Release assets ==="
          ls -la release-assets/

      # Create GitHub Release
      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.tag.outputs.name }} \
            --title "Release ${{ steps.tag.outputs.name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          cd release-assets
          for file in *; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload ${{ steps.tag.outputs.name }} "$file" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish Python packages to PyPI
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip twine
          shopt -s nullglob
          python_files=(release-assets/*.whl release-assets/*.tar.gz)
          if [ "${#python_files[@]}" -eq 0 ]; then
            echo "::error::No Python distribution artifacts found in release-assets"
            exit 1
          fi
          python -m twine upload --skip-existing "${python_files[@]}"
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      # Rust binary and VS Code extension artifacts are distributed via GitHub Releases.
