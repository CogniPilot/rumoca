name: CI

on:
  push:
    branches: ['main']
    tags: ['v*']
  pull_request:
    branches: ['main']

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  issues: write
  pages: write
  packages: read
  pull-requests: write

jobs:
  detect-release-tag:
    name: Detect release tag on commit
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-24.04
    outputs:
      is_release: ${{ steps.detect.outputs.is_release }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 0
          fetch-tags: true

      - name: Detect v* tag for current commit
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tags < <(git tag --points-at "$GITHUB_SHA" 'v*' | sort -V)
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "No v* tag detected on $GITHUB_SHA"
            exit 0
          fi

          tag="${tags[$((${#tags[@]} - 1))]}"
          if [ "${#tags[@]}" -gt 1 ]; then
            echo "::warning::Multiple v* tags point at $GITHUB_SHA: ${tags[*]}. Using $tag."
          fi

          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Detected release tag: $tag"

  # ============================================================================
  # Rust Testing
  # ============================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Install system dependencies
        run: scripts/ci/apt-install.sh libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)" --component rustfmt,clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run lint gate
        run: cargo xtask verify lint

      - name: Run architecture review scan
        if: github.event_name == 'pull_request'
        run: |
          cargo xtask repo review-scan \
            --base origin/${{ github.base_ref }} \
            --head HEAD \
            --out target/review/review-scan.json \
            --fail-on-forbidden

      - name: Upload architecture review scan
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v6
        with:
          name: architecture-review-scan
          path: target/review/review-scan.json
          if-no-files-found: ignore

      - name: Check generated Modelica parser is current
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- crates/rumoca-phase-parse/src/generated

      - name: Generate crate DAG release artifact
        run: cargo xtask repo graph crates --format dot

      - name: Upload crate DAG artifact
        uses: actions/upload-artifact@v6
        with:
          name: crate-dag
          path: target/crate-dag/workspace-crate-dag.dot
          if-no-files-found: error

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: scripts/ci/apt-install.sh libudev-dev

      - name: Cache rustup toolchain
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: ${{ runner.os }}-rustup-test-v2-${{ hashFiles('rust-toolchain.toml') }}

      - name: Install Rust
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          toolchain="$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
          fi
          rustup set profile minimal
          if ! rustup toolchain list | grep -Eq "^${toolchain}"; then
            rustup toolchain install "$toolchain"
          fi
          if ! rustup component list --toolchain "$toolchain" --installed | grep -qx 'rust-src'; then
            rustup component add rust-src --toolchain "$toolchain"
          fi
          if ! rustup target list --toolchain "$toolchain" --installed | grep -qx 'wasm32-unknown-unknown'; then
            rustup target add wasm32-unknown-unknown --toolchain "$toolchain"
          fi
          rustup default "$toolchain"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache MSL
        uses: actions/cache@v5
        continue-on-error: true
        id: msl-cache
        with:
          path: target/msl/ModelicaStandardLibrary-4.1.0
          key: msl-v4.1.0-release-zip-layout-v2

      - name: Cache CMM
        uses: actions/cache@v5
        continue-on-error: true
        id: cmm-cache
        with:
          path: target/cmm/CMM-v0.0.2
          key: cmm-v0.0.2-ec233a25a0875d2ba1d07f4199a25c8eeb86694d3f9867394d2ae50e41574508

      - name: Ensure MSL
        shell: bash
        run: |
          set -euo pipefail
          msl_dir=target/msl/ModelicaStandardLibrary-4.1.0
          if [[ -f "$msl_dir/Complex.mo" && -f "$msl_dir/Modelica 4.1.0/package.mo" ]]; then
            echo "MSL cache is valid at $msl_dir"
            exit 0
          fi
          rm -rf "$msl_dir"
          mkdir -p "$msl_dir"
          curl -L -o target/msl/msl-v4.1.0.zip \
            https://github.com/modelica/ModelicaStandardLibrary/releases/download/v4.1.0/ModelicaStandardLibrary_v4.1.0.zip
          unzip -q target/msl/msl-v4.1.0.zip -d "$msl_dir"
          rm target/msl/msl-v4.1.0.zip
          test -f "$msl_dir/Complex.mo"
          test -f "$msl_dir/Modelica 4.1.0/package.mo"

      - name: Run example build smoke (Linux monitored)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          monitor() {
            while true; do
              echo "== resource snapshot: $(date -Is) =="
              df -h . /tmp /home/runner/actions-runner/cached 2>/dev/null || true
              free -h || true
              du -sh target target/debug target/debug/deps target/debug/incremental target/msl target/cmm ~/.rustup ~/.cargo ~/.cargo/registry ~/.cargo/git /home/runner/actions-runner/cached/_diag 2>/dev/null || true
              ps -eo pid,ppid,%cpu,%mem,rss,vsz,comm,args --sort=-rss | head -n 15 || true
              sleep 60
            done
          }
          monitor &
          monitor_pid=$!
          trap 'kill "$monitor_pid" 2>/dev/null || true' EXIT
          cargo xtask verify examples

      - name: Run example build smoke
        if: runner.os != 'Linux'
        run: cargo xtask verify examples

      # `!cancelled()` keeps the test step running when the example smoke step
      # fails, so a smoke regression cannot hide test failures (the job still
      # fails on the smoke step).
      - name: Run tests (Linux monitored)
        if: runner.os == 'Linux' && !cancelled()
        env:
          REQUIRE_MSL_FMT_DRIFT: "1"
        shell: bash
        run: |
          set -euo pipefail
          monitor() {
            while true; do
              echo "== resource snapshot: $(date -Is) =="
              df -h . /tmp /home/runner/actions-runner/cached 2>/dev/null || true
              free -h || true
              du -sh target target/debug target/debug/deps target/debug/incremental target/msl target/cmm ~/.rustup ~/.cargo ~/.cargo/registry ~/.cargo/git /home/runner/actions-runner/cached/_diag 2>/dev/null || true
              ps -eo pid,ppid,%cpu,%mem,rss,vsz,comm,args --sort=-rss | head -n 15 || true
              sleep 60
            done
          }
          monitor &
          monitor_pid=$!
          trap 'kill "$monitor_pid" 2>/dev/null || true' EXIT
          cargo xtask verify workspace

      - name: Run tests
        if: runner.os != 'Linux' && !cancelled()
        env:
          REQUIRE_MSL_FMT_DRIFT: "1"
        run: cargo xtask verify workspace

      - name: Build all binaries
        run: cargo xtask verify binaries

  template-runtime-tests:
    name: Template Runtime Tests
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/climamind/rumoca-dev:main
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: scripts/ci/apt-install.sh libudev-dev

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            /opt/rumoca/cargo/registry
            /opt/rumoca/cargo/git
          key: template-runtime-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      # No-op once the dev image ships it (core-requirements.txt); kept so the
      # symforce runtime tests exercise the real package even on a stale image
      # instead of silently skipping.
      - name: Ensure symforce runtime dependency
        run: pip install --no-cache-dir 'symforce==0.11.0'

      - name: Run template runtime checks
        run: cargo xtask verify template-runtimes

  editor-msl-smoke:
    name: Full-MSL LSP/Editor Gate
    runs-on: ubuntu-24.04
    # This gate runs full-MSL LSP probes, VS Code smoke, and a WASM browser
    # smoke. Hosted runners can exhaust 30 minutes before the browser smoke
    # finishes its playground build on a cold wasm cache.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install Rust nightly with rust-src
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add wasm32-unknown-unknown
          rustup component add rust-src

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Xvfb and system dependencies
        run: scripts/ci/apt-install.sh xvfb xauth libudev-dev

      - name: Select headless browser
        shell: bash
        run: |
          set -euo pipefail
          if command -v google-chrome >/dev/null 2>&1; then
            browser=google-chrome
          elif command -v chromium >/dev/null 2>&1; then
            browser=chromium
          elif command -v chromium-browser >/dev/null 2>&1; then
            browser=chromium-browser
          else
            echo "::error::Missing Chrome/Chromium for headless WASM smoke."
            exit 1
          fi
          # xtask auto-detects the headless browser; this step only fails fast
          # when none is installed.
          "$browser" --version

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-editor-msl-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache MSL
        uses: actions/cache@v5
        continue-on-error: true
        id: msl-cache-editor
        with:
          path: target/msl/ModelicaStandardLibrary-4.1.0
          key: msl-v4.1.0-release-zip-layout-v2

      - name: Ensure MSL
        shell: bash
        run: |
          set -euo pipefail
          msl_dir=target/msl/ModelicaStandardLibrary-4.1.0
          if [[ -f "$msl_dir/Complex.mo" && -f "$msl_dir/Modelica 4.1.0/package.mo" ]]; then
            echo "MSL cache is valid at $msl_dir"
            exit 0
          fi
          rm -rf "$msl_dir"
          mkdir -p "$msl_dir"
          curl -L -o target/msl/msl-v4.1.0.zip \
            https://github.com/modelica/ModelicaStandardLibrary/releases/download/v4.1.0/ModelicaStandardLibrary_v4.1.0.zip
          unzip -q target/msl/msl-v4.1.0.zip -d "$msl_dir"
          rm target/msl/msl-v4.1.0.zip
          test -f "$msl_dir/Complex.mo"
          test -f "$msl_dir/Modelica 4.1.0/package.mo"

      - name: Run unified full-MSL LSP/editor gate
        run: cargo xtask verify lsp-msl-completion-timings --require-runtimes

      - name: Upload full-MSL LSP/editor report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lsp-msl-benchmark-report
          path: target/lsp-msl-benchmark
          if-no-files-found: warn

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-24.04
    # This job installs cargo-llvm-cov and generates full workspace artifacts
    # before running the trim/gate steps, so 30 minutes is too tight on cold
    # GitHub runners. Keep explicit headroom here to avoid job-level
    # cancellation while tests are still progressing.
    timeout-minutes: 45
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: scripts/ci/apt-install.sh libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup component add llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Build coverage helper
        run: cargo build --package xtask --bin xtask

      - name: Reclaim runner disk before coverage
        shell: bash
        run: |
          set -euo pipefail
          echo "== disk before cleanup =="
          df -h . / /tmp || true
          du -sh target target/debug target/debug/deps target/debug/build target/debug/incremental ~/.cargo ~/.rustup /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL 2>/dev/null || true

          rm -rf target/debug/deps target/debug/build target/debug/incremental target/debug/.fingerprint
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

          echo "== disk after cleanup =="
          df -h . / /tmp || true
          du -sh target target/debug ~/.cargo ~/.rustup 2>/dev/null || true

      - name: Generate workspace coverage artifacts
        shell: bash
        run: |
          set -euo pipefail
          monitor() {
            while true; do
              echo "== resource snapshot: $(date -Is) =="
              df -h . / /tmp || true
              free -h || true
              du -sh target target/llvm-cov target/llvm-cov-target ~/.cargo ~/.rustup 2>/dev/null || true
              ps -eo pid,ppid,%cpu,%mem,rss,vsz,comm,args --sort=-rss | head -n 10 || true
              sleep 60
            done
          }
          monitor &
          monitor_pid=$!
          trap 'kill "$monitor_pid" 2>/dev/null || true' EXIT
          ./target/debug/xtask coverage run

      - name: Generate trim candidate inventory
        run: |
          ./target/debug/xtask coverage report

      - name: Enforce coverage regression gate
        run: |
          ./target/debug/xtask coverage gate --allowed-workspace-line-coverage-drop 3.0

  msl-quality-gate:
    name: MSL Quality Gate
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/climamind/rumoca-dev:main
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    # The root-example MSL 4.1 baseline gate covers 575 models and also runs
    # cold OMC parity references for Rumoca-sim-ok models. Keep this aligned
    # with the in-process OMC stage watchdog plus build/artifact slack.
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: scripts/ci/apt-install.sh libudev-dev

      - name: Verify container toolchain
        run: |
          rustc --version
          cargo --version
          omc --version

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            /opt/rumoca/cargo/registry
            /opt/rumoca/cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache MSL
        uses: actions/cache@v5
        continue-on-error: true
        id: msl-cache
        with:
          path: target/msl/ModelicaStandardLibrary-4.1.0
          key: msl-v4.1.0-release-zip-layout-v2

      - name: Cache OMC parity checkpoint
        id: omc-parity-checkpoint-cache
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            target/msl/results/omc_simulation_reference.json
            target/msl/results/omc_sim_work
            target/msl/results/sim_traces/omc
            target/msl/results/omc_parity_cache
          key: msl-omc-parity-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.github/workflows/ci.yml', 'crates/rumoca-test-msl/tests/msl_tests/msl_quality_baseline.json') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            msl-omc-parity-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.github/workflows/ci.yml', 'crates/rumoca-test-msl/tests/msl_tests/msl_quality_baseline.json') }}-

      - name: Download prior OMC parity checkpoint artifact
        if: steps.omc-parity-checkpoint-cache.outputs.cache-hit != 'true'
        id: omc-parity-checkpoint-artifact
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: 'ci.yml',
              branch,
              status: 'completed',
              per_page: 20,
            });
            for (const run of runs) {
              const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                owner,
                repo,
                run_id: run.id,
                per_page: 100,
              });
              const artifact = artifacts.find((item) =>
                item.name === 'msl-compatibility-report' && !item.expired
              );
              if (!artifact) {
                continue;
              }
              const response = await github.rest.actions.downloadArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
                archive_format: 'zip',
              });
              const out = path.join(process.env.RUNNER_TEMP, 'omc-parity-checkpoint.zip');
              fs.writeFileSync(out, Buffer.from(response.data));
              core.setOutput('found', 'true');
              core.setOutput('path', out);
              core.info(`Downloaded OMC parity checkpoint artifact ${artifact.id} from run ${run.id}.`);
              return;
            }
            core.setOutput('found', 'false');
            core.info('No prior OMC parity checkpoint artifact found for this commit.');

      - name: Restore prior OMC parity checkpoint artifact
        if: steps.omc-parity-checkpoint-artifact.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          restore_dir="$RUNNER_TEMP/omc-parity-checkpoint"
          rm -rf "$restore_dir"
          mkdir -p "$restore_dir" target/msl/results
          unzip -q "${{ steps.omc-parity-checkpoint-artifact.outputs.path }}" -d "$restore_dir"
          for path in \
            omc_simulation_reference.json \
            omc_sim_work \
            sim_traces/omc \
            omc_parity_cache
          do
            if [[ -e "$restore_dir/results/$path" ]]; then
              mkdir -p "target/msl/results/$(dirname "$path")"
              rm -rf "target/msl/results/$path"
              cp -a "$restore_dir/results/$path" "target/msl/results/$path"
            fi
          done

      - name: Ensure MSL
        shell: bash
        run: |
          set -euo pipefail
          msl_dir=target/msl/ModelicaStandardLibrary-4.1.0
          if [[ -f "$msl_dir/Complex.mo" && -f "$msl_dir/Modelica 4.1.0/package.mo" ]]; then
            echo "MSL cache is valid at $msl_dir"
            exit 0
          fi
          rm -rf "$msl_dir"
          mkdir -p "$msl_dir"
          curl -L -o target/msl/msl-v4.1.0.zip \
            https://github.com/modelica/ModelicaStandardLibrary/releases/download/v4.1.0/ModelicaStandardLibrary_v4.1.0.zip
          unzip -q target/msl/msl-v4.1.0.zip -d "$msl_dir"
          rm target/msl/msl-v4.1.0.zip
          test -f "$msl_dir/Complex.mo"
          test -f "$msl_dir/Modelica 4.1.0/package.mo"

      - name: Clean stale MSL results
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/msl/results
          find target/msl/results -mindepth 1 -maxdepth 1 \
            ! -name omc_simulation_reference.json \
            ! -name omc_sim_work \
            ! -name sim_traces \
            ! -name omc_parity_cache \
            -exec rm -rf {} +
          rm -rf target/msl/results/sim_traces/rumoca

      - name: Run full MSL quality gate
        # Keep the full parity run conservative on standard GitHub-hosted
        # runners. The promoted quality baseline is ratcheted from this CI
        # worker context rather than from a larger local workstation.
        run: >
          cargo xtask verify msl-parity
          --stage-parallelism 3
          --sim-parallelism 3
          --sim-worker-memory-mb 2048
          --sim-total-memory-mb 6144
          --omc-parity-workers 4
          --omc-sim-reference-batch-timeout-secs 120
          --monitor-interval-secs 10

      - name: Generate MSL compatibility report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f target/msl/results/msl_results.json ]]; then
            cargo xtask repo msl compatibility-report
          else
            echo "Skipping MSL compatibility report; target/msl/results/msl_results.json was not produced."
          fi

      - name: Prepare ModelicaTest sources
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf target/msl/modelicatest-source
          git clone --depth 1 --branch v4.1.0 \
            https://github.com/modelica/ModelicaStandardLibrary.git \
            target/msl/modelicatest-source
          rm -rf target/msl/ModelicaStandardLibrary-4.1.0/ModelicaTest
          cp -a \
            target/msl/modelicatest-source/ModelicaTest \
            target/msl/ModelicaStandardLibrary-4.1.0/ModelicaTest

      - name: Run ModelicaTest semantic gate
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          targets="crates/rumoca-test-msl/tests/msl_tests/modelica_test_targets_ci.json"
          rm -rf target/msl/modelicatest-results
          cargo xtask verify msl-parity \
            --results-dir target/msl/modelicatest-results \
            --sim-targets-file "$targets" \
            --include-modelica-test \
            --require-selected-targets-success \
            --sim-set full \
            --stage-parallelism 3 \
            --sim-parallelism 3 \
            --sim-worker-memory-mb 2048 \
            --sim-total-memory-mb 6144
          cargo xtask repo msl modelica-test-catalog \
            --results target/msl/modelicatest-results/msl_results.json \
            --out target/msl/results/modelica_test_catalog.md \
            --json-out target/msl/results/modelica_test_catalog.json

      - name: Generate MSL PR summary comment
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          baseline="crates/rumoca-test-msl/tests/msl_tests/msl_quality_baseline.json"
          if [[ -f target/msl/baselines/msl_quality_baseline.json ]]; then
            baseline="target/msl/baselines/msl_quality_baseline.json"
          fi
          cargo xtask repo msl pr-comment \
            --results-dir target/msl/results \
            --baseline "$baseline"

      - name: Upload MSL compatibility artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: msl-compatibility-report
          path: |
            target/msl/results/msl_quality_current.json
            target/msl/results/msl_package_pass_rates.md
            target/msl/results/msl_package_pass_rates.json
            target/msl/results/msl_package_trace_accuracy.md
            target/msl/results/msl_package_trace_accuracy.json
            target/msl/results/mls_contract_coverage.md
            target/msl/results/mls_contract_coverage.json
            target/msl/results/mls_contract_coverage.txt
            target/msl/results/msl_pr_comment.md
            target/msl/results/msl_compatibility_report.md
            target/msl/results/msl_compatibility_report.json
            target/msl/results/omc_simulation_reference.json
            target/msl/results/omc_sim_work
            target/msl/results/sim_traces/omc
            target/msl/results/omc_parity_cache
            target/msl/results/modelica_test_catalog.md
            target/msl/results/modelica_test_catalog.json
            target/msl/modelicatest-results/msl_results.json
            target/msl/modelicatest-results/msl_quality_current.json
          if-no-files-found: warn

  # ============================================================================
  # Documentation
  # ============================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: scripts/ci/apt-install.sh libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install mdBook
        run: cargo install mdbook --locked --version 0.5.2

      - name: Build documentation
        run: cargo xtask verify docs

      - name: Upload documentation
        uses: actions/upload-artifact@v6
        with:
          name: documentation
          path: target/doc/

  # ============================================================================
  # VS Code Extension
  # ============================================================================
  vscode:
    name: VS Code Extension
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: scripts/ci/apt-install.sh libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-vscode-${{ hashFiles('**/Cargo.lock') }}

      - name: Run VS Code extension CI gate
        run: cargo xtask vscode test

  # ============================================================================
  # WebAssembly Build & GitHub Pages
  # ============================================================================
  build-wasm:
    name: Build WASM
    # Release artifacts are built on PRs (pre-merge validation) and on the
    # release tag (the run that deploys). A direct main push doesn't rebuild,
    # so a release commit's heavy build runs exactly once — on the tag.
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: scripts/ci/apt-install.sh libudev-dev

      - name: Install Rust nightly with rust-src
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add wasm32-unknown-unknown
          rustup component add rust-src

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Run playground CI gate
        run: cargo xtask playground test

      - name: Build optimized npm packages
        # Push-only: wasm-opt (-Oz) is slow, and PRs already validate the build
        # via the gate above. BOTH packages compile Modelica and emit code from
        # every IR (AST/flat/DAE/solve) — they are equally capable for codegen.
        # The only difference is the bundled solver RUNTIME for in-package
        # simulation:
        #   full-web -> @cognipilot/rumoca       (+ rk45 runtime; browser-safe —
        #                                          diffsol is excluded, it pulls a
        #                                          non-browser-safe relaxed-SIMD graph)
        #   core     -> @cognipilot/rumoca-core  (no bundled solver — bring your own)
        # These overwrite the gate's unoptimized full-web so gh-pages and the
        # wasm-package artifact (published on release by the deploy job) both
        # get the optimized build.
        if: github.event_name == 'push'
        run: |
          node packages/rumoca/build.mjs --profile release --variant full-web --optimize
          node packages/rumoca/build.mjs --profile release --variant core --optimize

      - name: Install mdBook
        run: cargo install mdbook --locked --version 0.5.2

      - name: Prepare GitHub Pages content
        run: |
          if [ -d packages/rumoca/dist/release-full-web ]; then
            PKG_SUBDIR="release-full-web"
          elif [ -d packages/rumoca/dist/release-full-web-rayon ]; then
            PKG_SUBDIR="release-full-web-rayon"
          else
            echo "Missing expected WASM package subdir under packages/rumoca/dist/"
            find packages/rumoca/dist -maxdepth 2 -type f || true
            exit 1
          fi
          echo "Using pkg subdir: $PKG_SUBDIR"

          mkdir -p "gh-pages/pkg/$PKG_SUBDIR"
          cp "packages/rumoca/dist/$PKG_SUBDIR/rumoca_bind_wasm.js" "gh-pages/pkg/$PKG_SUBDIR/"
          cp "packages/rumoca/dist/$PKG_SUBDIR/rumoca_bind_wasm_bg.wasm" "gh-pages/pkg/$PKG_SUBDIR/"
          cp "packages/rumoca/dist/$PKG_SUBDIR/rumoca_runtime.js" "gh-pages/pkg/$PKG_SUBDIR/"
          cp "packages/rumoca/dist/$PKG_SUBDIR/rumoca_interactive.js" "gh-pages/pkg/$PKG_SUBDIR/"
          cp "packages/rumoca/dist/$PKG_SUBDIR/modelica_language.js" "gh-pages/pkg/$PKG_SUBDIR/"
          cp "packages/rumoca/dist/$PKG_SUBDIR/rumoca_worker.js" "gh-pages/pkg/$PKG_SUBDIR/"
          cp "packages/rumoca/dist/$PKG_SUBDIR/parse_worker.js" "gh-pages/pkg/$PKG_SUBDIR/"
          cp "packages/rumoca/dist/$PKG_SUBDIR/rumoca_gpu.js" "gh-pages/pkg/$PKG_SUBDIR/"
          # Lazy diffsol addon (driver + its separate relaxed-SIMD module), so
          # the live examples can run stiff solves on supporting browsers.
          cp "packages/rumoca/dist/$PKG_SUBDIR/rumoca_diffsol.js" "gh-pages/pkg/$PKG_SUBDIR/" 2>/dev/null || true
          cp "packages/rumoca/dist/$PKG_SUBDIR/rumoca_bind_wasm_diffsol.js" "gh-pages/pkg/$PKG_SUBDIR/" 2>/dev/null || true
          cp "packages/rumoca/dist/$PKG_SUBDIR/rumoca_bind_wasm_diffsol_bg.wasm" "gh-pages/pkg/$PKG_SUBDIR/" 2>/dev/null || true
          cp "packages/rumoca/dist/$PKG_SUBDIR/package.json" "gh-pages/pkg/$PKG_SUBDIR/"
          cp "packages/rumoca/dist/$PKG_SUBDIR/rumoca_package_meta.json" "gh-pages/pkg/$PKG_SUBDIR/" 2>/dev/null || true
          cp -r "packages/rumoca/dist/$PKG_SUBDIR/snippets" "gh-pages/pkg/$PKG_SUBDIR/" 2>/dev/null || true

          mkdir -p gh-pages/assets/brand
          cp assets/brand/rumoca.svg gh-pages/assets/brand/
          cp packages/playground/coi-serviceworker.js gh-pages/
          cp -r packages/playground/src gh-pages/
          cp -r examples gh-pages/examples/
          # vendor/ is generated by packages/rumoca/build.mjs (run earlier in this
          # job) from the single-source web/ package, so it holds real files.
          cp -r packages/playground/vendor gh-pages/

          sed \
              -e "s|window.rumocaWasmPkgBase = '../rumoca/dist';|window.rumocaWasmPkgBase = './pkg';|g" \
              -e "s|window.rumocaWasmPkgSubdir = 'release-full-web';|window.rumocaWasmPkgSubdir = '$PKG_SUBDIR';|g" \
              -e "s|window.rumocaWasmPkgSubdir = 'release-full-web-rayon';|window.rumocaWasmPkgSubdir = '$PKG_SUBDIR';|g" \
              -e "s|window.rumocaRepoAssetBase = '../../';|window.rumocaRepoAssetBase = './';|g" \
              -e "s|../../assets/brand/rumoca.svg|assets/brand/rumoca.svg|g" \
              packages/playground/index.html > gh-pages/index.html

          cargo xtask repo modelica-deps ensure
          mkdir -p gh-pages/target/cmm
          cp -a target/cmm/CMM-v0.0.2 gh-pages/target/cmm/

          cargo xtask docs build --book user
          cargo xtask docs build --book dev
          mkdir -p "$GITHUB_WORKSPACE/gh-pages/user-guide" "$GITHUB_WORKSPACE/gh-pages/dev-guide"
          cp -a docs/user-guide/book/. "$GITHUB_WORKSPACE/gh-pages/user-guide/"
          cp -a docs/dev-guide/book/. "$GITHUB_WORKSPACE/gh-pages/dev-guide/"

          echo "=== GitHub Pages content ==="
          find gh-pages -type f

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v6
        with:
          name: wasm-package
          path: packages/rumoca/dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

  deploy-pages:
    name: Deploy Pages
    # Publish the docs/WASM site only on a release. Gated to the tag-push event
    # (not the co-pushed main branch ref) so a `git push origin main vX.Y.Z`
    # deploys exactly once instead of racing a duplicate from the branch push.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.detect-release-tag.outputs.is_release == 'true'
    needs: [detect-release-tag, build-wasm]
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================================================
  # Cross-platform Rust binary builds
  # ============================================================================
  build-rust-binaries:
    name: Build Rust (${{ matrix.target }})
    # Built on PRs and on the release tag only (see Build WASM note).
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Use musl for Linux x64 release artifacts so the bundled VS Code
          # server does not depend on the remote host glibc version.
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            rumoca_asset: rumoca-linux-x86_64
            lsp_asset: rumoca-lsp-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            rumoca_asset: rumoca-linux-aarch64
            lsp_asset: rumoca-lsp-linux-aarch64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            rumoca_asset: rumoca-macos-x86_64
            lsp_asset: rumoca-lsp-macos-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            rumoca_asset: rumoca-macos-aarch64
            lsp_asset: rumoca-lsp-macos-aarch64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            rumoca_asset: rumoca-windows-x86_64.exe
            lsp_asset: rumoca-lsp-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools (Linux musl)
        if: contains(matrix.target, 'musl')
        run: scripts/ci/apt-install.sh musl-tools

      - name: Configure musl build (Linux musl)
        if: contains(matrix.target, 'musl')
        run: |
          mkdir -p .cargo
          target_env_suffix="$(echo '${{ matrix.target }}' | tr '-' '_')"
          target_env_upper="$(echo '${{ matrix.target }}' | tr '[:lower:]-' '[:upper:]_')"
          cat >> .cargo/config.toml <<'EOF'
          [target.${{ matrix.target }}]
          linker = "musl-gcc"
          rustflags = ["-C", "link-arg=-static"]
          EOF
          echo "CC_${target_env_suffix}=musl-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_${target_env_upper}_LINKER=musl-gcc" >> $GITHUB_ENV

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin rumoca --bin rumoca-lsp

      - name: Strip binaries (Linux native)
        if: runner.os == 'Linux'
        run: |
          strip target/${{ matrix.target }}/release/rumoca
          strip target/${{ matrix.target }}/release/rumoca-lsp

      - name: Verify Linux musl release artifacts
        if: contains(matrix.target, 'musl')
        run: |
          set -euo pipefail

          rumoca_bin="target/${{ matrix.target }}/release/rumoca"
          lsp_bin="target/${{ matrix.target }}/release/rumoca-lsp"

          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              expected_machine="Advanced Micro Devices X86-64"
              ;;
            aarch64-unknown-linux-musl)
              expected_machine="AArch64"
              ;;
            *)
              echo "::error::unexpected musl release target: ${{ matrix.target }}"
              exit 1
              ;;
          esac

          echo "Inspecting $rumoca_bin"
          file "$rumoca_bin"
          readelf -h "$rumoca_bin" | grep -F "$expected_machine"
          if readelf -l "$rumoca_bin" | grep -F "Requesting program interpreter" >/dev/null; then
            echo "::error::$rumoca_bin unexpectedly depends on a dynamic ELF interpreter"
            exit 1
          fi
          ldd "$rumoca_bin" || true
          "$rumoca_bin" --version

          echo "Inspecting $lsp_bin"
          file "$lsp_bin"
          readelf -h "$lsp_bin" | grep -F "$expected_machine"
          if readelf -l "$lsp_bin" | grep -F "Requesting program interpreter" >/dev/null; then
            echo "::error::$lsp_bin unexpectedly depends on a dynamic ELF interpreter"
            exit 1
          fi
          ldd "$lsp_bin" || true
          "$lsp_bin" --version

      - name: Strip binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          strip target/${{ matrix.target }}/release/rumoca
          strip target/${{ matrix.target }}/release/rumoca-lsp

      - name: Upload rumoca binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.rumoca_asset }}
          path: ./target/${{ matrix.target }}/release/rumoca${{ startsWith(matrix.target, 'x86_64-pc-windows-') && '.exe' || '' }}

      - name: Upload LSP binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.lsp_asset }}
          path: ./target/${{ matrix.target }}/release/rumoca-lsp${{ startsWith(matrix.target, 'x86_64-pc-windows-') && '.exe' || '' }}

  build-python-wheels:
    name: Build Python (${{ matrix.name }})
    # Built on PRs and on the release tag only (see Build WASM note).
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ${{ matrix.os }}
    # The natively-built/tested wheels (x86_64 glibc, macOS x2, Windows) gate the
    # PR; the cross-compiled aarch64 and musllinux targets are best-effort
    # (non-blocking) until CI proves them green, then flip them to required.
    continue-on-error: ${{ !matrix.native }}
    strategy:
      # One target's build failure (e.g. a cross target) must not cancel the
      # others — abi3 + the mainstream wheels still publish.
      fail-fast: false
      matrix:
        include:
          # Linux glibc (manylinux) — abi3, one wheel per arch for Python >= 3.10.
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            manylinux: auto
            name: linux-x86_64-gnu
            native: true
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            manylinux: auto
            name: linux-aarch64-gnu
            native: false
          # Linux musl (musllinux) — Alpine / musl Docker base images.
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
            name: linux-x86_64-musl
            native: false
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            manylinux: musllinux_1_2
            name: linux-aarch64-musl
            native: false
          - os: macos-15-intel
            target: x86_64-apple-darwin
            name: macos-x86_64
            native: true
          - os: macos-15
            target: aarch64-apple-darwin
            name: macos-aarch64
            native: true
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            name: windows-x64
            native: true
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # maturin-action builds Linux wheels inside manylinux/musllinux containers
      # (and cross-compiles aarch64), so it handles the platform tags and the
      # cross toolchain. abi3 is picked up from the crate's pyo3 feature, giving
      # one wheel per platform for all CPython >= 3.10.
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --manifest-path crates/rumoca-bind-python/Cargo.toml
          # libudev (pulled in via the `rumoca` crate) inside the Linux build
          # containers: systemd-devel on manylinux (yum), eudev-dev on musllinux
          # (apk). No-op on macOS/Windows runners.
          before-script-linux: |
            if command -v yum >/dev/null 2>&1; then yum install -y systemd-devel; fi
            if command -v apk >/dev/null 2>&1; then apk add --no-cache eudev-dev; fi

      # The wheel is only installable/runnable on a host matching its arch+libc,
      # so smoke-test just the native rows; cross/musl rows build-and-upload.
      - name: Smoke test installed wheel
        if: matrix.native
        shell: bash
        run: |
          # Install the `notebook` extra (real %%modelica magic) plus `data` so
          # the smoke test exercises numpy/pandas-backed Result paths. The export
          # test skips casadi/jax/sympy gracefully when those extras are absent.
          # maturin-action writes wheels to ./dist at the repo root.
          WHEEL=$(ls dist/*.whl | head -1)
          python -m pip install --force-reinstall "${WHEEL}[notebook,data]"
          python crates/rumoca-bind-python/tests/smoke_test.py
          python crates/rumoca-bind-python/tests/api_test.py
          python crates/rumoca-bind-python/tests/magic_test.py
          python crates/rumoca-bind-python/tests/export_test.py

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.name }}
          path: dist

  build-python-sdist:
    name: Build Python sdist
    # Built on PRs and on the release tag only (see Build WASM note).
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Rust
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          toolchain="$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
          fi
          rustup set profile minimal
          if ! rustup toolchain list | grep -Eq "^${toolchain}"; then
            rustup toolchain install "$toolchain"
          fi
          if ! rustup component list --toolchain "$toolchain" --installed | grep -qx 'rust-src'; then
            rustup component add rust-src --toolchain "$toolchain"
          fi
          if ! rustup target list --toolchain "$toolchain" --installed | grep -qx 'wasm32-unknown-unknown'; then
            rustup target add wasm32-unknown-unknown --toolchain "$toolchain"
          fi
          rustup default "$toolchain"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: |
          cd crates/rumoca-bind-python
          maturin sdist --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: crates/rumoca-bind-python/dist

  # ============================================================================
  # Deployment (only on tags, after verification and build completion)
  # ============================================================================
  deploy:
    name: Deploy
    # Gated to the tag-push event only. A release pushes main and the v* tag
    # together, which fires two CI runs (branch + tag); deploying on both made
    # the second run fail on "Release.tag_name already exists". Tag-only means
    # the release/publish path runs exactly once.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.detect-release-tag.outputs.is_release == 'true'
    needs: [detect-release-tag, lint, test, coverage-gate, msl-quality-gate, docs, vscode, deploy-pages, build-wasm, build-rust-binaries, build-python-wheels, build-python-sdist]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          tag='${{ needs.detect-release-tag.outputs.tag }}'
          if ! git tag --points-at "${{ github.sha }}" | grep -Fx "$tag" >/dev/null; then
            echo "::error::Release tag '$tag' does not point at built commit ${{ github.sha }}"
            exit 1
          fi
          git fetch --no-tags --depth=2147483647 origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "::error::Release tag '$tag' commit ${{ github.sha }} is not on origin/main; refusing to release"
            exit 1
          fi
          echo "Release tag '$tag' points to commit ${{ github.sha }} on origin/main"

      - name: Get tag name
        id: tag
        run: echo "name=${{ needs.detect-release-tag.outputs.tag }}" >> $GITHUB_OUTPUT

      - name: Distribution policy note
        run: |
          echo "As of v0.8.0, Rust distribution is via GitHub Releases binaries (not crates.io)."

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Setup Node.js for VSIX packaging
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install VS Code extension dependencies
        shell: bash
        run: |
          cd packages/vscode
          npm ci
          npm run esbuild-base -- --minify

      - name: Organize artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          echo "=== Downloaded structure ==="
          find artifacts -type f | sed -n '1,50p'

          # Move Rust binaries
          for dir in artifacts/rumoca*; do
            if [ -d "$dir" ]; then
              echo "Processing Rust artifact: $dir"
              artifact_name="$(basename "$dir")"
              source_file="$(find "$dir" -maxdepth 1 -type f -print -quit)"
              if [ -z "$source_file" ]; then
                echo "No binary file found under $dir; skipping"
                continue
              fi
              cp "$source_file" "release-assets/$artifact_name"
            fi
          done

          # Move Python wheels/sdist
          for dir in artifacts/wheels-*; do
            if [ -d "$dir" ]; then
              echo "Processing Python artifact: $dir"
              find "$dir" -maxdepth 1 -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} release-assets/ \;
            fi
          done

          # Package VS Code extensions at deployment time from the released LSP binaries.
          map_target() {
            case "$1" in
              linux-x64)
                printf '%s\n' 'rumoca-lsp-linux-x86_64|rumoca-lsp'
                ;;
              linux-arm64)
                printf '%s\n' 'rumoca-lsp-linux-aarch64|rumoca-lsp'
                ;;
              darwin-x64)
                printf '%s\n' 'rumoca-lsp-macos-x86_64|rumoca-lsp'
                ;;
              darwin-arm64)
                printf '%s\n' 'rumoca-lsp-macos-aarch64|rumoca-lsp'
                ;;
              win32-x64)
                printf '%s\n' 'rumoca-lsp-windows-x86_64.exe|rumoca-lsp.exe'
                ;;
              *)
                return 1
                ;;
            esac
          }

          for vscode_target in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64; do
            IFS='|' read -r artifact_name binary_name <<<"$(map_target "$vscode_target")"
            artifact_dir="artifacts/${artifact_name}"
            if [ ! -d "$artifact_dir" ]; then
              echo "::error::Missing LSP artifact directory for $vscode_target: $artifact_dir"
              exit 1
            fi
            source_file="$(find "$artifact_dir" -maxdepth 1 -type f -print -quit)"
            if [ -z "$source_file" ]; then
              echo "::error::No LSP binary found under $artifact_dir"
              exit 1
            fi

            echo "Packaging VSIX for $vscode_target from $source_file"
            rm -f packages/vscode/bin/* packages/vscode/*.vsix
            mkdir -p packages/vscode/bin
            cp "$source_file" "packages/vscode/bin/$binary_name"
            chmod +x "packages/vscode/bin/$binary_name" 2>/dev/null || true

            (
              cd packages/vscode
              npx @vscode/vsce package --target "$vscode_target" --no-dependencies --no-yarn
            )

            vsix_file="$(find packages/vscode -maxdepth 1 -type f -name '*.vsix' -print -quit)"
            if [ -z "$vsix_file" ]; then
              echo "::error::VSIX packaging did not produce an artifact for $vscode_target"
              exit 1
            fi
            cp "$vsix_file" "release-assets/$(basename "$vsix_file")"
          done

          echo "=== Release assets ==="
          ls -la release-assets/

      # Create GitHub Release. Deploy is gated to the tag-push event (see the
      # job `if:` above), so this runs exactly once per release and a fresh tag
      # never collides with an existing release.
      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.tag.outputs.name }} \
            --title "Release ${{ steps.tag.outputs.name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          cd release-assets
          for file in *; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload ${{ steps.tag.outputs.name }} "$file" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-assets
          path: release-assets/

      - name: Publish VS Code extensions to marketplaces
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          vsix_files=(release-assets/*.vsix)
          if [ "${#vsix_files[@]}" -eq 0 ]; then
            echo "::error::No VS Code extension packages found in release-assets"
            exit 1
          fi

          if [ -z "${VSCE_PAT:-}" ]; then
            echo "::warning::VSCE_PAT secret not set; skipping Visual Studio Marketplace publish"
          else
            for vsix_file in "${vsix_files[@]}"; do
              echo "Publishing $(basename "$vsix_file") to Visual Studio Marketplace"
              (
                cd packages/vscode
                npx @vscode/vsce publish --packagePath "../../${vsix_file}" --no-dependencies --no-yarn
              )
            done
          fi

          if [ -z "${OVSX_TOKEN:-}" ]; then
            echo "::warning::OVSX_TOKEN secret not set; skipping Open VSX publish"
          else
            for vsix_file in "${vsix_files[@]}"; do
              echo "Publishing $(basename "$vsix_file") to Open VSX"
              (
                cd packages/vscode
                npx --yes ovsx publish "../../${vsix_file}" -p "${OVSX_TOKEN}"
              )
            done
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Publish Python packages to PyPI
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip twine
          shopt -s nullglob
          python_files=(release-assets/*.whl release-assets/*.tar.gz)
          if [ "${#python_files[@]}" -eq 0 ]; then
            echo "::error::No Python distribution artifacts found in release-assets"
            exit 1
          fi
          python -m twine upload --skip-existing "${python_files[@]}"
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish npm package to npmjs
        shell: bash
        run: |
          set -euo pipefail
          # Two packages: the batteries-included build and the compile/codegen
          # build (no solver runtime). Both are wasm-opt'd in build-wasm.
          for variant in release-full-web release-core; do
            pkg_dir="artifacts/wasm-package/$variant"
            if [ ! -f "$pkg_dir/package.json" ]; then
              echo "::error::npm package not found at $pkg_dir (build-wasm must build the $variant variant)"
              exit 1
            fi
            name="$(node -p "require('./$pkg_dir/package.json').name")"
            version="$(node -p "require('./$pkg_dir/package.json').version")"
            echo "Preparing to publish $name@$version"
            # Idempotent like the PyPI --skip-existing above: re-running a release
            # must not fail just because a version is already on the registry.
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already published; skipping."
              continue
            fi
            npm publish "$pkg_dir" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Rust binary and VS Code extension artifacts are distributed via GitHub Releases.
