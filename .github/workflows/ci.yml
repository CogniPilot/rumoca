name: CI

on:
  push:
    branches: ['main']
    tags: ['v*']
  pull_request:
    branches: ['main']

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  issues: write
  pages: write
  packages: read
  pull-requests: write

jobs:
  detect-release-tag:
    name: Detect release tag on commit
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-24.04
    outputs:
      is_release: ${{ steps.detect.outputs.is_release }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 0
          fetch-tags: true

      - name: Detect v* tag for current commit
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tags < <(git tag --points-at "$GITHUB_SHA" 'v*' | sort -V)
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "No v* tag detected on $GITHUB_SHA"
            exit 0
          fi

          tag="${tags[$((${#tags[@]} - 1))]}"
          if [ "${#tags[@]}" -gt 1 ]; then
            echo "::warning::Multiple v* tags point at $GITHUB_SHA: ${tags[*]}. Using $tag."
          fi

          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Detected release tag: $tag"

  # ============================================================================
  # Rust Testing
  # ============================================================================
  fmt:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install rustfmt
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y \
            --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)" \
            --component rustfmt
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Architectural invariant, checked without compiling anything: `xtask` must
      # carry NO rumoca-* workspace crate. It parses args, moves files, and shells
      # out; heavy compiler-linked work runs on demand via `cargo run -p <crate>`
      # (rumoca-test-msl, rumoca-tool-docs). If a rumoca-* dep creeps back in,
      # building any xtask bin again drags in the whole compiler/diffsol stack.
      - name: Architecture — xtask stays dependency-light
        run: |
          deps=$(cargo tree -p xtask -e normal --prefix none | grep '^rumoca-' | sort -u || true)
          if [ -n "$deps" ]; then
            echo "::error::xtask must not depend on any rumoca-* crate, but it now pulls in:"
            echo "$deps"
            echo "Move the heavy code into a compiler-linked crate and shell out to it."
            exit 1
          fi
          echo "OK: xtask has no rumoca-* dependencies"

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)" --component rustfmt,clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Rust cache (lint)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run lint gate
        run: cargo xtask verify lint

      - name: Run architecture review scan
        if: github.event_name == 'pull_request'
        run: |
          cargo xtask repo review-scan \
            --base origin/${{ github.base_ref }} \
            --head HEAD \
            --out target/review/review-scan.json \
            --fail-on-forbidden

      - name: Upload architecture review scan
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v6
        with:
          name: architecture-review-scan
          path: target/review/review-scan.json
          if-no-files-found: ignore

      - name: Check generated Modelica parser is current
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- crates/rumoca-phase-parse/src/generated

      - name: Generate crate DAG release artifact
        run: cargo xtask repo graph crates --format dot

      - name: Upload crate DAG artifact
        uses: actions/upload-artifact@v6
        with:
          name: crate-dag
          path: target/crate-dag/workspace-crate-dag.dot
          if-no-files-found: error

  # Reproducible build + clippy + fmt via the root crane+fenix flake, backed by
  # the Cachix binary cache (rumoca.cachix.org). First run is cold and pushes
  # the built closure; subsequent runs (and local `cachix use rumoca`) restore
  # the prebuilt dependency closure + rumoca binary in seconds. Replaces the
  # deprecated magic-nix-cache, which rate-limited the GitHub Actions cache API
  # on a closure this size (roadmap M4 slice 2).
  nix-checks:
    name: Nix flake checks (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cachix (rumoca binary cache)
        uses: cachix/cachix-action@v17
        with:
          name: rumoca
          # Public cache: pulls need no auth; the token lets CI push new paths.
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Nix build the flake package check
        # Build ONLY the reproducible package check. Format and clippy are owned
        # by the standalone Format/Lint jobs, and the heavy release MSL artifact
        # bundle is built once by the dedicated `nix-build-msl` producer and
        # consumed via Cachix; building any of that here too would duplicate
        # release+LTO work.
        #
        # We deliberately do NOT run `nix flake check`: it eval-builds every output
        # (re-building those packages), and its `--no-build` eval trips over the
        # fenix toolchain `.drv` under the DeterminateSystems installer
        # (`path '…rust-nightly.toml.drv' is not valid`). `nix build` realizes the
        # toolchain, so building the checks directly is the reliable gate.
        run: |
          nix build --print-build-logs .#checks.x86_64-linux.rumoca

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # libxml2-utils provides xmllint for rumoca-efmi XSD validation tests
          sudo apt-get install -y libudev-dev libxml2-utils

      # macOS ships /usr/bin/xmllint; Windows runner images have no xmllint
      # contract, so install libxml2's tools explicitly (the rumoca-efmi XSD
      # validation tests hard-fail rather than skip when xmllint is absent).
      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install xsltproc -y --no-progress
          xmllint --version

      - name: Cache rustup toolchain
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: ${{ runner.os }}-rustup-test-v2-${{ hashFiles('rust-toolchain.toml') }}

      - name: Install Rust
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          toolchain="$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
          fi
          rustup set profile minimal
          if ! rustup toolchain list | grep -Eq "^${toolchain}"; then
            rustup toolchain install "$toolchain"
          fi
          if ! rustup component list --toolchain "$toolchain" --installed | grep -qx 'rust-src'; then
            rustup component add rust-src --toolchain "$toolchain"
          fi
          if ! rustup target list --toolchain "$toolchain" --installed | grep -qx 'wasm32-unknown-unknown'; then
            rustup target add wasm32-unknown-unknown --toolchain "$toolchain"
          fi
          rustup default "$toolchain"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Rust cache (native)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-test
          save-if: ${{ github.ref == 'refs/heads/main' }}
          # Linux keeps the dependency target dir here (warm third-party deps);
          # all OSes additionally run sccache (next steps) to cache the workspace
          # crate compilations rust-cache drops. Windows/macOS keep rust-cache to
          # the registry only so it never overlaps sccache on target/.
          cache-targets: ${{ runner.os == 'Linux' }}

      - name: Run sccache-cache
        # sccache (GHA-cache backend) caches per-crate compilations INCLUDING the
        # workspace crates that Swatinem rust-cache deliberately drops, so across
        # runs each unchanged rumoca crate is a cache hit instead of a recompile.
        # Enabling it on Linux too is what stops ubuntu recompiling all of rumoca
        # every run (it previously had NO compiler cache — rust-cache keeps deps
        # but not workspace crates). Relies on the global CARGO_INCREMENTAL=0.
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Enable sccache wrapper
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Cache MSL
        uses: actions/cache@v5
        continue-on-error: true
        id: msl-cache
        with:
          path: target/msl/ModelicaStandardLibrary-4.1.0
          key: msl-v4.1.0-release-zip-layout-v2

      - name: Cache CMM
        uses: actions/cache@v5
        continue-on-error: true
        id: cmm-cache
        with:
          path: target/cmm/CMM-a642c381
          key: cmm-a642c381-ca47391811532c89300e52bb8ce53ee4bfd6d6d8412d54e2f13f11387f44dcc3

      - name: Ensure MSL
        shell: bash
        run: |
          set -euo pipefail
          msl_dir=target/msl/ModelicaStandardLibrary-4.1.0
          if [[ -f "$msl_dir/Complex.mo" && -f "$msl_dir/Modelica 4.1.0/package.mo" ]]; then
            echo "MSL cache is valid at $msl_dir"
            exit 0
          fi
          rm -rf "$msl_dir"
          mkdir -p "$msl_dir"
          curl -L -o target/msl/msl-v4.1.0.zip \
            https://github.com/modelica/ModelicaStandardLibrary/releases/download/v4.1.0/ModelicaStandardLibrary_v4.1.0.zip
          unzip -q target/msl/msl-v4.1.0.zip -d "$msl_dir"
          rm target/msl/msl-v4.1.0.zip
          test -f "$msl_dir/Complex.mo"
          test -f "$msl_dir/Modelica 4.1.0/package.mo"

      - name: Run example build smoke (Linux monitored)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          monitor() {
            while true; do
              echo "== resource snapshot: $(date -Is) =="
              df -h . /tmp /home/runner/actions-runner/cached 2>/dev/null || true
              free -h || true
              du -sh target target/debug target/debug/deps target/debug/incremental target/msl target/cmm ~/.rustup ~/.cargo ~/.cargo/registry ~/.cargo/git /home/runner/actions-runner/cached/_diag 2>/dev/null || true
              ps -eo pid,ppid,%cpu,%mem,rss,vsz,comm,args --sort=-rss | head -n 15 || true
              sleep 60
            done
          }
          monitor &
          monitor_pid=$!
          trap 'kill "$monitor_pid" 2>/dev/null || true' EXIT
          cargo xtask verify examples

      - name: Run example build smoke
        if: runner.os != 'Linux'
        run: cargo xtask verify examples

      # `!cancelled()` keeps the test step running when the example smoke step
      # fails, so a smoke regression cannot hide test failures (the job still
      # fails on the smoke step).
      - name: Run workspace tests (Linux monitored)
        if: runner.os == 'Linux' && !cancelled()
        env:
          REQUIRE_MSL_FMT_DRIFT: "1"
        shell: bash
        run: |
          set -euo pipefail
          monitor() {
            while true; do
              echo "== resource snapshot: $(date -Is) =="
              df -h . /tmp /home/runner/actions-runner/cached 2>/dev/null || true
              free -h || true
              du -sh target target/debug target/debug/deps target/debug/incremental target/msl target/cmm ~/.rustup ~/.cargo ~/.cargo/registry ~/.cargo/git /home/runner/actions-runner/cached/_diag 2>/dev/null || true
              ps -eo pid,ppid,%cpu,%mem,rss,vsz,comm,args --sort=-rss | head -n 15 || true
              sleep 60
            done
          }
          monitor &
          monitor_pid=$!
          trap 'kill "$monitor_pid" 2>/dev/null || true' EXIT
          # Full workspace suite (unit + integration + doctests) in one job per OS.
          # Not nextest-sharded: the suite isn't the CI pole (the MSL gate is), so
          # sharding it buys no overall wall-clock, only jobs + runner cost.
          cargo xtask verify workspace

      - name: Run workspace tests
        if: runner.os != 'Linux' && !cancelled()
        env:
          REQUIRE_MSL_FMT_DRIFT: "1"
        run: cargo xtask verify workspace

      - name: Build all binaries
        run: cargo xtask verify binaries

  template-runtime-tests:
    name: Template Runtime (${{ matrix.backend }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: render
            nix_shell: ci-template-core
          - backend: native
            nix_shell: ci-template-core
          - backend: embedded-c
            nix_shell: ci-template-core
          - backend: fmi
            nix_shell: ci-template-core
          - backend: casadi
            nix_shell: ci-template-python
          - backend: sympy
            nix_shell: ci-template-python
          - backend: symforce
            nix_shell: ci-template-python
          - backend: onnx
            nix_shell: ci-template-python
          - backend: jax
            nix_shell: ci-template-python
          - backend: julia
            nix_shell: ci-template-julia
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
      JULIA_DEPOT_PATH: "${{ github.workspace }}/target/julia-depot:"
      JULIA_PKG_PRECOMPILE_AUTO: '0'
      JULIA_PROJECT: ${{ github.workspace }}/infra/julia
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cachix (rumoca binary cache)
        uses: cachix/cachix-action@v17
        with:
          name: rumoca

      - name: Rust cache (template-runtime)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: template-runtime
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-targets: false

      - name: Reclaim runner disk before template runtimes
        shell: bash
        run: |
          set -euo pipefail
          echo "== disk before cleanup =="
          df -h . / /tmp /home/runner/actions-runner/cached 2>/dev/null || true
          du -sh target target/debug ~/.cargo ~/.rustup /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /home/runner/actions-runner/cached/_diag 2>/dev/null || true

          rm -rf target/debug/deps target/debug/build target/debug/incremental target/debug/.fingerprint
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

          echo "== disk after cleanup =="
          df -h . / /tmp /home/runner/actions-runner/cached 2>/dev/null || true
          du -sh target target/debug ~/.cargo ~/.rustup /home/runner/actions-runner/cached/_diag 2>/dev/null || true

      - name: Julia template runtime cache
        if: matrix.backend == 'julia'
        uses: actions/cache@v4
        with:
          path: target/julia-depot
          key: ${{ runner.os }}-julia-template-${{ hashFiles('infra/julia/Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-template-

      - name: Prepare Python template runtime dependencies
        if: matrix.nix_shell == 'ci-template-python'
        env:
          TEMPLATE_BACKEND: ${{ matrix.backend }}
        run: |
          nix develop .#${{ matrix.nix_shell }} --command bash <<'EOF'
          set -euo pipefail
          venv="target/template-runtime-venv-${TEMPLATE_BACKEND}"
          python -m venv "$venv"
          . "$venv/bin/activate"
          python -m pip install --upgrade pip
          case "$TEMPLATE_BACKEND" in
            casadi)
              python -m pip install casadi==3.7.2 numpy==2.4.3
              python -c 'import casadi, numpy; print("casadi template deps ok")'
              ;;
            sympy)
              python -m pip install sympy==1.14.0
              python -c 'import sympy; print("sympy template deps ok")'
              ;;
            symforce)
              python -m pip install numpy==2.4.3 scipy==1.17.1 symforce==0.11.0 sympy==1.14.0
              python -c 'import symforce; print("symforce template deps ok")'
              ;;
            onnx)
              python -m pip install numpy==2.4.3 onnx==1.20.1 onnxruntime==1.24.3
              python -c 'import numpy, onnx, onnxruntime; print("onnx template deps ok")'
              ;;
            jax)
              python -m pip install diffrax==0.7.2 jax==0.9.2 numpy==2.4.3 scipy==1.17.1
              python -c 'import diffrax, jax, numpy; print("jax template deps ok")'
              ;;
            *)
              echo "::error::unexpected Python template backend: $TEMPLATE_BACKEND"
              exit 1
              ;;
          esac
          EOF

      - name: Prepare Julia template runtime dependencies
        if: matrix.backend == 'julia'
        run: |
          nix develop .#${{ matrix.nix_shell }} --command bash <<'EOF'
          set -euo pipefail
          julia --project=infra/julia <<'JL'
          using Pkg
          Pkg.instantiate()
          using ModelingToolkit, OrdinaryDiffEqTsit5, IfElse, SciMLBase, Sundials
          println("julia template runtime deps ok")
          JL
          EOF

      - name: Run template runtime checks
        env:
          TEMPLATE_BACKEND: ${{ matrix.backend }}
        run: |
          nix develop .#${{ matrix.nix_shell }} --command bash <<'EOF'
          set -euo pipefail
          mkdir -p target/template-runtimes
          touch target/template-runtimes/strict
          venv="target/template-runtime-venv-${TEMPLATE_BACKEND}"
          if [ -d "$venv" ]; then
            . "$venv/bin/activate"
          fi
          cargo xtask verify template-runtimes --backend "$TEMPLATE_BACKEND"
          EOF

  editor-msl-smoke:
    name: Full-MSL LSP/Editor Gate
    runs-on: ubuntu-24.04
    # This gate runs full-MSL LSP probes, VS Code smoke, and a WASM browser
    # smoke. Hosted runners can exhaust 30 minutes before the browser smoke
    # finishes its playground build on a cold wasm cache.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install Rust nightly with rust-src
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add wasm32-unknown-unknown
          rustup component add rust-src

      - name: Install wasm-pack (prebuilt)
        # The gate's WASM smoke needs wasm-pack; installing the prebuilt binary
        # here lets xtask's ensure_wasm_pack find it on PATH (it checks
        # `wasm-pack --version` == 0.15.0) and skip its `cargo install wasm-pack`
        # — a ~3min from-source build every run.
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          # Cache npm's download store keyed by the committed lockfiles so the
          # `npm ci` in the VS Code + browser smokes reuses packages across runs.
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Install Xvfb and system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xauth libudev-dev

      - name: Select headless browser
        shell: bash
        run: |
          set -euo pipefail
          if command -v google-chrome >/dev/null 2>&1; then
            browser=google-chrome
          elif command -v chromium >/dev/null 2>&1; then
            browser=chromium
          elif command -v chromium-browser >/dev/null 2>&1; then
            browser=chromium-browser
          else
            echo "::error::Missing Chrome/Chromium for headless WASM smoke."
            exit 1
          fi
          # xtask auto-detects the headless browser; this step only fails fast
          # when none is installed.
          "$browser" --version

      - name: Rust cache (editor-msl)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: editor-msl
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # The VS Code runtime smoke downloads a full VS Code build via
      # @vscode/test-electron; the xtask resolves its cache to the source
      # packages/vscode/.vscode-test (even though the smoke runs in a staged
      # copy), so cache that dir to reuse the ~100MB electron download.
      - name: Cache VS Code test electron
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: packages/vscode/.vscode-test
          key: ${{ runner.os }}-vscode-test-v1

      - name: Cache MSL
        uses: actions/cache@v5
        continue-on-error: true
        id: msl-cache-editor
        with:
          path: target/msl/ModelicaStandardLibrary-4.1.0
          key: msl-v4.1.0-release-zip-layout-v2

      - name: Ensure MSL
        shell: bash
        run: |
          set -euo pipefail
          msl_dir=target/msl/ModelicaStandardLibrary-4.1.0
          if [[ -f "$msl_dir/Complex.mo" && -f "$msl_dir/Modelica 4.1.0/package.mo" ]]; then
            echo "MSL cache is valid at $msl_dir"
            exit 0
          fi
          rm -rf "$msl_dir"
          mkdir -p "$msl_dir"
          curl -L -o target/msl/msl-v4.1.0.zip \
            https://github.com/modelica/ModelicaStandardLibrary/releases/download/v4.1.0/ModelicaStandardLibrary_v4.1.0.zip
          unzip -q target/msl/msl-v4.1.0.zip -d "$msl_dir"
          rm target/msl/msl-v4.1.0.zip
          test -f "$msl_dir/Complex.mo"
          test -f "$msl_dir/Modelica 4.1.0/package.mo"

      - name: Reclaim runner disk before editor gate
        shell: bash
        run: |
          set -euo pipefail
          echo "== disk before cleanup =="
          df -h . / /tmp || true
          du -sh /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL 2>/dev/null || true

          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

          echo "== disk after cleanup =="
          df -h . / /tmp || true

      - name: Run unified full-MSL LSP/editor gate
        run: cargo xtask verify lsp-msl-completion-timings --require-runtimes

      - name: Upload full-MSL LSP/editor report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lsp-msl-benchmark-report
          path: target/lsp-msl-benchmark
          if-no-files-found: warn

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-24.04
    # This job installs cargo-llvm-cov and generates full workspace artifacts
    # before running the trim/gate steps, so 30 minutes is too tight on cold
    # GitHub runners. Keep explicit headroom here to avoid job-level
    # cancellation while tests are still progressing.
    timeout-minutes: 45
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # libxml2-utils provides xmllint for rumoca-efmi XSD validation tests
          sudo apt-get install -y libudev-dev libxml2-utils

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup component add llvm-tools-preview

      - name: Rust cache (coverage / llvm-cov instrumented)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage-llvmcov
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-llvm-cov
        # Prebuilt binary via taiki-e (like nextest) instead of `cargo install
        # cargo-llvm-cov --locked`, which compiles it from source (~1min).
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Build coverage helper
        run: cargo build --package xtask --bin xtask

      - name: Reclaim runner disk before coverage
        shell: bash
        run: |
          set -euo pipefail
          echo "== disk before cleanup =="
          df -h . / /tmp || true
          du -sh target target/debug target/debug/deps target/debug/build target/debug/incremental ~/.cargo ~/.rustup /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL 2>/dev/null || true

          rm -rf target/debug/deps target/debug/build target/debug/incremental target/debug/.fingerprint
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

          echo "== disk after cleanup =="
          df -h . / /tmp || true
          du -sh target target/debug ~/.cargo ~/.rustup 2>/dev/null || true

      - name: Generate workspace coverage artifacts
        shell: bash
        run: |
          set -euo pipefail
          monitor() {
            while true; do
              echo "== resource snapshot: $(date -Is) =="
              df -h . / /tmp || true
              free -h || true
              du -sh target target/llvm-cov target/llvm-cov-target ~/.cargo ~/.rustup 2>/dev/null || true
              ps -eo pid,ppid,%cpu,%mem,rss,vsz,comm,args --sort=-rss | head -n 10 || true
              sleep 60
            done
          }
          monitor &
          monitor_pid=$!
          trap 'kill "$monitor_pid" 2>/dev/null || true' EXIT
          ./target/debug/xtask coverage run

      - name: Generate trim candidate inventory
        run: |
          ./target/debug/xtask coverage report

      - name: Enforce coverage regression gate
        run: |
          ./target/debug/xtask coverage gate --allowed-workspace-line-coverage-drop 3.0

  # Build the heavy MSL artifacts (release + LTO) ONCE via Nix/crane and push to
  # Cachix, so the shard / merge / ModelicaTest consumers restore them instead
  # of each recompiling + re-LTO'ing the workspace. LTO is a link-time cost no
  # per-crate cache can avoid — only build-once does. On an unchanged dep closure
  # the crane `cargoArtifacts` layer is a Cachix hit; only the workspace crates
  # rebuild here, once, for all consumers.
  nix-build-msl:
    name: Build MSL artifacts (Nix, once)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cachix (rumoca binary cache)
        uses: cachix/cachix-action@v17
        with:
          name: rumoca
          # Public cache: consumer pulls need no auth; the token lets this
          # producer push the freshly built closure. Absent on fork PRs, in which
          # case consumers Cachix-miss and fall back to compiling — still correct.
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build + cache MSL artifacts
        run: |
          nix build --print-build-logs .#msl-artifacts

  # ============================================================================
  # MSL parity gate, sharded. The ~54min root-example parity run (575 models +
  # OMC diff) is split into N round-robin shards over the slowest-first order
  # (so the timeout tail spreads evenly); the msl-merge job then runs the
  # baseline ratchet ONCE on the merged results. ModelicaTest is its own job.
  #
  # Each consumer restores the prebuilt MSL artifact bundle from Cachix (needs:
  # nix-build-msl) and runs it via `--prebuilt-test-binary` /
  # `--prebuilt-sim-worker`, so no workspace compile/LTO happens here — only the
  # light `cargo xtask` wrapper builds.
  # ============================================================================
  msl-shards:
    name: MSL Quality Gate (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: nix-build-msl
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Rust cache (msl-gate)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: msl-gate
          cache-on-failure: true
          cache-targets: false
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache MSL
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: target/msl/ModelicaStandardLibrary-4.1.0
          key: msl-v4.1.0-release-zip-layout-v2

      - name: Ensure MSL
        shell: bash
        run: |
          set -euo pipefail
          msl_dir=target/msl/ModelicaStandardLibrary-4.1.0
          if [[ -f "$msl_dir/Complex.mo" && -f "$msl_dir/Modelica 4.1.0/package.mo" ]]; then
            echo "MSL cache is valid at $msl_dir"
            exit 0
          fi
          rm -rf "$msl_dir"
          mkdir -p "$msl_dir"
          curl -L -o target/msl/msl-v4.1.0.zip \
            https://github.com/modelica/ModelicaStandardLibrary/releases/download/v4.1.0/ModelicaStandardLibrary_v4.1.0.zip
          unzip -q target/msl/msl-v4.1.0.zip -d "$msl_dir"
          rm target/msl/msl-v4.1.0.zip
          test -f "$msl_dir/Complex.mo"
          test -f "$msl_dir/Modelica 4.1.0/package.mo"

      - name: Install OpenModelica
        shell: bash
        run: |
          set -euo pipefail
          omc_channel="stable"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ca-certificates clang cmake curl gnupg \
            libexpat1-dev liblapack-dev lsb-release unzip zip
          curl -fsSL https://build.openmodelica.org/apt/openmodelica.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/openmodelica-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/openmodelica-keyring.gpg] https://build.openmodelica.org/apt $(lsb_release -cs) $omc_channel" \
            | sudo tee /etc/apt/sources.list.d/openmodelica.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends omc
          omc --version

      - name: Clean stale MSL results
        shell: bash
        run: rm -rf target/msl/results

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cachix (rumoca binary cache)
        uses: cachix/cachix-action@v17
        with:
          name: rumoca

      - name: Restore prebuilt MSL binaries (Cachix)
        run: |
          nix build .#msl-artifacts --out-link result-msl-artifacts

      - name: Run MSL parity shard ${{ matrix.shard }}/4
        run: |
          cargo xtask verify msl-parity \
            --shard ${{ matrix.shard }}/4 \
            --prebuilt-test-binary "$PWD/result-msl-artifacts/bin/msl_tests" \
            --prebuilt-model-worker "$PWD/result-msl-artifacts/bin/rumoca-worker" \
            --prebuilt-sim-worker "$PWD/result-msl-artifacts/bin/rumoca-sim-worker" \
            --stage-parallelism 3 \
            --sim-parallelism 3 \
            --sim-worker-memory-mb 2048 \
            --sim-total-memory-mb 6144 \
            --monitor-interval-secs 10

      - name: Upload shard results
        uses: actions/upload-artifact@v6
        with:
          name: shard-${{ matrix.shard }}
          path: |
            target/msl/results/msl_results.json
            target/msl/results/omc_simulation_reference.json
            target/msl/results/sim_trace_comparison.json
          if-no-files-found: error

  msl-merge:
    name: MSL Quality Gate (merge + gate)
    runs-on: ubuntu-24.04
    needs: [nix-build-msl, msl-shards]
    timeout-minutes: 30
    env:
      MSL_BASELINE_RELEASE_TAG: msl-quality-baseline
      MSL_BASELINE_RELEASE_ASSET: msl_quality_baseline.json
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Rust cache (msl-gate)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: msl-gate
          cache-on-failure: true
          cache-targets: false
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Download shard results
        uses: actions/download-artifact@v8
        with:
          pattern: shard-*
          path: target/msl/shards

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cachix (rumoca binary cache)
        uses: cachix/cachix-action@v17
        with:
          name: rumoca

      - name: Restore prebuilt MSL binaries (Cachix)
        run: |
          nix build .#msl-artifacts --out-link result-msl-artifacts

      - name: Merge shards + run quality gate
        run: |
          cargo xtask verify msl-parity \
            --merge-shards target/msl/shards \
            --prebuilt-test-binary "$PWD/result-msl-artifacts/bin/msl_tests"

      - name: Validate merged MSL quality outputs
        shell: bash
        run: |
          set -euo pipefail
          test -s target/msl/results/msl_results.json
          test -s target/msl/results/omc_simulation_reference.json
          test -s target/msl/results/sim_trace_comparison.json
          test -s target/msl/results/msl_quality_current.json

      - name: Generate MSL compatibility report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -s target/msl/results/msl_results.json
          ./result-msl-artifacts/bin/rumoca-msl-tools compatibility-report

      - name: Generate MSL PR summary comment
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -s target/msl/results/msl_quality_current.json
          baseline="crates/rumoca-test-msl/tests/msl_tests/msl_quality_baseline.json"
          if [[ -f target/msl/baselines/msl_quality_baseline.json ]]; then
            baseline="target/msl/baselines/msl_quality_baseline.json"
          fi
          ./result-msl-artifacts/bin/rumoca-msl-tools pr-comment \
            --results-dir target/msl/results \
            --baseline "$baseline"

      - name: Publish MSL PR summary comment
        if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = 'target/msl/results/msl_pr_comment.md';
            if (!fs.existsSync(path)) {
              core.info(`Skipping MSL PR summary comment; ${path} was not produced.`);
              return;
            }

            const marker = '<!-- rumoca-msl-quality-summary -->';
            const body = fs.readFileSync(path, 'utf8');
            if (!body.includes(marker)) {
              core.setFailed(`Refusing to publish ${path}: missing ${marker}`);
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Locate MSL quality snapshot
        id: msl-quality-snapshot
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          set -euo pipefail
          snapshot="target/msl/results/msl_quality_current.json"
          if [[ ! -f "$snapshot" ]]; then
            echo "No $snapshot produced by the merged MSL quality gate."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "path=$snapshot" >> "$GITHUB_OUTPUT"

      - name: Install Node for MSL baseline ratchet
        if: ${{ steps.msl-quality-snapshot.outputs.found == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Load current promoted MSL baseline
        id: release-baseline
        if: ${{ steps.msl-quality-snapshot.outputs.found == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const tag = process.env.MSL_BASELINE_RELEASE_TAG;
            const assetName = process.env.MSL_BASELINE_RELEASE_ASSET;
            const outputPath = 'target/msl-baseline-ratchet/current-baseline.json';
            fs.mkdirSync(path.dirname(outputPath), { recursive: true });

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              const asset = release.data.assets.find(item => item.name === assetName);
              if (!asset) {
                core.info(`Release ${tag} has no ${assetName}; using checked-in fallback.`);
                fs.copyFileSync(
                  'crates/rumoca-test-msl/tests/msl_tests/msl_quality_baseline.json',
                  outputPath
                );
              } else {
                const download = await github.rest.repos.getReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id,
                  headers: { accept: 'application/octet-stream' },
                });
                fs.writeFileSync(outputPath, Buffer.from(download.data));
                core.info(`Loaded current promoted baseline from release ${tag}/${assetName}.`);
              }
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              core.info(`Release ${tag} does not exist; using checked-in fallback.`);
              fs.copyFileSync(
                'crates/rumoca-test-msl/tests/msl_tests/msl_quality_baseline.json',
                outputPath
              );
            }
            core.setOutput('path', outputPath);

      - name: Promote MSL baseline if the current run improves it
        id: promote-msl-baseline
        if: ${{ steps.msl-quality-snapshot.outputs.found == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          previous="${{ steps.release-baseline.outputs.path }}"
          promoted="target/msl-baseline-ratchet/$MSL_BASELINE_RELEASE_ASSET"
          cp "$previous" "$promoted"
          node .github/scripts/msl-baseline-ratchet.mjs \
            --source "${{ steps.msl-quality-snapshot.outputs.path }}" \
            --baseline "$promoted"

          if cmp -s "$previous" "$promoted"; then
            echo "MSL quality baseline did not improve the promoted release baseline."
            echo "promoted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "MSL quality baseline improved the promoted release baseline."
          echo "promoted=true" >> "$GITHUB_OUTPUT"
          echo "path=$promoted" >> "$GITHUB_OUTPUT"

      - name: Publish promoted MSL baseline release asset
        if: ${{ steps.promote-msl-baseline.outputs.promoted == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const tag = process.env.MSL_BASELINE_RELEASE_TAG;
            const assetName = process.env.MSL_BASELINE_RELEASE_ASSET;
            const assetPath = '${{ steps.promote-msl-baseline.outputs.path }}';
            const runId = context.runId;
            const runSha = context.sha;
            const body = [
              'Mutable release that stores the latest promoted MSL quality baseline.',
              '',
              `Source CI run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}`,
              `Source commit: \`${runSha}\``,
              '',
              '`cargo xtask verify msl-parity` downloads this asset when available and falls back to the checked-in baseline when offline.',
              '',
            ].join('\n');

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.data.id,
                name: 'MSL Quality Baseline',
                body,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              release = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: 'main',
                name: 'MSL Quality Baseline',
                body,
                draft: false,
                prerelease: false,
              });
            }

            const existingAsset = release.data.assets.find(asset => asset.name === assetName);
            if (existingAsset) {
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: existingAsset.id,
              });
            }

            const data = fs.readFileSync(assetPath);
            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id: release.data.id,
              name: assetName,
              data,
              headers: {
                'content-type': 'application/json',
                'content-length': data.length,
              },
            });
            core.info(`Published ${assetName} to release ${tag}.`);

      - name: Upload MSL compatibility artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: msl-compatibility-report
          path: |
            target/msl/results/msl_results.json
            target/msl/results/omc_simulation_reference.json
            target/msl/results/sim_trace_comparison.json
            target/msl/results/msl_quality_current.json
            target/msl/results/msl_package_pass_rates.md
            target/msl/results/msl_package_trace_accuracy.md
            target/msl/results/mls_contract_coverage.md
            target/msl/results/msl_pr_comment.md
            target/msl/results/msl_compatibility_report.md
            target/msl/results/msl_compatibility_report.json
          if-no-files-found: error

  modelicatest-gate:
    name: ModelicaTest Semantic Gate
    runs-on: ubuntu-24.04
    needs: [nix-build-msl]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Rust cache (msl-gate)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: msl-gate
          cache-on-failure: true
          cache-targets: false
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache MSL
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: target/msl/ModelicaStandardLibrary-4.1.0
          key: msl-v4.1.0-release-zip-layout-v2

      - name: Ensure MSL
        shell: bash
        run: |
          set -euo pipefail
          msl_dir=target/msl/ModelicaStandardLibrary-4.1.0
          if [[ -f "$msl_dir/Complex.mo" && -f "$msl_dir/Modelica 4.1.0/package.mo" ]]; then
            echo "MSL cache is valid at $msl_dir"
            exit 0
          fi
          rm -rf "$msl_dir"
          mkdir -p "$msl_dir"
          curl -L -o target/msl/msl-v4.1.0.zip \
            https://github.com/modelica/ModelicaStandardLibrary/releases/download/v4.1.0/ModelicaStandardLibrary_v4.1.0.zip
          unzip -q target/msl/msl-v4.1.0.zip -d "$msl_dir"
          rm target/msl/msl-v4.1.0.zip
          test -f "$msl_dir/Complex.mo"
          test -f "$msl_dir/Modelica 4.1.0/package.mo"

      - name: Install OpenModelica
        shell: bash
        run: |
          set -euo pipefail
          omc_channel="stable"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ca-certificates clang cmake curl gnupg \
            libexpat1-dev liblapack-dev lsb-release unzip zip
          curl -fsSL https://build.openmodelica.org/apt/openmodelica.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/openmodelica-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/openmodelica-keyring.gpg] https://build.openmodelica.org/apt $(lsb_release -cs) $omc_channel" \
            | sudo tee /etc/apt/sources.list.d/openmodelica.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends omc
          omc --version

      - name: Prepare ModelicaTest sources
        shell: bash
        run: |
          set -euo pipefail
          rm -rf target/msl/modelicatest-source
          git clone --depth 1 --branch v4.1.0             https://github.com/modelica/ModelicaStandardLibrary.git             target/msl/modelicatest-source
          rm -rf target/msl/ModelicaStandardLibrary-4.1.0/ModelicaTest
          cp -a             target/msl/modelicatest-source/ModelicaTest             target/msl/ModelicaStandardLibrary-4.1.0/ModelicaTest

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cachix (rumoca binary cache)
        uses: cachix/cachix-action@v17
        with:
          name: rumoca

      - name: Restore prebuilt MSL binaries (Cachix)
        run: |
          nix build .#msl-artifacts --out-link result-msl-artifacts

      - name: Run ModelicaTest semantic gate
        shell: bash
        run: |
          set -euo pipefail
          targets="crates/rumoca-test-msl/tests/msl_tests/modelica_test_targets_ci.json"
          rm -rf target/msl/modelicatest-results
          cargo xtask verify msl-parity \
            --results-dir target/msl/modelicatest-results \
            --sim-targets-file "$targets" \
            --include-modelica-test \
            --require-selected-targets-success \
            --sim-set full \
            --prebuilt-test-binary "$PWD/result-msl-artifacts/bin/msl_tests" \
            --prebuilt-model-worker "$PWD/result-msl-artifacts/bin/rumoca-worker" \
            --prebuilt-sim-worker "$PWD/result-msl-artifacts/bin/rumoca-sim-worker" \
            --stage-parallelism 3 \
            --sim-parallelism 3 \
            --sim-worker-memory-mb 2048 \
            --sim-total-memory-mb 6144
          ./result-msl-artifacts/bin/rumoca-msl-tools modelica-test-catalog \
            --results target/msl/modelicatest-results/msl_results.json \
            --out target/msl/modelicatest-results/modelica_test_catalog.md \
            --json-out target/msl/modelicatest-results/modelica_test_catalog.json

      - name: Upload ModelicaTest artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: modelicatest-report
          path: |
            target/msl/modelicatest-results/msl_results.json
            target/msl/modelicatest-results/modelica_test_catalog.md
          if-no-files-found: warn

  modelica-models-gate:
    name: modelica_models Compatibility Gate
    runs-on: ubuntu-24.04
    needs: [nix-build-msl]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      # Keep this corpus fixed so compiler changes are compared against the
      # same source. Updating the revision is an explicit compatibility-ratchet
      # change reviewed alongside its gate result.
      - name: Check out pinned modelica_models corpus
        uses: actions/checkout@v5
        with:
          repository: CogniPilot/modelica_models
          ref: 973cc7f4d5ff39eee23303f83e6f10473a254f51
          path: target/modelica-models
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cachix (rumoca binary cache)
        uses: cachix/cachix-action@v17
        with:
          name: rumoca

      - name: Restore prebuilt compatibility runner (Cachix)
        run: |
          nix build .#msl-artifacts --out-link result-msl-artifacts

      - name: Compile aggregate corpus with Rumoca
        shell: bash
        run: |
          set -euo pipefail
          ./result-msl-artifacts/bin/rumoca-msl-profile \
            --source-root "$PWD/target/modelica-models" \
            --model Tests.All \
            --mode compile

      - name: Run pinned assertion smoke models with Rumoca
        shell: bash
        run: |
          set -euo pipefail
          for model in Tests.LieGroupTests.SO2 Tests.LieGroupTests.SE2; do
            ./result-msl-artifacts/bin/rumoca-msl-profile \
              --source-root "$PWD/target/modelica-models" \
              --model "$model" \
              --mode simulate \
              --stop-time 0.0
          done

  # ============================================================================
  # Documentation
  # ============================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Rust cache (docs)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-targets: false

      - name: Install mdBook
        run: cargo install mdbook --locked --version 0.5.2

      - name: Build documentation
        run: cargo xtask verify docs

      - name: Upload documentation
        uses: actions/upload-artifact@v6
        with:
          name: documentation
          path: target/doc/

  # ============================================================================
  # VS Code Extension
  # ============================================================================
  vscode:
    name: VS Code Extension
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Rust cache (vscode)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: vscode
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-targets: false

      - name: Run VS Code extension CI gate
        run: cargo xtask vscode test

  # ============================================================================
  # WebAssembly Build & GitHub Pages
  # ============================================================================
  build-wasm:
    name: Build WASM
    # Regular CI builds the optimized WASM packages so the release package path
    # cannot drift until tag time. Only tag pushes prepare/upload Pages content.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cachix (rumoca binary cache)
        uses: cachix/cachix-action@v17
        with:
          name: rumoca

      - name: Rust cache (wasm)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
          cache-on-failure: true
          cache-targets: false

      - name: Build optimized npm packages
        # BOTH packages compile Modelica and emit code from every IR
        # (AST/flat/DAE/solve). The only difference is the bundled solver
        # RUNTIME for in-package simulation:
        #   full-web -> @cognipilot/rumoca       (+ rk45 runtime; browser-safe —
        #                                          diffsol is excluded, it pulls a
        #                                          non-browser-safe relaxed-SIMD graph)
        #   core     -> @cognipilot/rumoca-core  (no bundled solver — bring your own)
        run: |
          nix develop --command bash <<'EOF'
          set -euo pipefail
          node packages/rumoca/build.mjs --profile release --variant full-web --optimize
          node packages/rumoca/build.mjs --profile release --variant core --optimize
          EOF

      - name: Prepare GitHub Pages content
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          nix develop --command bash <<'EOF'
          set -euo pipefail
          if [ -d packages/rumoca/dist/release-full-web ]; then
            PKG_SUBDIR="release-full-web"
          elif [ -d packages/rumoca/dist/release-full-web-rayon ]; then
            PKG_SUBDIR="release-full-web-rayon"
          else
            echo "Missing expected WASM package subdir under packages/rumoca/dist/"
            find packages/rumoca/dist -maxdepth 2 -type f || true
            exit 1
          fi
          echo "Using pkg subdir: $PKG_SUBDIR"

          # Deploy the WASM package exactly as build.mjs assembled it — the same
          # tree that ships to npm: core wasm + every runtime module + the lazy
          # diffsol/galec addons + package.json + snippets. Copying the whole
          # directory is drift-proof. A per-file allowlist here previously
          # dropped rumoca_galec.js (a top-level import of rumoca_runtime.js) and
          # the galec addon when the GALEC docs widget landed, 404ing the runtime
          # module and breaking every live example on the published site.
          mkdir -p "gh-pages/pkg/$PKG_SUBDIR"
          cp -a "packages/rumoca/dist/$PKG_SUBDIR/." "gh-pages/pkg/$PKG_SUBDIR/"

          mkdir -p gh-pages/assets/brand
          cp assets/brand/rumoca.svg gh-pages/assets/brand/
          cp packages/playground/coi-serviceworker.js gh-pages/
          cp -r packages/playground/src gh-pages/
          cp -r examples gh-pages/examples/
          # vendor/ is generated by packages/rumoca/build.mjs (run earlier in this
          # job) from the single-source web/ package, so it holds real files.
          cp -r packages/playground/vendor gh-pages/

          sed \
              -e "s|window.rumocaWasmPkgBase = '../rumoca/dist';|window.rumocaWasmPkgBase = './pkg';|g" \
              -e "s|window.rumocaWasmPkgSubdir = 'release-full-web';|window.rumocaWasmPkgSubdir = '$PKG_SUBDIR';|g" \
              -e "s|window.rumocaWasmPkgSubdir = 'release-full-web-rayon';|window.rumocaWasmPkgSubdir = '$PKG_SUBDIR';|g" \
              -e "s|window.rumocaRepoAssetBase = '../../';|window.rumocaRepoAssetBase = './';|g" \
              -e "s|../../assets/brand/rumoca.svg|assets/brand/rumoca.svg|g" \
              packages/playground/index.html > gh-pages/index.html

          cargo xtask repo modelica-deps ensure
          mkdir -p gh-pages/target/cmm
          cp -a target/cmm/CMM-a642c381 gh-pages/target/cmm/

          cargo xtask docs build --book user
          cargo xtask docs build --book dev
          mkdir -p "$GITHUB_WORKSPACE/gh-pages/user-guide" "$GITHUB_WORKSPACE/gh-pages/dev-guide"
          cp -a docs/user-guide/book/. "$GITHUB_WORKSPACE/gh-pages/user-guide/"
          cp -a docs/dev-guide/book/. "$GITHUB_WORKSPACE/gh-pages/dev-guide/"

          echo "=== GitHub Pages content ==="
          find gh-pages -type f
          EOF

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v6
        with:
          name: wasm-package
          path: packages/rumoca/dist/

      - name: Upload Pages artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

  deploy-pages:
    name: Deploy Pages
    # Publish the docs/WASM site only on a release. Gated to the tag-push event
    # (not the co-pushed main branch ref) so a `git push origin main vX.Y.Z`
    # deploys exactly once instead of racing a duplicate from the branch push.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.detect-release-tag.outputs.is_release == 'true'
    needs: [detect-release-tag, build-wasm]
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================================================
  # PR playground / WASM contract (relocated out of the tag-only build-wasm)
  # ============================================================================
  playground:
    name: Playground contract
    # Relocated out of build-wasm so PRs keep the playground/WASM contract test
    # without the heavy release build. Self-contained: builds the FullWeb wasm
    # bundle and runs the native + Node smoke harnesses (no MSL/browser/GPU).
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust nightly with rust-src
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add wasm32-unknown-unknown
          rustup component add rust-src

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Rust cache (playground)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
          cache-targets: false
          cache-on-failure: true

      - name: Run playground CI gate
        run: cargo xtask playground test

  # ============================================================================
  # Cross-platform Rust binary builds
  # ============================================================================
  build-rust-binaries:
    name: Build Rust (${{ matrix.target }})
    # Release-only: cross-platform binary artifacts are consumed solely by the
    # tag-time deploy job, so they are deferred off PRs (native build/test
    # coverage on PRs comes from the `test` job). A PR that breaks a cross
    # target is caught at tag time.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Use musl for Linux x64 release artifacts so the bundled VS Code
          # server does not depend on the remote host glibc version.
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            rumoca_asset: rumoca-linux-x86_64
            lsp_asset: rumoca-lsp-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            rumoca_asset: rumoca-linux-aarch64
            lsp_asset: rumoca-lsp-linux-aarch64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            rumoca_asset: rumoca-macos-x86_64
            lsp_asset: rumoca-lsp-macos-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            rumoca_asset: rumoca-macos-aarch64
            lsp_asset: rumoca-lsp-macos-aarch64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            rumoca_asset: rumoca-windows-x86_64.exe
            lsp_asset: rumoca-lsp-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools (Linux musl)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Configure musl build (Linux musl)
        if: contains(matrix.target, 'musl')
        run: |
          mkdir -p .cargo
          target_env_suffix="$(echo '${{ matrix.target }}' | tr '-' '_')"
          target_env_upper="$(echo '${{ matrix.target }}' | tr '[:lower:]-' '[:upper:]_')"
          cat >> .cargo/config.toml <<'EOF'
          [target.${{ matrix.target }}]
          linker = "musl-gcc"
          rustflags = ["-C", "link-arg=-static"]
          EOF
          echo "CC_${target_env_suffix}=musl-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_${target_env_upper}_LINKER=musl-gcc" >> $GITHUB_ENV

      - name: Rust cache (release ${{ matrix.target }})
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin rumoca --bin rumoca-lsp

      - name: Strip binaries (Linux native)
        if: runner.os == 'Linux'
        run: |
          strip target/${{ matrix.target }}/release/rumoca
          strip target/${{ matrix.target }}/release/rumoca-lsp

      - name: Verify Linux musl release artifacts
        if: contains(matrix.target, 'musl')
        run: |
          set -euo pipefail

          rumoca_bin="target/${{ matrix.target }}/release/rumoca"
          lsp_bin="target/${{ matrix.target }}/release/rumoca-lsp"

          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              expected_machine="Advanced Micro Devices X86-64"
              ;;
            aarch64-unknown-linux-musl)
              expected_machine="AArch64"
              ;;
            *)
              echo "::error::unexpected musl release target: ${{ matrix.target }}"
              exit 1
              ;;
          esac

          echo "Inspecting $rumoca_bin"
          file "$rumoca_bin"
          readelf -h "$rumoca_bin" | grep -F "$expected_machine"
          if readelf -l "$rumoca_bin" | grep -F "Requesting program interpreter" >/dev/null; then
            echo "::error::$rumoca_bin unexpectedly depends on a dynamic ELF interpreter"
            exit 1
          fi
          ldd "$rumoca_bin" || true
          "$rumoca_bin" --version

          echo "Inspecting $lsp_bin"
          file "$lsp_bin"
          readelf -h "$lsp_bin" | grep -F "$expected_machine"
          if readelf -l "$lsp_bin" | grep -F "Requesting program interpreter" >/dev/null; then
            echo "::error::$lsp_bin unexpectedly depends on a dynamic ELF interpreter"
            exit 1
          fi
          ldd "$lsp_bin" || true
          "$lsp_bin" --version

      - name: Strip binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          strip target/${{ matrix.target }}/release/rumoca
          strip target/${{ matrix.target }}/release/rumoca-lsp

      - name: Upload rumoca binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.rumoca_asset }}
          path: ./target/${{ matrix.target }}/release/rumoca${{ startsWith(matrix.target, 'x86_64-pc-windows-') && '.exe' || '' }}

      - name: Upload LSP binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.lsp_asset }}
          path: ./target/${{ matrix.target }}/release/rumoca-lsp${{ startsWith(matrix.target, 'x86_64-pc-windows-') && '.exe' || '' }}

  build-python-wheels:
    name: Build Python (${{ matrix.name }})
    # Keep the full wheel matrix on PRs/main as well as tags. Python packaging
    # has target-specific native build risk, so a linux-only smoke check leaves
    # release-only macOS/Windows/aarch64 failures hidden until tag time.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            name: linux-aarch64-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
            name: macos-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            name: macos-aarch64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            name: windows-x64
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install Nix
        if: runner.os != 'Windows'
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cachix (rumoca binary cache)
        if: runner.os != 'Windows'
        uses: cachix/cachix-action@v17
        with:
          name: rumoca

      - uses: actions/setup-python@v6
        if: runner.os == 'Windows'
        with:
          python-version: '3.12'

      - name: Install Rust (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          toolchain="$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          rustup set profile minimal
          rustup toolchain install "$toolchain"
          rustup default "$toolchain"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install maturin (Windows)
        if: runner.os == 'Windows'
        run: python -m pip install maturin

      - name: Build wheels (Nix)
        if: runner.os != 'Windows'
        run: |
          nix develop --command bash -lc '
            set -euo pipefail
            maturin build \
              --release \
              --out dist \
              --manifest-path crates/rumoca-bind-python/Cargo.toml \
              --target "${{ matrix.target }}"
          '

      - name: Build wheels (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          maturin build \
            --release \
            --out dist \
            --manifest-path crates/rumoca-bind-python/Cargo.toml \
            --target "${{ matrix.target }}"

      - name: Smoke test installed wheel (Nix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          nix develop --command bash -lc '
            set -euo pipefail
            python -m venv target/python-wheel-smoke-venv
            . target/python-wheel-smoke-venv/bin/activate
            python -m pip install --upgrade pip
            WHEEL=$(ls dist/*.whl | head -1)
            python -m pip install --force-reinstall "${WHEEL}[notebook,data]"
            python crates/rumoca-bind-python/tests/smoke_test.py
            python crates/rumoca-bind-python/tests/api_test.py
            python crates/rumoca-bind-python/tests/magic_test.py
            python crates/rumoca-bind-python/tests/export_test.py
          '

      - name: Smoke test installed wheel (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m venv target/python-wheel-smoke-venv
          . target/python-wheel-smoke-venv/Scripts/activate
          python -m pip install --upgrade pip
          WHEEL=$(ls dist/*.whl | head -1)
          python -m pip install --force-reinstall "${WHEEL}[notebook,data]"
          python crates/rumoca-bind-python/tests/smoke_test.py
          python crates/rumoca-bind-python/tests/api_test.py
          python crates/rumoca-bind-python/tests/magic_test.py
          python crates/rumoca-bind-python/tests/export_test.py

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.name }}
          path: dist

  build-python-sdist:
    name: Build Python sdist
    # Build the sdist on PRs/main too so packaging metadata breaks before tag
    # time. Tag deploy still consumes the artifact from the release run.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      - name: Cachix (rumoca binary cache)
        uses: cachix/cachix-action@v17
        with:
          name: rumoca

      - name: Build sdist
        run: |
          nix develop --command bash -lc '
            set -euo pipefail
            cd crates/rumoca-bind-python
            maturin sdist --out dist
          '

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: crates/rumoca-bind-python/dist

  # ============================================================================
  # Deployment (only on tags, after verification and build completion)
  # ============================================================================
  deploy:
    name: Deploy
    # Gated to the tag-push event only. A release pushes main and the v* tag
    # together, which fires two CI runs (branch + tag); deploying on both made
    # the second run fail on "Release.tag_name already exists". Tag-only means
    # the release/publish path runs exactly once.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.detect-release-tag.outputs.is_release == 'true'
    needs: [detect-release-tag, lint, test, coverage-gate, msl-merge, modelicatest-gate, docs, vscode, deploy-pages, playground, build-wasm, build-rust-binaries, build-python-wheels, build-python-sdist]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          tag='${{ needs.detect-release-tag.outputs.tag }}'
          if ! git tag --points-at "${{ github.sha }}" | grep -Fx "$tag" >/dev/null; then
            echo "::error::Release tag '$tag' does not point at built commit ${{ github.sha }}"
            exit 1
          fi
          git fetch --no-tags --depth=2147483647 origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "::error::Release tag '$tag' commit ${{ github.sha }} is not on origin/main; refusing to release"
            exit 1
          fi
          echo "Release tag '$tag' points to commit ${{ github.sha }} on origin/main"

      - name: Get tag name
        id: tag
        run: echo "name=${{ needs.detect-release-tag.outputs.tag }}" >> $GITHUB_OUTPUT

      - name: Distribution policy note
        run: |
          echo "As of v0.8.0, Rust distribution is via GitHub Releases binaries (not crates.io)."

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Setup Node.js for VSIX packaging
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install VS Code extension dependencies
        shell: bash
        run: |
          cd packages/vscode
          npm ci
          npm run esbuild-base -- --minify

      - name: Organize artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          echo "=== Downloaded structure ==="
          find artifacts -type f | sed -n '1,50p'

          # Move Rust binaries
          for dir in artifacts/rumoca*; do
            if [ -d "$dir" ]; then
              echo "Processing Rust artifact: $dir"
              artifact_name="$(basename "$dir")"
              source_file="$(find "$dir" -maxdepth 1 -type f -print -quit)"
              if [ -z "$source_file" ]; then
                echo "No binary file found under $dir; skipping"
                continue
              fi
              cp "$source_file" "release-assets/$artifact_name"
            fi
          done

          # Move Python wheels/sdist
          for dir in artifacts/wheels-*; do
            if [ -d "$dir" ]; then
              echo "Processing Python artifact: $dir"
              find "$dir" -maxdepth 1 -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} release-assets/ \;
            fi
          done

          # Package VS Code extensions at deployment time from the released LSP binaries.
          map_target() {
            case "$1" in
              linux-x64)
                printf '%s\n' 'rumoca-lsp-linux-x86_64|rumoca-lsp'
                ;;
              linux-arm64)
                printf '%s\n' 'rumoca-lsp-linux-aarch64|rumoca-lsp'
                ;;
              darwin-x64)
                printf '%s\n' 'rumoca-lsp-macos-x86_64|rumoca-lsp'
                ;;
              darwin-arm64)
                printf '%s\n' 'rumoca-lsp-macos-aarch64|rumoca-lsp'
                ;;
              win32-x64)
                printf '%s\n' 'rumoca-lsp-windows-x86_64.exe|rumoca-lsp.exe'
                ;;
              *)
                return 1
                ;;
            esac
          }

          for vscode_target in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64; do
            IFS='|' read -r artifact_name binary_name <<<"$(map_target "$vscode_target")"
            artifact_dir="artifacts/${artifact_name}"
            if [ ! -d "$artifact_dir" ]; then
              echo "::error::Missing LSP artifact directory for $vscode_target: $artifact_dir"
              exit 1
            fi
            source_file="$(find "$artifact_dir" -maxdepth 1 -type f -print -quit)"
            if [ -z "$source_file" ]; then
              echo "::error::No LSP binary found under $artifact_dir"
              exit 1
            fi

            echo "Packaging VSIX for $vscode_target from $source_file"
            rm -f packages/vscode/bin/* packages/vscode/*.vsix
            mkdir -p packages/vscode/bin
            cp "$source_file" "packages/vscode/bin/$binary_name"
            chmod +x "packages/vscode/bin/$binary_name" 2>/dev/null || true

            (
              cd packages/vscode
              npx @vscode/vsce package --target "$vscode_target" --no-dependencies --no-yarn
            )

            vsix_file="$(find packages/vscode -maxdepth 1 -type f -name '*.vsix' -print -quit)"
            if [ -z "$vsix_file" ]; then
              echo "::error::VSIX packaging did not produce an artifact for $vscode_target"
              exit 1
            fi
            cp "$vsix_file" "release-assets/$(basename "$vsix_file")"
          done

          echo "=== Release assets ==="
          ls -la release-assets/

      # Create GitHub Release. Deploy is gated to the tag-push event (see the
      # job `if:` above), so this runs exactly once per release and a fresh tag
      # never collides with an existing release.
      - name: Create GitHub Release
        run: |
          if gh release view ${{ steps.tag.outputs.name }} >/dev/null 2>&1; then
            echo "Release ${{ steps.tag.outputs.name }} already exists; reusing it."
          else
            gh release create ${{ steps.tag.outputs.name }} \
              --title "Release ${{ steps.tag.outputs.name }}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          cd release-assets
          for file in *; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload ${{ steps.tag.outputs.name }} "$file" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-assets
          path: release-assets/

      - name: Publish VS Code extensions to marketplaces
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          vsix_files=(release-assets/*.vsix)
          if [ "${#vsix_files[@]}" -eq 0 ]; then
            echo "::error::No VS Code extension packages found in release-assets"
            exit 1
          fi

          if [ -z "${VSCE_PAT:-}" ]; then
            echo "::warning::VSCE_PAT secret not set; skipping Visual Studio Marketplace publish"
          else
            for vsix_file in "${vsix_files[@]}"; do
              echo "Publishing $(basename "$vsix_file") to Visual Studio Marketplace"
              (
                cd packages/vscode
                npx @vscode/vsce publish --packagePath "../../${vsix_file}" --no-dependencies --no-yarn
              )
            done
          fi

          if [ -z "${OVSX_TOKEN:-}" ]; then
            echo "::warning::OVSX_TOKEN secret not set; skipping Open VSX publish"
          else
            for vsix_file in "${vsix_files[@]}"; do
              echo "Publishing $(basename "$vsix_file") to Open VSX"
              (
                cd packages/vscode
                npx --yes ovsx publish "../../${vsix_file}" -p "${OVSX_TOKEN}"
              )
            done
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

      - name: Stage Python packages for PyPI
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p pypi-dist
          python_files=(release-assets/*.whl release-assets/*.tar.gz)
          if [ "${#python_files[@]}" -eq 0 ]; then
            echo "::error::No Python distribution artifacts found in release-assets"
            exit 1
          fi
          cp "${python_files[@]}" pypi-dist/
          ls -la pypi-dist/

      - name: Publish Python packages to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi-dist
          skip-existing: true

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Publish npm package to npmjs
        shell: bash
        run: |
          set -euo pipefail
          echo "node $(node --version)"
          echo "npm $(npm --version)"
          # Two packages: the batteries-included build and the compile/codegen
          # build (no solver runtime). Both are wasm-opt'd in build-wasm.
          for variant in release-full-web release-core; do
            pkg_dir="artifacts/wasm-package/$variant"
            if [ ! -f "$pkg_dir/package.json" ]; then
              echo "::error::npm package not found at $pkg_dir (build-wasm must build the $variant variant)"
              exit 1
            fi
            name="$(node -p "require('./$pkg_dir/package.json').name")"
            version="$(node -p "require('./$pkg_dir/package.json').version")"
            echo "Preparing to publish $name@$version"
            # Idempotent like the PyPI --skip-existing above: re-running a release
            # must not fail just because a version is already on the registry.
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already published; skipping."
              continue
            fi
            npm publish "$pkg_dir" --access public
          done

      # Rust binary and VS Code extension artifacts are distributed via GitHub Releases.
