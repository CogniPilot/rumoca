name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  issues: write
  pages: write
  packages: read
  pull-requests: write

jobs:
  detect-release-tag:
    name: Detect release tag on commit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    outputs:
      is_release: ${{ steps.detect.outputs.is_release }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 0
          fetch-tags: true

      - name: Detect v* tag for current commit
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tags < <(git tag --points-at "$GITHUB_SHA" 'v*' | sort -V)
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "No v* tag detected on $GITHUB_SHA"
            exit 0
          fi

          tag="${tags[$((${#tags[@]} - 1))]}"
          if [ "${#tags[@]}" -gt 1 ]; then
            echo "::warning::Multiple v* tags point at $GITHUB_SHA: ${tags[*]}. Using $tag."
          fi

          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Detected release tag: $tag"

  # ============================================================================
  # Rust Testing
  # ============================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)" --component rustfmt,clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run lint gate
        run: cargo xtask verify lint

      - name: Run architecture review scan
        if: github.event_name == 'pull_request'
        run: |
          cargo xtask repo review-scan \
            --base origin/${{ github.base_ref }} \
            --head HEAD \
            --out target/review/review-scan.json \
            --fail-on-forbidden

      - name: Upload architecture review scan
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v6
        with:
          name: architecture-review-scan
          path: target/review/review-scan.json
          if-no-files-found: ignore

      - name: Check generated Modelica parser is current
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- crates/rumoca-phase-parse/src/generated

      - name: Generate crate DAG release artifact
        run: cargo xtask repo graph crates --format dot

      - name: Upload crate DAG artifact
        uses: actions/upload-artifact@v6
        with:
          name: crate-dag
          path: target/crate-dag/workspace-crate-dag.dot
          if-no-files-found: error

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Cache rustup toolchain
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: ${{ runner.os }}-rustup-test-v2-${{ hashFiles('rust-toolchain.toml') }}

      - name: Install Rust
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          toolchain="$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
          fi
          rustup set profile minimal
          if ! rustup toolchain list | grep -Eq "^${toolchain}"; then
            rustup toolchain install "$toolchain"
          fi
          if ! rustup component list --toolchain "$toolchain" --installed | grep -qx 'rust-src'; then
            rustup component add rust-src --toolchain "$toolchain"
          fi
          if ! rustup target list --toolchain "$toolchain" --installed | grep -qx 'wasm32-unknown-unknown'; then
            rustup target add wasm32-unknown-unknown --toolchain "$toolchain"
          fi
          rustup default "$toolchain"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache MSL
        uses: actions/cache@v5
        continue-on-error: true
        id: msl-cache
        with:
          path: target/msl/ModelicaStandardLibrary-4.1.0
          key: msl-v4.1.0-release-zip-layout-v2

      - name: Cache CMM
        uses: actions/cache@v5
        continue-on-error: true
        id: cmm-cache
        with:
          path: target/cmm/CMM-v0.0.1
          key: cmm-v0.0.1-bb7fb2033bf97e7d4e62f7e62097e0b206dfefac0562d0d0756922bb08f30469

      - name: Ensure MSL
        shell: bash
        run: |
          set -euo pipefail
          msl_dir=target/msl/ModelicaStandardLibrary-4.1.0
          if [[ -f "$msl_dir/Complex.mo" && -f "$msl_dir/Modelica 4.1.0/package.mo" ]]; then
            echo "MSL cache is valid at $msl_dir"
            exit 0
          fi
          rm -rf "$msl_dir"
          mkdir -p "$msl_dir"
          curl -L -o target/msl/msl-v4.1.0.zip \
            https://github.com/modelica/ModelicaStandardLibrary/releases/download/v4.1.0/ModelicaStandardLibrary_v4.1.0.zip
          unzip -q target/msl/msl-v4.1.0.zip -d "$msl_dir"
          rm target/msl/msl-v4.1.0.zip
          test -f "$msl_dir/Complex.mo"
          test -f "$msl_dir/Modelica 4.1.0/package.mo"

      - name: Run example build smoke (Linux monitored)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          monitor() {
            while true; do
              echo "== resource snapshot: $(date -Is) =="
              df -h . /tmp /home/runner/actions-runner/cached 2>/dev/null || true
              free -h || true
              du -sh target target/debug target/debug/deps target/debug/incremental target/msl target/cmm ~/.rustup ~/.cargo ~/.cargo/registry ~/.cargo/git /home/runner/actions-runner/cached/_diag 2>/dev/null || true
              ps -eo pid,ppid,%cpu,%mem,rss,vsz,comm,args --sort=-rss | head -n 15 || true
              sleep 60
            done
          }
          monitor &
          monitor_pid=$!
          trap 'kill "$monitor_pid" 2>/dev/null || true' EXIT
          cargo xtask verify examples

      - name: Run example build smoke
        if: runner.os != 'Linux'
        run: cargo xtask verify examples

      - name: Run tests (Linux monitored)
        if: runner.os == 'Linux'
        env:
          REQUIRE_MSL_FMT_DRIFT: "1"
        shell: bash
        run: |
          set -euo pipefail
          monitor() {
            while true; do
              echo "== resource snapshot: $(date -Is) =="
              df -h . /tmp /home/runner/actions-runner/cached 2>/dev/null || true
              free -h || true
              du -sh target target/debug target/debug/deps target/debug/incremental target/msl target/cmm ~/.rustup ~/.cargo ~/.cargo/registry ~/.cargo/git /home/runner/actions-runner/cached/_diag 2>/dev/null || true
              ps -eo pid,ppid,%cpu,%mem,rss,vsz,comm,args --sort=-rss | head -n 15 || true
              sleep 60
            done
          }
          monitor &
          monitor_pid=$!
          trap 'kill "$monitor_pid" 2>/dev/null || true' EXIT
          cargo xtask verify workspace

      - name: Run tests
        if: runner.os != 'Linux'
        env:
          REQUIRE_MSL_FMT_DRIFT: "1"
        run: cargo xtask verify workspace

      - name: Build all binaries
        run: cargo xtask verify binaries

  template-runtime-tests:
    name: Template Runtime Tests
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/cognipilot/rumoca-dev:main
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y libudev-dev

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            /opt/rumoca/cargo/registry
            /opt/rumoca/cargo/git
          key: template-runtime-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run template runtime checks
        run: cargo xtask verify template-runtimes

  editor-msl-smoke:
    name: Full-MSL LSP/Editor Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install Rust nightly with rust-src
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add wasm32-unknown-unknown
          rustup component add rust-src

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Xvfb and system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xauth libudev-dev

      - name: Select headless browser
        shell: bash
        run: |
          set -euo pipefail
          if command -v google-chrome >/dev/null 2>&1; then
            browser=google-chrome
          elif command -v chromium >/dev/null 2>&1; then
            browser=chromium
          elif command -v chromium-browser >/dev/null 2>&1; then
            browser=chromium-browser
          else
            echo "::error::Missing Chrome/Chromium for headless WASM smoke."
            exit 1
          fi
          # xtask auto-detects the headless browser; this step only fails fast
          # when none is installed.
          "$browser" --version

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-editor-msl-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache MSL
        uses: actions/cache@v5
        continue-on-error: true
        id: msl-cache-editor
        with:
          path: target/msl/ModelicaStandardLibrary-4.1.0
          key: msl-v4.1.0-release-zip-layout-v2

      - name: Ensure MSL
        shell: bash
        run: |
          set -euo pipefail
          msl_dir=target/msl/ModelicaStandardLibrary-4.1.0
          if [[ -f "$msl_dir/Complex.mo" && -f "$msl_dir/Modelica 4.1.0/package.mo" ]]; then
            echo "MSL cache is valid at $msl_dir"
            exit 0
          fi
          rm -rf "$msl_dir"
          mkdir -p "$msl_dir"
          curl -L -o target/msl/msl-v4.1.0.zip \
            https://github.com/modelica/ModelicaStandardLibrary/releases/download/v4.1.0/ModelicaStandardLibrary_v4.1.0.zip
          unzip -q target/msl/msl-v4.1.0.zip -d "$msl_dir"
          rm target/msl/msl-v4.1.0.zip
          test -f "$msl_dir/Complex.mo"
          test -f "$msl_dir/Modelica 4.1.0/package.mo"

      - name: Run unified full-MSL LSP/editor gate
        run: cargo xtask verify lsp-msl-completion-timings --require-runtimes

      - name: Upload full-MSL LSP/editor report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lsp-msl-benchmark-report
          path: target/lsp-msl-benchmark
          if-no-files-found: warn

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-24.04
    # This job installs cargo-llvm-cov and generates full workspace artifacts
    # before running the trim/gate steps, so 30 minutes is too tight on cold
    # GitHub runners. Keep explicit headroom here to avoid job-level
    # cancellation while tests are still progressing.
    timeout-minutes: 45
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup component add llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Build coverage helper
        run: cargo build --package xtask --bin xtask

      - name: Reclaim runner disk before coverage
        shell: bash
        run: |
          set -euo pipefail
          echo "== disk before cleanup =="
          df -h . / /tmp || true
          du -sh target target/debug target/debug/deps target/debug/build target/debug/incremental ~/.cargo ~/.rustup /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL 2>/dev/null || true

          rm -rf target/debug/deps target/debug/build target/debug/incremental target/debug/.fingerprint
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

          echo "== disk after cleanup =="
          df -h . / /tmp || true
          du -sh target target/debug ~/.cargo ~/.rustup 2>/dev/null || true

      - name: Generate workspace coverage artifacts
        shell: bash
        run: |
          set -euo pipefail
          monitor() {
            while true; do
              echo "== resource snapshot: $(date -Is) =="
              df -h . / /tmp || true
              free -h || true
              du -sh target target/llvm-cov target/llvm-cov-target ~/.cargo ~/.rustup 2>/dev/null || true
              ps -eo pid,ppid,%cpu,%mem,rss,vsz,comm,args --sort=-rss | head -n 10 || true
              sleep 60
            done
          }
          monitor &
          monitor_pid=$!
          trap 'kill "$monitor_pid" 2>/dev/null || true' EXIT
          ./target/debug/xtask coverage run

      - name: Generate trim candidate inventory
        run: |
          ./target/debug/xtask coverage report

      - name: Enforce coverage regression gate
        run: |
          ./target/debug/xtask coverage gate --allowed-workspace-line-coverage-drop 3.0

  msl-quality-gate:
    name: MSL Quality Gate
    runs-on: ubuntu-24.04
    # The root-example MSL 4.1 baseline gate covers 575 models and also runs
    # OMC parity. Keep enough slack for slower shared runners plus artifact
    # upload/cleanup.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache MSL
        uses: actions/cache@v5
        continue-on-error: true
        id: msl-cache
        with:
          path: target/msl/ModelicaStandardLibrary-4.1.0
          key: msl-v4.1.0-release-zip-layout-v2

      - name: Ensure MSL
        shell: bash
        run: |
          set -euo pipefail
          msl_dir=target/msl/ModelicaStandardLibrary-4.1.0
          if [[ -f "$msl_dir/Complex.mo" && -f "$msl_dir/Modelica 4.1.0/package.mo" ]]; then
            echo "MSL cache is valid at $msl_dir"
            exit 0
          fi
          rm -rf "$msl_dir"
          mkdir -p "$msl_dir"
          curl -L -o target/msl/msl-v4.1.0.zip \
            https://github.com/modelica/ModelicaStandardLibrary/releases/download/v4.1.0/ModelicaStandardLibrary_v4.1.0.zip
          unzip -q target/msl/msl-v4.1.0.zip -d "$msl_dir"
          rm target/msl/msl-v4.1.0.zip
          test -f "$msl_dir/Complex.mo"
          test -f "$msl_dir/Modelica 4.1.0/package.mo"

      - name: Install OpenModelica
        shell: bash
        run: |
          set -euo pipefail
          omc_version="1.26.8-1"
          expected_omc_version="OpenModelica ${omc_version%-1}"
          if command -v omc >/dev/null 2>&1; then
            current_omc_version="$(omc --version)"
            echo "OpenModelica already available: $current_omc_version"
            if [[ "$current_omc_version" == "$expected_omc_version" ]]; then
              exit 0
            fi
            echo "Replacing OpenModelica with pinned CI version $expected_omc_version"
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            clang \
            cmake \
            curl \
            libexpat1-dev \
            liblapack-dev \
            unzip \
            zip
          omc_deb_dir="$(mktemp -d)"
          trap 'rm -rf "$omc_deb_dir"' EXIT
          omc_deb_base="https://build.openmodelica.org/apt/pool/contrib-noble"
          for package in \
            "omc-common_${omc_version}_all.deb" \
            "libomcsimulation_${omc_version}_amd64.deb" \
            "libomc_${omc_version}_amd64.deb" \
            "omc_${omc_version}_amd64.deb"
          do
            curl -fsSL -o "$omc_deb_dir/$package" "$omc_deb_base/$package"
          done
          sudo apt-get install -y --no-install-recommends "$omc_deb_dir"/*.deb
          installed_omc_version="$(omc --version)"
          if [[ "$installed_omc_version" != "$expected_omc_version" ]]; then
            echo "Expected $expected_omc_version, got $installed_omc_version" >&2
            exit 1
          fi
          echo "$installed_omc_version"

      - name: Clean stale MSL results
        shell: bash
        run: |
          set -euo pipefail
          rm -rf target/msl/results

      - name: Run full MSL quality gate
        # Keep the committed MSL quality baseline and CI run in the same
        # stage/parity worker context. Simulation still has its own memory cap.
        run: >
          cargo xtask verify msl-parity
          --stage-parallelism 14
          --sim-parallelism 3
          --sim-worker-memory-mb 2048
          --sim-total-memory-mb 6144
          --monitor-interval-secs 10

      - name: Generate MSL compatibility report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f target/msl/results/msl_results.json ]]; then
            cargo xtask repo msl compatibility-report
          else
            echo "Skipping MSL compatibility report; target/msl/results/msl_results.json was not produced."
          fi

      - name: Prepare ModelicaTest sources
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf target/msl/modelicatest-source
          git clone --depth 1 --branch v4.1.0 \
            https://github.com/modelica/ModelicaStandardLibrary.git \
            target/msl/modelicatest-source
          rm -rf target/msl/ModelicaStandardLibrary-4.1.0/ModelicaTest
          cp -a \
            target/msl/modelicatest-source/ModelicaTest \
            target/msl/ModelicaStandardLibrary-4.1.0/ModelicaTest

      - name: Run ModelicaTest semantic gate
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          targets="crates/rumoca-test-msl/tests/msl_tests/modelica_test_targets_ci.json"
          rm -rf target/msl/modelicatest-results
          cargo xtask verify msl-parity \
            --results-dir target/msl/modelicatest-results \
            --sim-targets-file "$targets" \
            --include-modelica-test \
            --require-selected-targets-success \
            --sim-set full \
            --stage-parallelism 3 \
            --sim-parallelism 3 \
            --sim-worker-memory-mb 2048 \
            --sim-total-memory-mb 6144
          cargo xtask repo msl modelica-test-catalog \
            --results target/msl/modelicatest-results/msl_results.json \
            --out target/msl/results/modelica_test_catalog.md \
            --json-out target/msl/results/modelica_test_catalog.json

      - name: Generate MSL PR summary comment
        if: always()
        shell: bash
        run: cargo xtask repo msl pr-comment --results-dir target/msl/results

      - name: Upload MSL compatibility artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: msl-compatibility-report
          path: |
            target/msl/results/msl_quality_current.json
            target/msl/results/msl_package_pass_rates.md
            target/msl/results/msl_package_pass_rates.json
            target/msl/results/msl_package_trace_accuracy.md
            target/msl/results/msl_package_trace_accuracy.json
            target/msl/results/mls_contract_coverage.md
            target/msl/results/mls_contract_coverage.json
            target/msl/results/mls_contract_coverage.txt
            target/msl/results/msl_pr_comment.md
            target/msl/results/msl_compatibility_report.md
            target/msl/results/msl_compatibility_report.json
            target/msl/results/modelica_test_catalog.md
            target/msl/results/modelica_test_catalog.json
            target/msl/modelicatest-results/msl_results.json
            target/msl/modelicatest-results/msl_quality_current.json
          if-no-files-found: warn

  # ============================================================================
  # Documentation
  # ============================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install mdBook
        run: cargo install mdbook --locked --version 0.5.2

      - name: Build documentation
        run: cargo xtask verify docs

      - name: Upload documentation
        uses: actions/upload-artifact@v6
        with:
          name: documentation
          path: target/doc/

  # ============================================================================
  # VS Code Extension
  # ============================================================================
  vscode:
    name: VS Code Extension
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-vscode-${{ hashFiles('**/Cargo.lock') }}

      - name: Run VS Code extension CI gate
        run: cargo xtask vscode test

  # ============================================================================
  # WebAssembly Build & GitHub Pages
  # ============================================================================
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust nightly with rust-src
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add wasm32-unknown-unknown
          rustup component add rust-src

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Cache cargo
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Run WASM CI gate
        run: cargo xtask wasm test

      - name: Install mdBook
        run: cargo install mdbook --locked --version 0.5.2

      - name: Prepare GitHub Pages content
        run: |
          if [ -d pkg/release-full-web ]; then
            PKG_SUBDIR="release-full-web"
          elif [ -d pkg/release-full-web-rayon ]; then
            PKG_SUBDIR="release-full-web-rayon"
          else
            echo "Missing expected WASM package subdir under pkg/"
            find pkg -maxdepth 2 -type f || true
            exit 1
          fi
          echo "Using pkg subdir: $PKG_SUBDIR"

          mkdir -p "gh-pages/pkg/$PKG_SUBDIR"
          cp "pkg/$PKG_SUBDIR/rumoca_bind_wasm.js" "gh-pages/pkg/$PKG_SUBDIR/"
          cp "pkg/$PKG_SUBDIR/rumoca_bind_wasm_bg.wasm" "gh-pages/pkg/$PKG_SUBDIR/"
          cp "pkg/$PKG_SUBDIR/rumoca_worker.js" "gh-pages/pkg/$PKG_SUBDIR/"
          cp "pkg/$PKG_SUBDIR/parse_worker.js" "gh-pages/pkg/$PKG_SUBDIR/"
          cp "pkg/$PKG_SUBDIR/package.json" "gh-pages/pkg/$PKG_SUBDIR/"
          cp "pkg/$PKG_SUBDIR/rumoca_package_meta.json" "gh-pages/pkg/$PKG_SUBDIR/" 2>/dev/null || true
          cp -r "pkg/$PKG_SUBDIR/snippets" "gh-pages/pkg/$PKG_SUBDIR/" 2>/dev/null || true

          cp editors/wasm/rumoca.png gh-pages/
          cp editors/wasm/coi-serviceworker.js gh-pages/
          cp -r editors/wasm/src gh-pages/
          cp -r editors/wasm/vendor gh-pages/

          sed \
              -e "s|window.rumocaWasmPkgBase = '../../pkg';|window.rumocaWasmPkgBase = './pkg';|g" \
              -e "s|window.rumocaWasmPkgSubdir = 'release-full-web';|window.rumocaWasmPkgSubdir = '$PKG_SUBDIR';|g" \
              -e "s|window.rumocaWasmPkgSubdir = 'release-full-web-rayon';|window.rumocaWasmPkgSubdir = '$PKG_SUBDIR';|g" \
              editors/wasm/index.html > gh-pages/index.html

          mdbook build docs/user-guide -d "$GITHUB_WORKSPACE/gh-pages/user-guide"
          mdbook build docs/dev-guide -d "$GITHUB_WORKSPACE/gh-pages/dev-guide"

          echo "=== GitHub Pages content ==="
          find gh-pages -type f

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v6
        with:
          name: wasm-package
          path: pkg/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

  deploy-pages:
    name: Deploy Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-wasm]
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================================================
  # Cross-platform Rust binary builds
  # ============================================================================
  build-rust-binaries:
    name: Build Rust (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Use musl for Linux x64 release artifacts so the bundled VS Code
          # server does not depend on the remote host glibc version.
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            rumoca_asset: rumoca-linux-x86_64
            lsp_asset: rumoca-lsp-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            rumoca_asset: rumoca-linux-aarch64
            lsp_asset: rumoca-lsp-linux-aarch64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            rumoca_asset: rumoca-macos-x86_64
            lsp_asset: rumoca-lsp-macos-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            rumoca_asset: rumoca-macos-aarch64
            lsp_asset: rumoca-lsp-macos-aarch64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            rumoca_asset: rumoca-windows-x86_64.exe
            lsp_asset: rumoca-lsp-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools (Linux musl)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Configure musl build (Linux musl)
        if: contains(matrix.target, 'musl')
        run: |
          mkdir -p .cargo
          target_env_suffix="$(echo '${{ matrix.target }}' | tr '-' '_')"
          target_env_upper="$(echo '${{ matrix.target }}' | tr '[:lower:]-' '[:upper:]_')"
          cat >> .cargo/config.toml <<'EOF'
          [target.${{ matrix.target }}]
          linker = "musl-gcc"
          rustflags = ["-C", "link-arg=-static"]
          EOF
          echo "CC_${target_env_suffix}=musl-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_${target_env_upper}_LINKER=musl-gcc" >> $GITHUB_ENV

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin rumoca --bin rumoca-lsp

      - name: Strip binaries (Linux native)
        if: runner.os == 'Linux'
        run: |
          strip target/${{ matrix.target }}/release/rumoca
          strip target/${{ matrix.target }}/release/rumoca-lsp

      - name: Verify Linux musl release artifacts
        if: contains(matrix.target, 'musl')
        run: |
          set -euo pipefail

          rumoca_bin="target/${{ matrix.target }}/release/rumoca"
          lsp_bin="target/${{ matrix.target }}/release/rumoca-lsp"

          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              expected_machine="Advanced Micro Devices X86-64"
              ;;
            aarch64-unknown-linux-musl)
              expected_machine="AArch64"
              ;;
            *)
              echo "::error::unexpected musl release target: ${{ matrix.target }}"
              exit 1
              ;;
          esac

          echo "Inspecting $rumoca_bin"
          file "$rumoca_bin"
          readelf -h "$rumoca_bin" | grep -F "$expected_machine"
          if readelf -l "$rumoca_bin" | grep -F "Requesting program interpreter" >/dev/null; then
            echo "::error::$rumoca_bin unexpectedly depends on a dynamic ELF interpreter"
            exit 1
          fi
          ldd "$rumoca_bin" || true
          "$rumoca_bin" --version

          echo "Inspecting $lsp_bin"
          file "$lsp_bin"
          readelf -h "$lsp_bin" | grep -F "$expected_machine"
          if readelf -l "$lsp_bin" | grep -F "Requesting program interpreter" >/dev/null; then
            echo "::error::$lsp_bin unexpectedly depends on a dynamic ELF interpreter"
            exit 1
          fi
          ldd "$lsp_bin" || true
          "$lsp_bin" --version

      - name: Strip binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          strip target/${{ matrix.target }}/release/rumoca
          strip target/${{ matrix.target }}/release/rumoca-lsp

      - name: Upload rumoca binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.rumoca_asset }}
          path: ./target/${{ matrix.target }}/release/rumoca${{ startsWith(matrix.target, 'x86_64-pc-windows-') && '.exe' || '' }}

      - name: Upload LSP binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.lsp_asset }}
          path: ./target/${{ matrix.target }}/release/rumoca-lsp${{ startsWith(matrix.target, 'x86_64-pc-windows-') && '.exe' || '' }}

  build-python-wheels:
    name: Build Python (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            name: macos-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            name: macos-aarch64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            name: windows-x64
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Add target
        if: matrix.target != 'x86_64-pc-windows-msvc'
        run: rustup target add ${{ matrix.target }}

      - name: Install maturin
        run: pip install maturin

      - name: Build wheels
        shell: bash
        run: |
          cd crates/rumoca-bind-python
          rm -rf dist
          mkdir -p dist
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            maturin build --release --out dist
          else
            maturin build --release --out dist --target ${{ matrix.target }}
          fi

      - name: Smoke test installed wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall crates/rumoca-bind-python/dist/*.whl
          python crates/rumoca-bind-python/tests/smoke_test.py

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.name }}
          path: crates/rumoca-bind-python/dist

  build-python-sdist:
    name: Build Python sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Rust
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          toolchain="$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
          fi
          rustup set profile minimal
          if ! rustup toolchain list | grep -Eq "^${toolchain}"; then
            rustup toolchain install "$toolchain"
          fi
          if ! rustup component list --toolchain "$toolchain" --installed | grep -qx 'rust-src'; then
            rustup component add rust-src --toolchain "$toolchain"
          fi
          if ! rustup target list --toolchain "$toolchain" --installed | grep -qx 'wasm32-unknown-unknown'; then
            rustup target add wasm32-unknown-unknown --toolchain "$toolchain"
          fi
          rustup default "$toolchain"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: |
          cd crates/rumoca-bind-python
          maturin sdist --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: crates/rumoca-bind-python/dist

  # ============================================================================
  # Deployment (only on tags, after verification and build completion)
  # ============================================================================
  deploy:
    name: Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-release-tag.outputs.is_release == 'true'
    needs: [detect-release-tag, lint, test, coverage-gate, msl-quality-gate, docs, vscode, deploy-pages, build-rust-binaries, build-python-wheels, build-python-sdist]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          if ! git tag --points-at "${{ github.sha }}" | grep -Fx "${{ needs.detect-release-tag.outputs.tag }}" >/dev/null; then
            echo "::error::Detected release tag '${{ needs.detect-release-tag.outputs.tag }}' is not on commit ${{ github.sha }}"
            exit 1
          fi
          echo "Release tag '${{ needs.detect-release-tag.outputs.tag }}' points to current main commit"

      - name: Get tag name
        id: tag
        run: echo "name=${{ needs.detect-release-tag.outputs.tag }}" >> $GITHUB_OUTPUT

      - name: Distribution policy note
        run: |
          echo "As of v0.8.0, Rust distribution is via GitHub Releases binaries (not crates.io)."

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Setup Node.js for VSIX packaging
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install VS Code extension dependencies
        shell: bash
        run: |
          cd editors/vscode
          npm ci

      - name: Organize artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          echo "=== Downloaded structure ==="
          find artifacts -type f | sed -n '1,50p'

          # Move Rust binaries
          for dir in artifacts/rumoca*; do
            if [ -d "$dir" ]; then
              echo "Processing Rust artifact: $dir"
              artifact_name="$(basename "$dir")"
              source_file="$(find "$dir" -maxdepth 1 -type f -print -quit)"
              if [ -z "$source_file" ]; then
                echo "No binary file found under $dir; skipping"
                continue
              fi
              cp "$source_file" "release-assets/$artifact_name"
            fi
          done

          # Move Python wheels/sdist
          for dir in artifacts/wheels-*; do
            if [ -d "$dir" ]; then
              echo "Processing Python artifact: $dir"
              find "$dir" -maxdepth 1 -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} release-assets/ \;
            fi
          done

          # Package VS Code extensions at deployment time from the released LSP binaries.
          map_target() {
            case "$1" in
              linux-x64)
                printf '%s\n' 'rumoca-lsp-linux-x86_64|rumoca-lsp'
                ;;
              linux-arm64)
                printf '%s\n' 'rumoca-lsp-linux-aarch64|rumoca-lsp'
                ;;
              darwin-x64)
                printf '%s\n' 'rumoca-lsp-macos-x86_64|rumoca-lsp'
                ;;
              darwin-arm64)
                printf '%s\n' 'rumoca-lsp-macos-aarch64|rumoca-lsp'
                ;;
              win32-x64)
                printf '%s\n' 'rumoca-lsp-windows-x86_64.exe|rumoca-lsp.exe'
                ;;
              *)
                return 1
                ;;
            esac
          }

          for vscode_target in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64; do
            IFS='|' read -r artifact_name binary_name <<<"$(map_target "$vscode_target")"
            artifact_dir="artifacts/${artifact_name}"
            if [ ! -d "$artifact_dir" ]; then
              echo "::error::Missing LSP artifact directory for $vscode_target: $artifact_dir"
              exit 1
            fi
            source_file="$(find "$artifact_dir" -maxdepth 1 -type f -print -quit)"
            if [ -z "$source_file" ]; then
              echo "::error::No LSP binary found under $artifact_dir"
              exit 1
            fi

            echo "Packaging VSIX for $vscode_target from $source_file"
            rm -f editors/vscode/bin/* editors/vscode/*.vsix
            mkdir -p editors/vscode/bin
            cp "$source_file" "editors/vscode/bin/$binary_name"
            chmod +x "editors/vscode/bin/$binary_name" 2>/dev/null || true

            (
              cd editors/vscode
              npx @vscode/vsce package --target "$vscode_target" --no-dependencies --no-yarn
            )

            vsix_file="$(find editors/vscode -maxdepth 1 -type f -name '*.vsix' -print -quit)"
            if [ -z "$vsix_file" ]; then
              echo "::error::VSIX packaging did not produce an artifact for $vscode_target"
              exit 1
            fi
            cp "$vsix_file" "release-assets/$(basename "$vsix_file")"
          done

          echo "=== Release assets ==="
          ls -la release-assets/

      # Create GitHub Release
      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.tag.outputs.name }} \
            --title "Release ${{ steps.tag.outputs.name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          cd release-assets
          for file in *; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload ${{ steps.tag.outputs.name }} "$file" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-assets
          path: release-assets/

      - name: Publish VS Code extensions to marketplaces
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          vsix_files=(release-assets/*.vsix)
          if [ "${#vsix_files[@]}" -eq 0 ]; then
            echo "::error::No VS Code extension packages found in release-assets"
            exit 1
          fi

          if [ -z "${VSCE_PAT:-}" ]; then
            echo "::warning::VSCE_PAT secret not set; skipping Visual Studio Marketplace publish"
          else
            for vsix_file in "${vsix_files[@]}"; do
              echo "Publishing $(basename "$vsix_file") to Visual Studio Marketplace"
              (
                cd editors/vscode
                npx @vscode/vsce publish --packagePath "../../${vsix_file}" --no-dependencies --no-yarn
              )
            done
          fi

          if [ -z "${OVSX_TOKEN:-}" ]; then
            echo "::warning::OVSX_TOKEN secret not set; skipping Open VSX publish"
          else
            for vsix_file in "${vsix_files[@]}"; do
              echo "Publishing $(basename "$vsix_file") to Open VSX"
              (
                cd editors/vscode
                npx --yes ovsx publish "../../${vsix_file}" -p "${OVSX_TOKEN}"
              )
            done
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Publish Python packages to PyPI
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip twine
          shopt -s nullglob
          python_files=(release-assets/*.whl release-assets/*.tar.gz)
          if [ "${#python_files[@]}" -eq 0 ]; then
            echo "::error::No Python distribution artifacts found in release-assets"
            exit 1
          fi
          python -m twine upload --skip-existing "${python_files[@]}"
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      # Rust binary and VS Code extension artifacts are distributed via GitHub Releases.
