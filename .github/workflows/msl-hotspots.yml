name: MSL Hotspots

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUMOCA_MSL_CACHE_DIR: target/msl

permissions:
  contents: read

jobs:
  flamegraphs:
    name: Generate MSL Flamegraphs
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust nightly with rust-src
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup component add rust-src

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msl-hotspots-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache MSL
        uses: actions/cache@v4
        with:
          path: target/msl/ModelicaStandardLibrary-4.1.0
          key: msl-v4.1.0-release-zip-layout-v2

      - name: Ensure MSL
        shell: bash
        run: |
          set -euo pipefail
          msl_dir=target/msl/ModelicaStandardLibrary-4.1.0
          if [[ -f "$msl_dir/Complex.mo" && -f "$msl_dir/Modelica 4.1.0/package.mo" ]]; then
            echo "MSL cache is valid at $msl_dir"
            exit 0
          fi
          rm -rf "$msl_dir"
          mkdir -p "$msl_dir"
          curl -L -o target/msl/msl-v4.1.0.zip \
            https://github.com/modelica/ModelicaStandardLibrary/releases/download/v4.1.0/ModelicaStandardLibrary_v4.1.0.zip
          unzip -q target/msl/msl-v4.1.0.zip -d "$msl_dir"
          rm target/msl/msl-v4.1.0.zip
          test -f "$msl_dir/Complex.mo"
          test -f "$msl_dir/Modelica 4.1.0/package.mo"

      - name: Install profiler dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-perf
          cargo install flamegraph --locked

      - name: Run 180-model MSL core path
        shell: bash
        run: |
          set -euo pipefail
          target_file="$GITHUB_WORKSPACE/crates/rumoca-test-msl/tests/msl_tests/msl_simulation_targets_180.json"
          export RUMOCA_MSL_SIM_TARGETS_FILE="$target_file"
          cargo test --release --package rumoca-test-msl --test msl_tests \
            balance_pipeline::balance_pipeline_core::test_msl_all -- --ignored --nocapture

      - name: Generate hottest-model flamegraphs
        run: cargo run --quiet --bin rum -- verify msl-hotspots

      - name: Upload flamegraph artifacts
        uses: actions/upload-artifact@v6
        with:
          name: msl-hotspot-flamegraphs
          path: target/msl/results/flamegraph/*.svg
          if-no-files-found: error
